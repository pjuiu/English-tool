$('#restoreBtn').addEventListener('click', () => $('#restoreFile').click());
$('#restoreFile').addEventListener('change', e => {
  const f = e.target.files[0];
  e.target.value = '';
  if(!f) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let data;
    try{ data = JSON.parse(ev.target.result); }catch(err){ alert('备份文件格式错误'); return; }
    if(data.app !== 'english-word-lab'){ alert('这不是 Word Lab 的备份文件'); return; }
    if(!confirm(`导入 ${data.exportedAt ? data.exportedAt.slice(0,10) : '未知日期'} 的备份？\n卡片和材料将合并（已有的保留），缓存类数据将补充。`)) return;
    // 卡片按单词合并：保留现有（复习进度更新），补充缺失的
    try{
      const backupCards = JSON.parse(data.ewl_cards || '[]');
      const cards = getCards();
      const have = new Set(cards.map(c => c.word.toLowerCase()));
      backupCards.forEach(c => { if(c.word && !have.has(c.word.toLowerCase())) cards.push(c); });
      setCards(cards);
    }catch(err){}
    // 材料按 id 合并
    try{
      const backupMats = JSON.parse(data.ewl_materials || '[]');
      const mats = getMaterials();
      const haveIds = new Set(mats.map(m => m.id));
      backupMats.forEach(m => { if(m.id && !haveIds.has(m.id)) mats.push(m); });
      setMaterials(mats);
    }catch(err){}
    // 看板按单词合并
    try{
      const backupBoard = JSON.parse(data.ewl_board || '[]');
      const haveB = new Set(boardItems.map(b => b.word.toLowerCase()));
      backupBoard.forEach(b => { if(b.word && !haveB.has(b.word.toLowerCase())) boardItems.push(b); });
      saveBoard();
    }catch(err){}
    // 缓存与打卡记录：对象合并（打卡取较大值）
    ['ewl_explain_cache','ewl_phonetics','ewl_dict_exists','ewl_review_log'].forEach(k => {
      try{
        const cur = JSON.parse(localStorage.getItem(k) || '{}');
        const bak = JSON.parse(data[k] || '{}');
        Object.keys(bak).forEach(kk => {
          if(k === 'ewl_review_log') cur[kk] = Math.max(cur[kk] || 0, bak[kk] || 0);
          else if(!(kk in cur)) cur[kk] = bak[kk];
        });
        localStorage.setItem(k, JSON.stringify(cur));
      }catch(err){}
    });
    if(!localStorage.getItem('ewl_last_analysis') && data.ewl_last_analysis){
      localStorage.setItem('ewl_last_analysis', data.ewl_last_analysis);
      restoreAnalysis();
    }
    renderCards();
    renderMaterials();
    populateMaterialSelect();
    alert('导入完成 ✓');
  };
  reader.readAsText(f);
});

/* ---------- REVIEW：简单间隔重复 ----------
   记得 → 间隔 ×2.5（首次 1 天）；忘了 → 10 分钟后重新到期，并排到本轮末尾 */
let reviewQueue = [];
let reviewIdx = 0;
let reviewDone = 0;
let spellSessionResults = [];   // 听写模式本轮的逐词对错记录 [{word, correct}]，完成后汇总展示

// 拼写错误时，逐字符对比"用户输入"和"正确答案"——LCS 找出共同字符，没对上的分别标红（多打/打错）和标出（漏打）
function spellCharDiff(userInput, correctWord){
  const u = userInput.trim();
  const ul = u.toLowerCase(), cl = correctWord.toLowerCase();
  const n = ul.length, m = cl.length;
  const dp = Array.from({length:n+1}, () => new Array(m+1).fill(0));
  for(let i=1;i<=n;i++) for(let j=1;j<=m;j++)
    dp[i][j] = ul[i-1]===cl[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const hitU = new Array(n).fill(false), hitC = new Array(m).fill(false);
  let i=n, j=m;
  while(i>0 && j>0){
    if(ul[i-1]===cl[j-1]){ hitU[i-1]=true; hitC[j-1]=true; i--; j--; }
    else if(dp[i-1][j] >= dp[i][j-1]) i--;
    else j--;
  }
  const userHtml = [...u].map((ch,idx) => hitU[idx] ? escapeHtml(ch) : `<span class="spell-diff-bad">${escapeHtml(ch)}</span>`).join('');
  const correctHtml = [...correctWord].map((ch,idx) => hitC[idx] ? escapeHtml(ch) : `<span class="spell-diff-missing">${escapeHtml(ch)}</span>`).join('');
  return { userHtml, correctHtml };
}

function dueCards(cards){
  const now = Date.now();
  return cards.filter(c => !c.srs || !c.srs.due || c.srs.due <= now);
}

function initReview(forceAll){
  const cards = getCards();
  reviewQueue = forceAll ? cards.slice() : dueCards(cards);
  reviewIdx = 0;
  reviewDone = 0;
  spellSessionResults = [];   // 新一轮复习开始，清空上一轮的听写对错记录
  renderReview();
}

function nextDueText(){
  const scheduled = getCards().filter(c => c.srs && c.srs.due && c.srs.due > Date.now());
  if(scheduled.length === 0) return '';
  const next = new Date(Math.min(...scheduled.map(c => c.srs.due)));
  return `下一批到期：${next.toLocaleDateString()} ${next.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}（共 ${scheduled.length} 张在排队）`;
}

let reviewMode = localStorage.getItem('ewl_review_mode') || 'card';

function reviewModeSwitchHtml(){
  return `
    <div class="review-mode-row">
      <button class="filter-pill ${reviewMode === 'card' ? 'active' : ''}" data-rmode="card">🃏 卡片复习</button>
      <button class="filter-pill ${reviewMode === 'spell' ? 'active' : ''}" data-rmode="spell">⌨️ 听写拼写</button>
    </div>`;
}
function bindReviewModeSwitch(area){
  area.querySelectorAll('[data-rmode]').forEach(b => {
    b.addEventListener('click', () => {
      reviewMode = b.dataset.rmode;
      localStorage.setItem('ewl_review_mode', reviewMode);
      renderReview();
    });
  });
}

function renderReview(){
  const area = $('#reviewArea');
  const total = getCards().length;
  if(total === 0){
    area.innerHTML = '<div class="empty-state">还没有卡片。先去 Word Lab 点词并保存吧！</div>';
    return;
  }
  if(reviewIdx >= reviewQueue.length){
    const doneMsg = reviewDone > 0 ? `本轮复习完成，共复习 ${reviewDone} 次 🎉` : '当前没有到期的卡片 🎉';
    // 听写模式：汇总这一轮每个词的对错，一眼看出哪些还没掌握，不用回想每一步的结果
    const wrongCount = spellSessionResults.filter(r => !r.correct).length;
    const spellSummaryHtml = spellSessionResults.length > 0 ? `
        <div class="spell-summary">
          <div class="spell-summary-title">本轮听写：${spellSessionResults.length} 个词，答对 ${spellSessionResults.length - wrongCount} 个${wrongCount ? `，答错 ${wrongCount} 个` : ''}</div>
          <div class="spell-summary-list">
            ${spellSessionResults.map(r => `<span class="spell-summary-item ${r.correct ? 'ok' : 'no'}">${r.correct ? '✓' : '✗'} ${escapeHtml(r.word)}</span>`).join('')}
          </div>
        </div>` : '';
    area.innerHTML = `
      <div class="review-stage">
        ${reviewStatsHtml()}
        ${weekChartHtml()}
        ${reviewModeSwitchHtml()}
        <div class="review-card">
          <div style="font-size:16px;font-weight:600;margin-bottom:8px;">${doneMsg}</div>
          <div style="font-size:13px;color:var(--text-muted);">${nextDueText()}</div>
          ${spellSummaryHtml}
          <div class="review-actions">
            <button class="btn secondary" id="reviewAllBtn">不管到期时间，复习全部 ${total} 张</button>
          </div>
        </div>
      </div>`;
    $('#reviewAllBtn').addEventListener('click', () => initReview(true));
    bindReviewModeSwitch(area);
    return;
  }
  const c = reviewQueue[reviewIdx];
  const badge = c.level ? `<span class="badge ${c.level}">${c.level}</span>` : '';

  if(reviewMode === 'spell'){
    // 听写模式：听发音 + 挖空例句提示 → 拼写
    const esc = c.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const blanked = (c.sourceSentence || '').replace(new RegExp(esc, 'ig'), '____');
    area.innerHTML = `
      <div class="review-stage">
        ${reviewStatsHtml()}
        ${weekChartHtml()}
        ${reviewModeSwitchHtml()}
        <div class="review-progress">${reviewIdx + 1} / ${reviewQueue.length}</div>
        <div class="review-card">
          <div style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">🎧 听发音，拼出这个词</div>
          <button class="btn secondary" id="spellReplay">🔊 再听一遍</button>
          ${badge}
          ${blanked ? `<div class="review-source">"${escapeHtml(blanked)}"</div>` : ''}
          <input id="spellInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="输入拼写…">
          <div class="review-actions" id="spellCheckRow">
            <button class="btn" id="spellCheckBtn">✓ 检查</button>
          </div>
          <div id="spellResult"></div>
          <div class="review-actions" id="spellNextRow" style="display:none;">
            <button class="btn" id="spellNextBtn">下一个 →</button>
          </div>
        </div>
      </div>`;
    bindReviewModeSwitch(area);
    const input = $('#spellInput');
    let checked = false;
    let wasCorrect = false;
    speak(c.word);
    $('#spellReplay').addEventListener('click', () => speak(c.word));
    input.focus();
    const doCheck = () => {
      if(checked) return;
      checked = true;
      wasCorrect = input.value.trim().toLowerCase() === c.word.toLowerCase();
      spellSessionResults.push({ word: c.word, correct: wasCorrect });
      input.classList.add(wasCorrect ? 'correct' : 'wrong');
      input.disabled = true;
      $('#spellCheckRow').style.display = 'none';
      if(wasCorrect){
        $('#spellResult').innerHTML = `<span class="ok">✓ 正确！</span> ${escapeHtml(c.word)} <span class="ipa" data-ipa="${escapeHtml(c.word)}"></span>`;
      } else {
        // 只说"错了、正确答案是 xxx"不够——用户不知道自己具体哪个字母打错/打漏了，
        // 逐字符对比标出来，一眼就能看出差在哪
        const diff = spellCharDiff(input.value, c.word);
        $('#spellResult').innerHTML = `
          <div><span class="no">✗ 拼错了</span> <span class="ipa" data-ipa="${escapeHtml(c.word)}"></span></div>
          <div class="spell-diff-row"><span class="spell-diff-label">你的输入</span>${diff.userHtml || '<i>(空)</i>'}</div>
          <div class="spell-diff-row"><span class="spell-diff-label">正确答案</span>${diff.correctHtml}</div>`;
      }
      attachAllIpa(area);
      $('#spellNextRow').style.display = 'flex';
      $('#spellNextBtn').focus();
    };
    const goNext = () => gradeReview(c, wasCorrect);
    // 按钮点击是主入口（手机虚拟键盘的"完成/下一步"键不一定会触发标准的 Enter keydown 事件，
    // 只靠监听键盘事件在手机上会出现"打完字没反应"）；桌面端按 Enter 仍然可以快速触发，两者并存
    $('#spellCheckBtn').addEventListener('click', doCheck);
    input.addEventListener('keydown', e => { if(e.key === 'Enter') doCheck(); });
    // 判分后焦点移到「下一个」按钮，再按 Enter 即可继续（无 document 级监听，避免一次按键连跳）
    $('#spellNextBtn').addEventListener('click', goNext);
    return;
  }

  area.innerHTML = `
    <div class="review-stage">
      ${reviewStatsHtml()}
      ${weekChartHtml()}
      ${reviewModeSwitchHtml()}
      <div class="review-progress">${reviewIdx + 1} / ${reviewQueue.length}</div>
      <div class="review-card">
        <div class="review-word">${escapeHtml(c.word)} <button class="speak-btn" id="reviewSpeak" title="发音">🔊</button><span class="ipa" data-ipa="${escapeHtml(c.word)}"></span></div>
        ${badge}
        ${c.sourceSentence ? `<div class="review-source">"${escapeHtml(c.sourceSentence)}"</div>` : ''}
        <div class="review-answer" id="reviewAnswer">${formatExplainHtml(c.content)}</div>
        <div class="review-actions" id="reviewShowRow">
          <button class="btn" id="showAnswerBtn">显示解释 <small>空格</small></button>
        </div>
        <div class="review-actions" id="reviewGradeRow" style="display:none;">
          <button class="btn forgot" id="forgotBtn">忘了 😵 <small>1</small></button>
          <button class="btn remembered" id="rememberedBtn">记得 ✓ <small>2/Enter</small></button>
        </div>
      </div>
    </div>`;
  bindReviewModeSwitch(area);
  $('#reviewSpeak').addEventListener('click', () => speak(c.word));
  attachAllIpa(area);
  $('#showAnswerBtn').addEventListener('click', () => {
    $('#reviewAnswer').classList.add('open');
    $('#reviewShowRow').style.display = 'none';
    $('#reviewGradeRow').style.display = 'flex';
  });
  $('#forgotBtn').addEventListener('click', () => gradeReview(c, false));
  $('#rememberedBtn').addEventListener('click', () => gradeReview(c, true));
}

/* Review 键盘快捷键：Space 显示答案 · 1 忘了 · 2/Enter 记得 · 拼写模式 Enter 提交
   仅在 Review 面板可见且焦点不在文本输入框时生效 */
document.addEventListener('keydown', e => {
  const panel = $('#panel-review');
  if(!panel || !panel.classList.contains('active')) return;
  const tag = (e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea') return;   // 拼写输入框自己处理 Enter
  const showRow = $('#reviewShowRow');
  const gradeRow = $('#reviewGradeRow');
  if(showRow && gradeRow){
    if(e.code === 'Space' && showRow.style.display !== 'none'){
      e.preventDefault();
      $('#showAnswerBtn').click();
    } else if(gradeRow.style.display !== 'none'){
      if(e.key === '1'){ e.preventDefault(); $('#forgotBtn').click(); }
      else if(e.key === '2' || e.key === 'Enter'){ e.preventDefault(); $('#rememberedBtn').click(); }
    }
  }
});

function gradeReview(card, remembered){
  const cards = getCards();
  const target = cards.find(x => x.id === card.id);
  if(target){
    const srs = target.srs || { interval: 0, reps: 0 };
    if(remembered){
      srs.reps = (srs.reps || 0) + 1;
      srs.interval = srs.interval ? Math.round(srs.interval * 2.5) : 1;   // 单位：天
      srs.due = Date.now() + srs.interval * 24 * 3600 * 1000;
    } else {
      srs.reps = 0;
      srs.interval = 0;
      srs.due = Date.now() + 10 * 60 * 1000;
    }
    target.srs = srs;
    setCards(cards);
  }
  if(!remembered) reviewQueue.push(card);   // 忘了的这轮末尾再考一次
  logReview();
  reviewDone++;
  reviewIdx++;
  renderReview();
}

/* ---------- MATERIALS ---------- */
let activeMatTags = new Set();
$$('#matTagRow .tag-pill').forEach(p => {
  p.addEventListener('click', () => {
    p.classList.toggle('active');
    const tag = p.dataset.tag;
    if(activeMatTags.has(tag)) activeMatTags.delete(tag);
    else activeMatTags.add(tag);
  });
});

$('#matCustomTag').addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    e.preventDefault();
    const val = e.target.value.trim();
    if(val && !activeMatTags.has(val)){
      activeMatTags.add(val);
      const row = $('#matTagRow');
      const pill = document.createElement('div');
      pill.className = 'tag-pill active';
      pill.dataset.tag = val;
      pill.textContent = val;
      pill.addEventListener('click', () => {
        pill.classList.toggle('active');
        if(activeMatTags.has(val)) activeMatTags.delete(val);
        else activeMatTags.add(val);
      });
      row.appendChild(pill);
    }
    e.target.value = '';
  }
});

$('#saveMaterialBtn').addEventListener('click', () => {
  const title = $('#matTitle').value.trim();
  const body = $('#matBody').value.trim();
  if(!title || !body){ alert('请填写标题和正文。'); return; }
  const materials = getMaterials();
  materials.unshift({
    id: Date.now().toString(),
    title,
    tags: Array.from(activeMatTags),
    body,
    addedAt: new Date().toISOString()
  });
  setMaterials(materials);
  $('#matTitle').value = '';
  $('#matBody').value = '';
  activeMatTags.clear();
  $$('#matTagRow .tag-pill').forEach(p => p.classList.remove('active'));
  renderMaterials();
  populateMaterialSelect();
});

function renderMaterials(){
  const list = $('#materialList');
  const materials = getMaterials();
  if(materials.length === 0){
    list.innerHTML = '<div class="empty-state">还没有保存的素材。</div>';
    return;
  }
  list.innerHTML = materials.map(m => {
    const wordCount = m.body.trim().split(/\s+/).filter(Boolean).length;
    const dateStr = new Date(m.addedAt).toLocaleDateString();
    return `
    <div class="mat-list-item" data-id="${m.id}">
      <div class="mat-info">
        <div class="mat-title">${escapeHtml(m.title)}</div>
        <div class="mat-tags">${(m.tags||[]).map(t => `<span class="mat-tag">${escapeHtml(t)}</span>`).join('')}</div>
        <div class="mat-meta">${wordCount} 词 · 添加于 ${dateStr}</div>
      </div>
      <div class="mat-actions">
        <button class="btn secondary" data-action="analyze" data-id="${m.id}">标注 →</button>
        <button class="btn danger" data-action="delete" data-id="${m.id}">删除</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('[data-action="analyze"]').forEach(el => {
    el.addEventListener('click', () => {
      const m = getMaterials().find(x => x.id === el.dataset.id);
      if(m){
        $('#pasteArea').value = m.body;
        $$('.tab-btn').forEach(b => b.classList.remove('active'));
        $$('.panel').forEach(p => p.classList.remove('active'));
        $('.tab-btn[data-tab="wordlab"]').classList.add('active');
        $('#panel-wordlab').classList.add('active');
        populateMaterialSelect();
        $('#materialSelect').value = m.id;
      }
    });
  });
  list.querySelectorAll('[data-action="delete"]').forEach(el => {
    el.addEventListener('click', () => {
      if(confirm('删除这份素材？')){
        setMaterials(getMaterials().filter(m => m.id !== el.dataset.id));
        renderMaterials();
        populateMaterialSelect();
      }
    });
  });
}

renderMaterials();
renderCards();
restoreAnalysis();
