primary fuel used for heating and cooking, but wood smoke can cause respiratory and eye problems, and extensive use of wood causes deforestation, a major environmental problem. In contrast, charcoal, made by partially burning wood in a controlled process, is a fuel that creates less smoke than wood does. Moreover, although charcoal costs slightly more than wood, less charcoal is needed to produce the same amount of heat. Therefore, people who use wood as their primary fuel can, without experiencing economic hardship, switch to charcoal and can thereby improve their health and preserve the environment.\"", "The following appeared in a memo from the business manager of Medicine, Inc., a local drugstore.\n\"Most business analysts for the drugstore industry have stated that even when a nation's economy is weak, drugstores' profits are unlikely to decline appreciably. While consumers might put off some kinds of purchases when the economy is slow, prescription and over-the-counter drug purchases are dictated by consumers' health needs, which are independent of the economy. Therefore, Medicine Inc. is likely to continue to have increasing profits and should plan to open an additional drugstore next year.\"", "The following appeared in a memo written by the head of the Gorham School.\n\"Our school cafeteria should make changes in the lunches that it serves in order to improve the health of our students. Several teachers and I have observed that students who eat these meals tend to eat the main course and the dessert, but seldom finish the vegetable portion. This pattern means that students are missing the vital nutritional benefits of fruits and vegetables, which are typically rich in vitamins and minerals. Therefore, the school cafeteria should serve larger fruit and vegetable portions along with smaller main course and dessert portions. This change will be effective because, according to research conducted at the Rose Children's Hospital, children eat the same amount of food served to them — about 55 percent, on average — no matter what the main course is.\"", "The following appeared in the letter to an editor of a Myrian newspaper.\n\"Under Governor Winslow's leadership over the past four years, Myria has enjoyed unprecedented prosperity. Average wage increases this year are higher than they have been at any time since the 1970's, the number of people who report being unemployed has decreased by 10 percent, and construction of new homes is up by one third. In contrast, over the past four years Governor Winslow's opponent, Mr. Homer, has been mayor of a city in which only a small number of new businesses have opened. If Myrians want another four years like the past four years, they should reelect Governor Winslow.\"", "The following appeared in a memo from a member of the Clark City School Board.\n\"Mason Elementary School is faced with a shortage of classroom space. At the same time, parents in our district are increasingly expressing the desire to see improvements in their children's reading abilities. Therefore, we should reduce the number of physical education classes at Mason Elementary and convert part of the gymnasium to class-room space. The school will gain the additional space for classrooms without the cost of extending the building and can use the time that students would have spent in physical education classes to provide more reading instruction. This plan will lead to improvements in students' reading skills.\"", "The following appeared in a memo to managers of Christine's, a chain of craft stores.\n\"Several major newspapers have recently run articles noting an increased interest in pottery. The number of potters in this country has risen by eighteen percent in the past five years, and pottery is particularly gaining popularity on college campuses. In order to take advantage of these trends, Christine's should immediately begin carrying a larger volume of pottery supplies. Since several of our stores have recently experienced a decrease in sales of painting supplies, all store managers should reallocate shelf space from the painting area for the display of pottery. Stores should display posters showing pottery that is designed to appeal to college-age individuals. These actions will undoubtedly increase our profits dramatically.\"", "The following appeared in a newsletter about health published in the country of Sauria.\n\"According to Sauria's leading nutritional experts, a diet high in complex carbohydrates, and low in fat is optimal for good health and longevity. Because this was the diet of the people who lived in ancient Sauria, one would expect them to have had long and healthy lives. Yet the mummified remains of Sauria's ruling classes from two to three thousand years ago show the existence of many medical problems among the ancient Saurians, including dental problems, elevated blood pressure, obesity, heart disease, and early mortality. Clearly, the diet of the ancient Saurians was responsible for these problems. The high incidence of high blood pressure, obesity, and heart disease in Sauria today even among those who have tried low-fat, high-carbohydrate diets further proves that Sauria's leading nutritional experts are wrong.\"", "The following appeared in a newspaper published in the state of Celera.\n\"Speed limits on our state's highways should be eliminated in order to increase our state's prosperity. Because greater speed means more efficient travel, commercial deliveries will be faster, increasing business profits. Elimination of speed limits will also make driving more attractive to motorists, so that more people will use the highways, providing more highway toll revenues for the state. At the same time, safety on our highways will not be affected: daytime speed limits were eliminated last year in the western states of our country, and no significant increase in the number of accidents in these states has been reported.\"", "The following appeared in an editorial on health problems in the country of Corpora.\n\"Some pharmacies now feature ultrasound machines that screen for an elevated risk of stroke. For a fee, a technician presses a probe against the neck to determine whether any plaque has thickened the walls of the main artery leading to the brain. Researchers have shown that a thickening of artery walls is associated with elevated stroke risk, and such scans typically find that anywhere from 5 to 20 percent of clients have detectable plaque. All pharmacies should offer this service, because early detection of increased risk for stroke will encourage clients to consult with their doctors and make important life-style changes to reduce their risk of having a stroke. This in turn will cause a decrease in overall medical costs in Corpora.\"", "The following appeared in an article in Supplements Today.\n\"Dieticians have long known that professional athletes who eat a lot of nuts have higher levels of endurance than those who do not. Researchers have recently discovered that the particular combination of vitamin N and fiber found in some nuts provides a boost for those who participate in strenuous physical activities daily. Both vitamin N and fiber supplements are easily synthesized and widely available. As a result, all those who participate in athletic activities will be able to increase their endurance and win more games by taking vitamin N along with a fiber supplement.\"", "The following is a recommendation from the human resources department at Techforce Computer Company.\n\"Many working parents report that problems related to their childcare arrangements are a major reason for absenteeism from their jobs. Bridgewell Corporation, a tele-communications company, implemented an on-site childcare program and after one year, the company reported that unscheduled absences had declined by 25 percent. Since Techforce has had an increase in unscheduled employee absences over the past year, we should therefore implement our own on-site childcare program. The program will undoubtedly reduce our unscheduled employee absences, resulting in significantly increased productivity.\"", "The following appeared in a memo from a vice president of a large, highly diversified company.\n\"Ten years ago our company had two new regional office buildings built in two different regions. The buildings were erected by two different construction companies — Alpha and Zeta. Even though the two buildings had virtually identical floor plans, the building constructed by Zeta cost 30 percent more to build, and its expenses for maintenance last year were twice those of the building constructed by Alpha. Furthermore, the energy consumption of the Zeta building has been higher than that of the Alpha building every year since its construction. Such data, plus the fact that Alpha has a stable workforce with little employee turnover, indicate that we should use Alpha Construction Company, rather than Zeta, for all future building projects.\"", "The following appeared in a memo from the president of Bower Builders, a company that constructs new homes.\n\"A nationwide survey reveals that the two most desired home features are a bathroom with a whirlpool tub and a large kitchen. Homes in a nearby development built by our competitor, Domus Construction, have whirlpool tubs and have sold much faster and at significantly higher prices than the average. To increase our sales and profits, we should include whirlpool tubs and larger kitchens as standard features in all our new homes. Since our recent buyers have voiced no complaints about small yards, we can also increase profits by decreasing the size of our yards.\"", "The following appeared in a memo from a budget planner in Sophia County.\n\"Census data indicate that the number of retired couples without children who are moving into Sophia County is steadily rising; private schools in our county report substantial increases in enrollment; and a statewide survey of parents shows that over 10 percent now support the idea of home schooling instead of public schooling funded by the county government. Such demographic trends suggest that our county will not have to construct new school buildings and that we can therefore decrease the budget for county-funded public schools.\"", "The following appeared in a magazine focusing on health and fitness.\n\"A recent study of several nutritional supplements showed that subjects who took a daily pill containing luceen had significantly better vision of distant objects than subjects in the study who took other nutritional supplements. Luceen appears naturally in a tasty fruit that grows on the island of Bonopia, and very few inhabitants of that island wear eyeglasses or other corrective lenses. Such evidence suggests that people who develop vision problems should take regular luceen supplements.\"", "The following appeared in a memo from the manager of television station KICK.\n\"A nationwide survey reveals that a sizeable majority of men would like to see additional sports programs on television. After television station WACK increased its sports broadcasts, its share of the television audience in its viewing area almost doubled. To gain a larger audience share in our area, and thus increase company profits, KICK should also revise its broadcast schedule to include more sports coverage.\"", "The following appeared in a memo from the director of a large group of hospitals.\n\"In a laboratory study of liquid antibacterial hand soaps, a concentrated solution of Nadasept killed 40 percent more bacteria than the liquid hand soaps currently used in our hospitals. During a subsequent test of Nadasept at our hospital in Saluda, that hospital reported significantly fewer cases of patient infection than did any of the other hospitals in our group. Therefore, to prevent serious patient infections, we should supply Nadasept at all hand washing stations throughout our hospital system.\"", "The following appeared in a memo from the economic minister of the small country Paucia.\n\"Using a newly developed variety of seed, farmers in our neighboring country Abundia produced 80 percent more rice last year than in any previous year. To increase the income of farmers in our own country, we should encourage them to cultivate this new variety of rice rather than some of their traditional crops. Such high yields of rice will also improve our country's balance of trade by enabling us to begin exporting it.\"", "The following appeared in a memo from the chief operating officer of the Presto Manufacturing Company.\n\"Since orders for our major product increased by over 200 percent last quarter, we should promptly expand production by building a new manufacturing plant in Summit City. Summit City is the ideal location for the new plant because it has low property taxes, extensive blocks of land available for immediate purchase, and a large number of residents who are not currently employed.\"", "The following appeared in a memo from the president of a company that makes breakfast cereals.\n\"In a recent study, subjects who ate soybeans at least five times per week had significantly lower cholesterol levels than subjects who ate no soy products. By fortifying our Wheat-O cereal with soy protein, we can increase sales by appealing to additional consumers who are concerned about their health. This new version of Wheat-O should increase company profits and, at the same time, improve the health of our customers.\"", "The following appeared in a letter from the mayor of Tudor City.\n\"After a major airline chose Yorkville as its regional flight hub, the number of businesses in that city almost doubled and local tax revenue increased by 50 percent. In addition, as travel to Yorkville became easier, most respondents to a survey of the country's top executives identified Yorkville as a desirable place to transact business. To secure efficient transportation for Tudor City and stimulate our local economy, we should build a new airport, like the one in Yorkville, that is suitable for a regional flight hub.\"", "Blue City Highway had always been notorious for its tight curves and poor roadway visibility, and the accident rate there was generally very high. Last year the highway was redesigned to broaden the curves and improve roadway visibility. Drivers report that they now feel much safer driving on the highway and that the redesign has been a big improvement. But the number of accidents on the highway has not been significantly lower in the six months since the redesign than it was in the six months before the redesign. Therefore, the redesign clearly did not improve the curves and roadway visibility enough to make a difference.", "One kind of brain-scanning device is used by doctors to monitor normal as well as abnormal activity in a patient's brain. The device provides precise measurements of blood flow in the brain, a known indicator of how the brain is working. Unfortunately, the device requires patients to remain completely still with their heads in the scanning machine, which makes a very loud noise. Under these uncomfortable conditions, it is doubtful that doctors can get accurate measurements. A new head-mounted device that measures eye movements rather than blood flow and allows patients to move around will undoubtedly provide better brain measurements. Thus, the new head-mounted device should replace the older device at all hospitals and research institutions.", "The following appeared in a health newsletter.\n\"According to a recent study, people with many social ties report catching colds less often than do people with few social ties. Consequently, researchers conclude that having an active social life probably helps strengthen the immune system. The researchers note that catching a cold — one of a family of highly contagious viruses — gives the cold-sufferer temporary immunity to that virus in the future, but not to the many other related viruses. Merely being exposed to a new cold virus, however, is not enough for a person to catch a cold, since a strong immune system can successfully fight off some new viruses. Thus, in order to prevent catching a cold, people should strengthen their immune systems by becoming more active socially.\"", "The following editorial appeared in a newspaper in the country of Solaria.\n\"The Eliot Valley region was primarily agricultural twenty years ago. In the past twenty years, however, many computer-chip manufacturers have opened factories there. A recent study found that water pollution in the region was worse than in any other region in the country. Moreover, the computer-chip factories, which use large quantities of water to manufacture the chips, are probably responsible for the low levels of water in the region's lakes and reservoirs. Therefore, if the region's computer-chip makers had limits placed on the amount of water they could use, water quality would improve.\"", "The following appeared in an editorial in the Seatown newspaper.\n\"Seatown has a large port exclusively for fishing boats, whose owners pay fees for the upkeep of the docks and for facilities for cleaning engines and repairing nets. In recent years, declining fish populations have decreased fishing revenue and forced many owners to stop fishing altogether. As a result, the port has a high vacancy rate and port managers are considering allowing pleasure boats, including cruise ships and other large vessels, to use the port in order to increase revenue. But allowing pleasure boats into the port would be a mistake, because the fishing boats would be forced out of the port. We should preserve the port for the fishing fleet, which, unlike pleasure boats, contributes to the prosperity of Seatown.\"", "The following appeared in a Brenton newspaper.\n\"The Brenton power plant draws water from Scott's River for its cooling system and releases the warmed water back into the river. The town council recommends that the plant install a more efficient cooling system that uses less water, claiming it will be more environmentally sound. However, in Uptown, where the new system is used, a study found that the complex network of pipes in the new system tends to accumulate algae. The build up of algae can be avoided by scrubbing the pipes, which is costly, or by adding an herbicide to the water in the pipes to prevent algae accumulation. But water containing the herbicide cannot be released back into the river and it is known that low water levels can harm river ecosystems accustomed to higher levels. Therefore, Brenton power plant should continue to use the old cooling system exclusively.\"", "The following appeared in a letter to the editor of the Maple City newspaper.\n\"Twenty years ago Pine City established strict laws designed to limit the number of new buildings that could be constructed in the city. Since that time the average housing prices in Pine City have increased considerably. Chestnut City, which is about the same size as Pine City, has over the past twenty years experienced an increase in average housing prices similar to Pine City, but Chestnut City never established any laws that limit new building construction. So it is clear that laws limiting new construction have no effect on average housing prices. So if Maple City were to establish strict laws that limit new building construction, these laws will have no effect on average housing prices.\"", "The following appeared in a memo from the Principal of Sherwood Junior High School.\n\"It appears that the lighting in Sherwood High's classrooms, which have large windows but minimal overhead light sources, is impairing student academic performance and teacher morale. Records show that during December and January, the two months with the fewest hours of daylight, attendance rates fall, average daily class participation drops, and grades decline. Teacher resignations are also highest during these months. According to a study of Tundra Vocational School, which experiences entire seasons with little daylight, students' grade point averages increased when Day Glow light bulbs, which mimic sunlight, were installed in classrooms. This study suggests that Sherwood can improve students' academic performance and teachers' morale by using Day Glow light bulbs in winter.\"", "The following appeared in a memo from the vice president of marketing at Dura-Sock, Inc.\n\"A recent study of Dura-Sock wearers suggests that our company is wasting the money it spends on its patented 'Endure' manufacturing process, which ensures that our socks are strong enough to last for two years. Dura-Sock has always advertised its use of the 'Endure' process, but the new study shows that the average Dura-Sock customer actually purchases new Dura-Socks every three months. Furthermore, Dura-Sock customers surveyed in our largest market, northeastern United States cities, say that they most value Dura-Sock's stylish appearance and availability in many colors. These findings suggest that Dura-Sock can increase its profits by discontinuing its use of the 'Endure' manufacturing process.\"", "The following proposal was raised at a meeting of the Franklin City Council.\n\"Franklin Airport, which is on a bay, is notorious for flight delays. The airport management wants to build new runways to increase capacity but can only do so by filling in 900 acres of the bay. The Bay Coalition organization objects that filling in the bay will disrupt tidal patterns and harm wildlife. But the airport says that if it is permitted to build its new runways, it will fund the restoration of 1,000 acres of wetlands in areas of the bay that have previously been damaged by industrialization. This plan should be adopted, for it is necessary to reduce the flight delays, and the wetlands restoration part of the plan ensures that the bay's environment will actually be helped rather than hurt.\"", "The following was published by a consumer protection agency.\n\"Three years ago, So-Low launched a nationwide ad campaign, focusing heavily on sunny regions and distributing free sunglasses there. But although So-Low sunglasses cost less than higher-priced brands, they block a smaller proportion of the Sun's rays, including the type of rays known to damage the eyes even when the person wearing the sunglasses feels no discomfort. A recent study suggests that So-Low sunglasses can actually increase the risk of damage to people's eyes by creating a false sense of security. The study shows a sharp increase in the incidence of vision problems in the sunny regions over the past three years. These findings suggest that anyone concerned about eye damage from the Sun should avoid So-Low brand and instead either pay for higher-priced brands or wear no sunglasses at all.\"", "A recently completed study shows that people dwelling in stairs-only apartment buildings (that is, buildings without elevators) live an average of three years longer than do people who live in buildings with both elevators and stairs. A second study shows that elderly residents of buildings with elevators make, on average, twice as many visits to doctors each year as do elderly residents of buildings without elevators. These findings suggest that even a very moderate amount of daily exercise, such as that required to use the stairs leading to and from one's apartment, can increase people's health and longevity. The findings also suggest that new apartment buildings should be constructed with as few elevators as possible.", "The following appeared in a clothing industry trade journal in the country of Sartoria.\n\"A popular fashion magazine recently conducted a survey of consumers' opinions about clothing prices, using prepaid mailing envelopes. Eighty-nine percent of the approximately 20,000 respondents reported that they were either 'dissatisfied' or 'very dissatisfied' with current clothing prices. The large number of responses indicates that the Sartorian clothing industry is at risk. Given the survey results, clothing manufacturers must find a way to reduce prices in order to keep their existing customers and maintain their businesses.\"", "The following appeared in a memo from Grocery Town's regional manager.\n\"The new Grocery Town store in Elm City, located near a new residential development, has a 'high-low' pricing policy where average prices are relatively high, but deep discounts are offered on some items in weekly specials. This store has been showing increased profits every month as the nearby residential development gets closer to full capacity. It follows that people prefer a pricing policy where they can find bargains on specific items. Since there is a new residential development planned in Oak City, we should change the pricing policy at all of our Oak City stores from our current 'everyday low prices' policy to a 'high-low' policy. This will increase the profits at all of our stores in Oak City.\"", "The following is a memo from the business manager of Valu-Mart stores.\n\"Over 70 percent of the respondents to a recent survey reported that they are required to take more work home with them from the workplace than they were in the past. Since Valu-Mart has not seen impressive sales in its office-supply departments in the past, we should take advantage of this work-at-home trend by increasing at all Valu-Mart stores the stock of home office machines such as printers, small copy machines, paper shredders, and fax machines. We will also increase stock of office supplies such as paper, pens, and staplers. With these changes, our office-supply departments will become the most profitable component of our stores.\"", "The following appeared in a newsletter from a national astronomy association.\n\"Various sources are predicting higher-than-average temperatures across the country next winter, including in Sun City, the traditional location of our yearly winter conference. Higher winter temperatures are sure to result in higher-than-usual tourism in Sun City, a location already known for its attractive beaches and good weather. Hotels will have fewer rooms available, transportation will be more difficult to reserve, and public places such as parks and restaurants will be more crowded. These conditions are likely to significantly reduce attendance at the conference. We should therefore move our conference to a city less popular with winter tourists.\"", "The following is a letter to the editor of the Waymarsh Times.\n\"Traffic problems here in Waymarsh are obviously reaching record levels. While just three months ago it would take me 15 minutes to get to work, it now takes closer to 25. Waymarsh should follow the example of our neighboring city Gearsville. Last year, Gearsville implemented a policy that rewards people who share rides to work with coupons for free gas. Pollution levels in Gearsville have dropped since the policy was implemented, and several friends who live in Gearsville tell me that their trip to work is quicker than it used to be. With the terrible traffic and high pollution in Waymarsh, we must implement a policy similar to Gearsville's.\"", "The following appeared in a health newsletter.\n\"A ten-year nationwide study of the effectiveness of wearing a helmet while bicycling indicates that ten years ago, approximately 35 percent of all bicyclists reported wearing helmets, whereas today that number is nearly 80 percent. Another study, however, suggests that during the same ten-year period, the number of accidents caused by bicycling has increased 200 percent. These results demonstrate that bicyclists feel safer because they are wearing helmets and they take more risks as a result. Thus, to reduce the number of serious injuries from bicycle accidents, the government should concentrate more on educating people about bicycle safety and less on encouraging or requiring bicyclists to wear helmets.\"", "The following is a memo from the president of Cyberell Computer Company.\n\"All of our customer-service employees recently attended a two-day retreat during which they received retraining in effective customer service. Subsequently, Cyberell's employee-performance study showed that the retreat benefited new employees — those who have worked with Cyberell for less than two years — far more than it did experienced employees. According to the study, after the retreat new employees were able to handle an average of ten percent more calls per hour, and the total number of customer complaints about new employees decreased, but experienced employees showed little improvement in these areas. Therefore, Cyberell should send only new employees to future retreats and should use the resulting savings to double the length of the retreats so that the retreats will be more likely to yield optimum employee performance.\"", "The following appeared in the Pine City Gazette.\n\"Fifteen years ago, Pine City launched an electricity-conservation program that reimbursed residents some of the cost for replacing energy-wasteful motors, home office equipment, and home appliances with energy-efficient ones. For ten years, spending on this program increased annually, and annual total energy consumption declined. But spending on the program began to decline five years ago, and since then Pine City's total electricity consumption has increased sharply. If this increased usage continues, the city will have to build a costly new power plant. Obviously the best way to avoid this expense is to increase reimbursement to residents for replacing energy-wasteful equipment. This will reduce energy usage to the levels of five years ago.\"", "The following appeared in a health newsletter.\n\"Eating a heavy meal may increase the risk of heart attack. A recent survey of 2,000 people who had had a heart attack revealed that 158 of them said they had eaten a heavy meal within 24 hours before their heart attack, and 25 of them said they had eaten a heavy meal within 2 hours before their heart attack. Eating and digesting food releases hormones into the bloodstream and temporarily increases heart rate and blood pressure slightly. Both of these things put stress on the heart. Therefore, people who are at risk of having a heart attack can lower that risk by not overeating.\"", "The following is a memo from the business manager of National Daily News.\n\"To expand the home delivery service of our national newspaper, we should concentrate on the state of Urba rather than on the state of Sylva. First, the population of Sylva is more widely dispersed, which would require us to spend more money to deliver our papers in that area, resulting in less profit per customer. Second, a long-term study of television viewing habits suggests that Sylvans prefer local to national news, since they spend twice as much time viewing local news programs as they do viewing national programs. Finally, because events in Urba receive more coverage in our newspaper than do events in Sylva, we can expect Urbans to be more interested in reading our newspaper.\"", "The following is a recommendation from the president of Appleby College.\n\"Whereas Appleby College holds class reunions every five years, Edelston College holds annual reunions for all classes, during which Edelston's alumni are treated to banquets, lectures, and student performances, enhancing their loyalty to the college and their willingness to donate money. Edelston College receives most of its alumni donations during or shortly after these reunions. Therefore, the best way for Appleby to increase its alumni donations is to offer similar reunion activities and to have each graduating class hold annual reunions.\"", "The following appeared in a health magazine.\n\"It has long been believed that getting at least eight hours of sleep a night is good for health. But a recent six-year study of adult sleeping habits found that people who reported sleeping eight or more hours a night had a higher rate of certain health problems than did those who reported sleeping seven hours a night. People who reported sleeping five hours a night also had an increased rate of the health problems, but this increase was slight compared to that for people who reported sleeping eight or more hours a night. Clearly, people should try to get seven hours of sleep, and they should worry more about getting too much sleep than too little.\"", "The vice president for human resources at Climpson Industries sent the following recommendation to the company's president.\n\"In an effort to improve our employees' productivity, we should implement electronic monitoring of employees' Internet use from their workstations. Employees who use the Internet from their workstations need to be identified and punished if we are to reduce the number of work hours spent on personal or recreational activities, such as shopping or playing games. By installing software to detect employees' Internet use on company computers, we can prevent employees from wasting time, foster a better work ethic at Climpson, and improve our overall profits.\"", "The following appeared in an editorial in the Garden City Gazette.\n\"To address the parking problems in our downtown business district, it has been proposed that the city increase parking capacity by building a four-story parking garage. However, this project would cost more than it would to improve the downtown pedestrian plaza. Because the pedestrian plaza is an important attraction that draws people to the downtown area, improvements to it will increase business for downtown merchants. The merchants' higher profits will ultimately produce increased tax revenues for the city. Therefore, we should invest in the plaza improvements first and then use the revenues thus generated to pay for the construction of the parking garage.\"", "The following appeared in the Sherwood Times newspaper.\n\"A recent study reported that pet owners have longer, healthier lives on average than do people who own no pets. Specifically, dog owners tend to have a lower incidence of heart disease. In light of these findings, Sherwood Hospital should form a partnership with Sherwood Animal Shelter to institute an 'adopt-a-dog' program. The program would encourage dog ownership for patients recovering from heart disease, which will help reduce medical costs by reducing the number of these patients needing ongoing treatment. In addition, the publicity about the program will encourage more people to adopt pets from the shelter, which will reduce the risk of heart disease in the general population.\"", "The following appeared in the annual report of a chain of stores that sell supplies for do-it-yourself home improvements.\n\"Current reports indicate that sales of new homes nationwide declined by 9 percent during the past year, while sales of existing homes increased by 16 percent. Thus we can expect that the percentage of homeowners who will be making repairs or improvements to their homes will also increase. In addition, people who buy existing homes will have more money left over after the purchase to spend on home improvements. Finally, people who buy existing homes are more likely to make improvements themselves, as opposed to paying someone else. These factors combined indicate we can expect an increasing demand for products in all our stores nationwide, thus increasing our profits in the coming year.\"", "The following appeared in an environmental newsletter published in Tria Island.\n\"The marine sanctuary on Tria Island was established to protect certain marine mammals. Its regulations ban dumping and offshore oil drilling within 20 miles of Tria, but fishing is not banned. Currently many fish populations in Tria's waters are declining, a situation blamed on pollution. In contrast, the marine sanctuary on Omni Island has regulations that ban dumping, offshore oil drilling, and fishing within 10 miles of Omni and Omni reports no significant decline in its fish populations. Clearly, the decline in fish populations in Tria's waters is the result of overfishing, not pollution. Therefore, the best way to restore Tria's fish populations and to protect all of Tria's marine wildlife is to abandon our regulations and adopt those of Omni.\"", "The following appeared in an editorial in the local newspaper of Workville.\n\"Workers should be allowed to reduce their workload from 40 to 25 or even 20 hours per week because it is clear that people who work part-time instead of full-time have better health and improved morale. One store in Workville, which began allowing its employees to work part-time last year, reports that fewer days of sick leave were taken last year than in previous years. In contrast, the factory in Workville, which does not allow any of its employees to work part-time, had a slight increase in the number of days of sick leave taken last year. In addition, a recent survey reports that most of the store employees stated that they are satisfied with their jobs, while many of the factory employees stated that they are dissatisfied with their jobs.\"", "The following is a memo from the principal of Academia High School.\n\"Academia High School should abolish its after-school performing-arts programs and replace them with computer-technology programs. When nearby Techno High School did so last year, total enrollment in all of its after-school activities remained about the same. Moreover, on entering college, many Techno students chose a major directly related to their after-school activities. On the other hand, last year only 10 percent of Academia's graduating seniors chose performing arts as their major field of study in their first year of college, clearly indicating that most students do not have a strong interest in the performing arts.\"", "The following was taken from a guide for aspiring writers.\n\"New writers usually cannot convince large, prestigious publishers that their work is marketable, so they must first publish with smaller, less well-known presses to establish a sales record. But the editors of Mystery Writers Magazine have good news for aspiring writers: the number of mystery novels published in the last two years has grown significantly, and more people read mysteries than any other type of novel. In addition, almost half of the mystery novels published last year were written by first-time novel writers. Since there is apparently an expanding market for mystery novels, all publishers will want to increase the number of mystery novels they publish. Therefore, new writers should write mystery novels to increase their chances for first-time publication with a larger, prestigious company.\"", "The following is a memorandum from the business manager of WLSS television station.\n\"Over the past year, our late-night news program has devoted increasingly more time to covering national news and less time to covering weather and local news. During the same time period, most of the complaints we received from viewers were concerned with the station's coverage of weather and local news. In addition, several local businesses that used to run advertisements during our late-night news program have just cancelled their advertising contracts with us. Therefore, in order to attract more viewers to our news programs and to avoid losing any further advertising revenues, we should expand the coverage of weather and local news on all our news programs.\"", "The following is part of a letter from the Brookfree School Board.\n\"As part of our new educational reform program, we identified ten schools most in need of immediate improvement. An advisory committee is now recommending that we hire consultants to study further the schools' problems and to propose a plan of action. Only two years ago, however, another group of consultants determined that several schools in our district had problems because their principals were inexperienced. Thus, if we want to see immediate improvement in our schools and save the district the money it would spend on hiring more consultants, we should replace all the principals in the ten worst schools with ten of our most experienced principals in the district.\"", "The following appeared in an editorial in the Mason City newspaper.\n\"At present, Mason City residents seldom use the nearby Mason River for any kind of recreational activity, even though surveys of the region's residents consistently rank water sports (swimming, fishing, and boating) as a favorite form of recreation. Since there have been complaints about the quality of the water in the river, residents must be avoiding the river because they think that it is not clean enough. But that situation is about to change: the agency responsible for rivers in our region has announced plans to clean up Mason River. Therefore, recreational use of the river is likely to increase, so the Mason City council will need to increase its budget for improvements to the publicly owned lands along the Mason River.\"", "The following report appeared in a memo from the vice president of the Southside Transportation Authority.\n\"We should abandon our current five-year plan to purchase additional buses to serve the campus of Southside University, because students there are unlikely to use them. Consider the results of the recent campaign sponsored by the Environmental Club at Southside University: in a program on the campus radio station, the club asked students to call in and pledge that they would commute to school by bus instead of by automobile at least one day per week. Only ten percent of the students called in and pledged. In view of the campaign's lack of success, we can assume that the bus service we currently offer will continue to be sufficient to serve the university.\"", "The following appeared in the editorial section of an educational publication.\n\"One study at Lee University found that first-semester grades of teenage students who had always attended public, tax-supported schools were slightly lower than the grades of students who had received some home schooling instruction by parents at home, although the grade differences disappeared in the second semester. These results suggest that home schooling is the best way to educate teenage children. Therefore, instead of spending more money on public education, the government should provide financial incentives so that home schooling is an option for more parents. After all, children schooled at home receive more attention, since they are taught by the best possible teacher: a parent who has a high stake in educating them well.\"", "The following appeared in a report of the Committee on Faculty Promotions and Salaries at Elm City University.\n\"During her 17 years as a professor of botany, Professor Thomas has proved herself to be well worth her annual salary of $50,000. Her classes are among the largest at the university, demonstrating her popularity among students. Moreover, the money she has brought to the university in research grants has exceeded her salary in each of the last two years. Therefore, in consideration of Professor Thomas' demonstrated teaching and research abilities, we recommend that she receive a $10,000 raise and a promotion to Department Chairperson; without such a raise and promotion, we fear that Professor Thomas will leave Elm City University for another college.\"", "The following appeared in a newsletter distributed at a recent political rally.\n\"Over the past year, the Consolidated Copper Company (CCC) has purchased over one million square miles of land in the tropical nation of West Fredonia. Mining copper on this land will inevitably result in pollution and environmental disaster, since West Fredonia is home to several endangered animal species. But such disaster can be prevented if consumers simply refuse to purchase products that are made with CCC's copper until the company abandons its mining plans.\"", "The article entitled \"Eating Iron\" in last month's issue of Eating for Health reported that a recent study found a correlation between high levels of iron in the diet and an increased risk of heart disease. Further, it is well established that there is a link between large amounts of red meat in the diet and heart disease, and red meat is high in iron. On the basis of the study and the well-established link between red meat and heart disease, we can conclude that the correlation between high iron levels and heart disease, then, is most probably a function of the correlation between red meat and heart disease.", "The following appeared as a letter to the editor of a national newspaper.\n\"Your recent article on corporate downsizing* in the United States is misleading. The article gives the mistaken impression that many competent workers who lost jobs as a result of downsizing face serious economic hardship, often for years, before finding other suitable employment. But this impression is contradicted by a recent report on the United States economy, which found that since 1992 far more jobs have been created than have been eliminated. The report also demonstrates that many of those who lost their jobs have found new employment. Two-thirds of the newly created jobs have been in industries that tend to pay above-average wages, and the vast majority of these jobs are full-time.\"\n*Downsizing is the process in which corporations deliberately reduce the number of their employees.", "According to a poll of 200 charitable organizations, donations of money to nonprofit groups increased by nearly 25 percent last year, though not all charities gained equally. Religious groups gained the most (30 percent), followed by environmental groups (23 percent), whereas educational institutions experienced only a very small increase in donations (3 percent). This poll indicates that more people are willing and able to give money to charities but that funding for education is not a priority for most people. These differences in donation rates must result from the perception that educational institutions are less in need of donations than are other kinds of institutions.", "A new study collected data that shows that people who snore are more likely to gain weight than are people who do not snore. It is well known that many people who snore also stop breathing frequently during the night for a few seconds, a condition called sleep apnea. The interruption of breathing wakes the person — often so briefly that the waking goes unnoticed — and can leave the person too tired during the day to exercise. Anyone who snores, therefore, should try to eat less than the average person and to exercise more.", "The following appeared in the editorial section of a local newspaper.\n\"The librarians in our town's school system have reported that the number of trips that our students make to their school library on a voluntary basis has decreased significantly in recent years. For example, the average seventh-grade student visited the school library five times last year, but four of those visits were part of required classroom activities. This shows that our students are reading less than in the past. To address this problem, our town needs to improve the atmosphere of the libraries so that they will be comfortable places in which to work. If students view the libraries as uncomfortable, then they are unlikely to want to spend much time there.\"", "The following appeared in an editorial in a business magazine.\n\"Although the sales of Whirlwind video games have declined over the past two years, a recent survey of video-game players suggests that this sales trend is about to be reversed. The survey asked video-game players what features they thought were most important in a video game. According to the survey, players prefer games that provide lifelike graphics, which require the most up-to-date computers. Whirlwind has just introduced several such games with an extensive advertising campaign directed at people 10 to 25 years old, the age-group most likely to play video games. It follows, then, that the sales of Whirlwind video games are likely to increase dramatically in the next few months.\"", "The following appeared in the editorial section of Monroetown's local newspaper.\n\"Mayor Brown was recently re-elected by a clear majority of 52 percent of Monroetown's voters. Her re-election, however, does not show that most people in our town favored Mayor Brown's proposal for tax reduction over that of her opponent, Mr. Greene, who proposed raising taxes to improve education. It has been shown that voters nationwide tend to re-elect people already in office, regardless of candidates' proposals. In fact, a local survey after the election showed most people in Monroetown disagreed with Mayor Brown's proposal. Clearly most people in Monroetown favor improving education and therefore approve of Mr. Greene's proposal despite the fact that they did not vote for him.\"", "The following is a memorandum from the director of personnel to the president of Get-Away Airlines.\n\"Since our mechanics are responsible for inspecting and maintaining our aircraft, Get-Away Airlines should pay to send them to the Quality-Care Seminar, a two-week seminar on proper maintenance procedures. I recommend this seminar because it is likely to be a wise investment, given that the automobile racing industry recently reported that the performance of its maintenance crews improved markedly after their crews had attended the seminar. These maintenance crews perform many of the same functions as do our mechanics, including refueling and repairing engines. The money we spend on sending our staff to the seminar will inevitably lead to improved maintenance and thus to greater customer satisfaction along with greater profits for our airline.\"", "The following is a letter to the editor of an environmental magazine.\n\"The decline in the numbers of amphibians worldwide clearly indicates the global pollution of water and air. Two studies of amphibians in YosemiteNational Park in California confirm my conclusion. In 1915 there were seven species of amphibians in the park, and there were abundant numbers of each species. However, in 1992 there were only four species of amphibians observed in the park, and the numbers of each species were drastically reduced. The decline in Yosemite has been blamed on the introduction of trout into the park's waters, which began in 1920 (trout are known to eat amphibian eggs). But the introduction of trout cannot be the real reason for the Yosemite decline because it does not explain the worldwide decline.\"", "The following is a letter to the editor of the Atticus City newspaper.\n\"Former Mayor Durant owes an apology to the city of Atticus. Both the damage to the River Bridge, which connects Atticus to Hartley, and the traffic problems we have long experienced on the bridge were actually caused 20 years ago by Durant. After all, he is the one who approved the construction of the bridge. If he had approved a wider and better-designed bridge, on which approximately the same amount of public money would have been spent, none of the damage or problems would have occurred. Instead, the River Bridge has deteriorated far more rapidly over the past 20 years than has the much longer DerbyBridge up the river. Even though the winters have been severe in the past several years, this is no excuse for the negligence and wastefulness of Durant.\"", "The following is a letter to the head of the tourism bureau on the island of Tria.\n\"Erosion of beach sand along the shores of Tria Island is a serious threat to our island and our tourist industry. In order to stop the erosion, we should charge people for using the beaches. Although this solution may annoy a few tourists in the short term, it will reduce the number of people using the beaches and will raise money for replenishing the sand. Replenishing the sand, as was done to protect buildings on the nearby island of Batia, will help protect buildings along our shores, thereby reducing these buildings' risk of additional damage from severe storms. And since the areas along the shore will be more attractive as a result, the beaches will be preserved and the area's tourist industry will improve over the long term.\"", "The following is from an editorial in the Midvale Observer, a local newspaper.\n\"Ever since the 1950's when television sets began to appear in the average home, the rate of crimes committed by teenagers in the country of Alta has steadily increased. This increase in teenage crime parallels the increase in violence shown on television. According to several national studies, even very young children who watch a great number of television shows featuring violent scenes display more violent behavior within their home environment than do children who do not watch violent shows. Furthermore, in a survey conducted by the Observer, over 90 percent of the respondents were parents who indicated that prime-time television — programs that are shown between 7 p.m. and 9 p.m. — should show less violence. Therefore, in order to lower the rate of teenage crime in Alta, television viewers should demand that television programmers reduce the amount of violence shown during prime time.\"", "The following appeared in the editorial section of a health and fitness magazine.\n\"In a study of the effects of exercise on longevity, medical researchers tracked 500 middle-aged men over a 20-year period. The subjects represented a variety of occupations in several different parts of the country and responded to an annual survey in which they were asked: How often and how strenuously do you exercise? Of those who responded, the men who reported that they engaged in vigorous outdoor exercise nearly every day lived longer than the men who reported that they exercised mildly only once or twice a week. Given the clear link that this study establishes between longevity and exercise, doctors should not recommend moderate exercise to their patients but should instead encourage vigorous outdoor exercise on a daily basis.\"", "The following appeared in a letter to the editor of a local newspaper.\n\"Too much emphasis is placed on the development of reading skills in elementary school. Many students who are discouraged by the lonely activity of reading turn away from schoolwork merely because they are poor readers. But books recorded on audiocassette tape provide an important alternative for students at this crucial stage in their education, one the school board should not reject merely because of the expense involved. After all, many studies attest to the value of allowing students to hear books read aloud; there is even evidence that students whose parents read to them are even more likely to become able readers. Thus, hearing books on tape can only make students more eager to read and to learn. Therefore, the school board should encourage schools to buy books on tape and to use them in elementary education.\"", "The following is taken from an advertisement placed in a weekly business magazine by the DickensAcademy.\n\"We distributed a survey to senior management at International Mega-Publishing, Inc. The result of the survey clearly indicates that many employees were well prepared in business knowledge and computer skills, but lacked interpersonal skills to interact gracefully with customers. International Mega-Publishing decided to improve customer satisfaction by sending their newly hired employees to our one-day seminars. Since taking advantage of our program, International Mega-Publishing has seen a sharp increase in sales, an indication that the number of their disgruntled customers has declined significantly. Your company should hire Dickens and let us turn every employee into an ambassador for your company.\"", "The following is a letter to the editor of a local newspaper.\n\"As a local merchant, I wish to support the development of a ski resort in the state park north of our township. Along with many other merchants who favor the proposal by Ski the Slopes, Incorporated, I would, of course, experience a growth in my business. But I also know how much more prosperous, not to mention lively and interesting, our community would be if tourism increased. Since the main opposition comes from a few environmentalists* who do not even live in this community, I see no reason to give in to their views. The First National Bank has finally researched the project and agreed to fund it. As a result, I see no reason to delay development of the resort.\"\nEnvironmentalists are people who advocate the preservation of the natural environment.", "The Trash-Site Safety Council has recently conducted a statewide study of possible harmful effects of garbage sites on the health of people living near the sites. A total of five sites and 300 people were examined. The study revealed, on average, only a small statistical correlation between the proximity of homes to garbage sites and the incidence of unexplained rashes among people living in these homes. Furthermore, although it is true that people living near the largest trash sites had a slightly higher incidence of the rashes, there was otherwise no correlation between the size of the garbage sites and people's health. Therefore, the council is pleased to announce that the current system of garbage sites does not pose a significant health hazard. We see no need to restrict the size of such sites in our state or to place any restrictions on the number of homes built near the sites.", "The nation of Claria covers a vast physical area. But despite wide geographic differences, many citizens are experiencing rising costs of electricity. A recent study of household electric costs in Claria found that families who cooled their houses with fans alone spent more on electricity than did families using air conditioners alone for cooling. However, those households that reported using both fans and air conditioners spent less on electricity than those households that used either fans or air conditioners alone. Thus, the citizens of Claria should follow the study's recommendation and use both air conditioners and fans in order to save money on electricity.", "As people grow older, an enzyme known as PEP increasingly breaks down the neuropeptide chemicals involved in learning and memory. But now, researchers have found compounds that prevent PEP from breaking neuropeptides apart. In tests, these compounds almost completely restored lost memory in rats. The use of these compounds should be extended to students who have poor memory and difficulty in concentrating — and therefore serious problems in school performance. Science finally has a solution for problems neither parents nor teachers could solve.", "In a study of reading habits of Leeville citizens conducted by the University of Leeville, most respondents said they preferred literary classics as reading material. However, a follow-up study conducted by the same researchers found that the type of book most frequently checked out of each of the public libraries in Leeville was the mystery novel. Therefore, it can be concluded that the respondents in the first study had misrepresented their reading habits."];

/* ================= 模块二逻辑 ================= */
let topicCat = 'exam', topicCur = null, examSub = 'all';
bindPillGroup('#panel-topic .pill[data-cat]', 'cat', v => {
  topicCat = v;
  $('#examSubRow').style.display = v === 'exam' ? 'block' : 'none';
  nextTopic();
});
bindPillGroup('#examSubRow .pill[data-sub]', 'sub', v => { examSub = v; nextTopic(); });

function getAiQuestions(mod){ return LS.get(KEYS.aiq, {})[mod] || []; }
function saveAiQuestion(mod, q){
  const all = LS.get(KEYS.aiq, {});
  (all[mod] = all[mod] || []).push(q);
  LS.set(KEYS.aiq, all);
}
function pickQuestion(pool, doneKey){
  const done = LS.get(KEYS.done, {});
  const doneSet = new Set(done[doneKey] || []);
  let fresh = pool.filter(q => !doneSet.has(q.id));
  if(!fresh.length){ done[doneKey] = []; LS.set(KEYS.done, done); fresh = pool; }
  return fresh[Math.floor(Math.random() * fresh.length)];
}
function markDone(doneKey, id){
  const done = LS.get(KEYS.done, {});
  (done[doneKey] = done[doneKey] || []).push(id);
  LS.set(KEYS.done, done);
}
const TASK_LABEL = {gre_writing_argument:'GRE Argument写作',ielts_writing_task1:'雅思小作文',ielts_writing_task2:'雅思大作文',ielts_speaking_p1:'雅思口语P1',ielts_speaking_p2:'雅思口语P2',ielts_speaking_p3:'雅思口语P3',toefl_writing:'托福写作',opinion:'观点表达',narrative:'叙事',presentation:'Presentation',picture_description:'看图开口',c2e_translation:'中译英'};

function nextTopic(){
  let pool = TOPIC_BANK.filter(q => q.cat === topicCat).concat(getAiQuestions('topic').filter(q => q.cat === topicCat));
  if(topicCat === 'exam' && examSub !== 'all') pool = pool.filter(q => q.task.startsWith(examSub));
  if(!pool.length){ $('#topicQBox').innerHTML = '<span class="muted">该分类下暂无题目</span>'; return; }
  topicCur = pickQuestion(pool, 'topic_' + topicCat);
  $('#topicQBox').innerHTML = `<div class="q-meta"><span class="tag">${TASK_LABEL[topicCur.task]||topicCur.task}</span><span class="tag">难度：${esc(topicCur.diff||'中')}</span>${topicCur.focus?`<span class="tag">考察：${esc(topicCur.focus)}</span>`:''}</div>${esc(topicCur.q)}`;
  attachIdeas(topicCur, $('#topicQBox'));
  $('#topicBankInfo').textContent = `本类共 ${pool.length} 题`;
  $('#topicAnswer').value = ''; updateWC('topic');
  $('#topicFeedback').style.display = 'none';
  window.activeReview = null;
  renderChallenge('#topicChallenge');
  if(typeof stopTopicTimer === 'function') stopTopicTimer(true);
}
$('#topicNextBtn').addEventListener('click', nextTopic);

/* 思路参考：题目关联 Ideas for IELTS 素材 */
function attachIdeas(q, box){
  if(!q || !Array.isArray(q.refs) || !q.refs.length || typeof IELTS_IDEAS === 'undefined') return;
  const wrap = document.createElement('div');
  wrap.style.marginTop = '10px';
  const btn = document.createElement('button');
  btn.className = 'btn small secondary';
  btn.textContent = '💡 思路参考（Ideas for IELTS）';
  const div = document.createElement('div');
  div.style.cssText = 'display:none;font-size:13px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 14px;margin-top:8px;white-space:normal;line-height:1.7;max-height:320px;overflow-y:auto;';
  div.innerHTML = q.refs.map(t => {
    const s = IELTS_IDEAS.find(x => x.title === t);
    return s ? `<b style="color:var(--blue-dark);">${esc(s.title)}</b><ul style="margin:4px 0 10px 18px;padding:0;">` + s.bullets.map(b => `<li>${esc(b)}</li>`).join('') + '</ul>' : '';
  }).join('');
  btn.addEventListener('click', () => { div.style.display = div.style.display === 'none' ? 'block' : 'none'; });
  wrap.appendChild(btn); wrap.appendChild(div);
  box.appendChild(wrap);
}

$('#topicAiBtn').addEventListener('click', async () => {
  const btn = $('#topicAiBtn'); btn.disabled = true; btn.textContent = '生成中…';
  try{
    /* 示例随机抽3道，考试类下按当前二级筛选限定题型 */
    let pool = TOPIC_BANK.filter(q => q.cat === topicCat);
    let allowedTasks;
    if(topicCat === 'exam'){
      if(examSub !== 'all') pool = pool.filter(q => q.task.startsWith(examSub));
      allowedTasks = [...new Set(pool.map(q => q.task))];
    } else {
      allowedTasks = [topicCat];
    }
    const examples = pool.slice().sort(() => Math.random() - 0.5).slice(0,3)
      .map(q => `[${q.task}] ${q.q}`).join('\n---\n');
    const recentAi = getAiQuestions('topic').slice(-10).map(q => q.q.slice(0,60)).join('\n');
    const raw = await callDeepSeek(
      '你是英语出题专家。根据示例题目的风格，生成1道全新的题目。要求：\n' +
      '- task 必须从这个列表中选择：[' + allowedTasks.join(', ') + ']，并让题目形式符合该题型的真实规范（如雅思大作文有明确的议论指令，口语P2是describe卡片式，托福独立写作是agree/disagree或偏好选择）\n' +
      '- 话题要新鲜，不要与示例和已出过的题的话题重复\n' +
      '- 题干以英文为主，场景/听众设定可用中文\n' +
      '严格输出JSON：{"task":"从列表中选的题型","diff":"易/中/难","q":"题目内容","focus":"考察点（中文短语）"}',
      '类别：' + topicCat + '\n风格示例：\n' + examples + (recentAi ? '\n已出过的题（话题勿重复）：\n' + recentAi : ''),
      {temperature:1.0, max_tokens:800});
    const q = tolerantParse(raw);
    if(!q || !q.q) throw new Error('生成格式异常');
    q.id = 'ai_' + Date.now(); q.cat = topicCat;
    saveAiQuestion('topic', q);
    topicCur = q;
    $('#topicQBox').innerHTML = `<div class="q-meta"><span class="tag">✨ AI新题</span><span class="tag">${TASK_LABEL[q.task]||q.task}</span>${q.focus?`<span class="tag">考察：${esc(q.focus)}</span>`:''}</div>${esc(q.q)}`;
    $('#topicAnswer').value = ''; $('#topicFeedback').style.display = 'none';
  }catch(e){ alert('出题失败：' + e.message); }
  btn.disabled = false; btn.textContent = '✨ AI 出新题';
});

async function submitFlow(args){
  const {cur, answerEl, fbEl, taskTypeFn, questionFn, moduleName, doneKey, extraInfo='', img=null, reviewData=null} = args;
  if(!cur){ alert('请先出一道题'); return; }
  const ans = answerEl.value.trim();
  if(!ans){ alert('先写点什么再提交～'); return; }
  let extra = extraInfo;
  const isReview = window.activeReview && reviewData && window.activeReview.kind === reviewData.kind;
  if(isReview){
    extra += '\n这是间隔复练：学习者3天前做过同一题，上次的作答是：「' + window.activeReview.answer + '」。请在 gap_analysis.detail 中对比两次作答，明确指出哪里进步了、哪里的老毛病还在。';
  }
  fbEl.style.display = 'block';
  fbEl.innerHTML = '<div class="loading-box"><div class="spinner"></div>AI 正在逐层分析你的输出，约需 20-40 秒…</div>';
  try{
    const {parsed, raw} = await getFeedback(taskTypeFn(), questionFn(), ans, extra);
    renderFeedback(fbEl, parsed, raw, taskTypeFn());
    addHistory({module:moduleName, question:questionFn(), answer:ans, ts:Date.now(),
      feedback:parsed || null, taskType:taskTypeFn(), img});
    if(doneKey && cur.id) markDone(doneKey, cur.id);
    /* 复练：出过错的题3天后到期 */
    if(isReview){
      const rq = LS.get(KEYS.review, []);
      const it = rq.find(x => x.id === window.activeReview.id);
      if(it) it.done = true;
      LS.set(KEYS.review, rq);
      window.activeReview = null;
    } else if(parsed && Array.isArray(parsed.corrections) && parsed.corrections.length && reviewData){
      const rq = LS.get(KEYS.review, []);
      rq.push({id:'r' + Date.now(), kind:reviewData.kind, data:reviewData.data,
        question:questionFn(), answer:ans, due:Date.now() + 3*24*3600*1000, done:false});
      LS.set(KEYS.review, rq.slice(-30));
    }
    updateReviewBanner();
    if(parsed){
      fbEl._cardData = {fb:parsed, question:questionFn(), answer:ans, module:moduleName};
      const bar = document.createElement('div');
      bar.className = 'row';
      const btn = document.createElement('button');
      btn.className = 'btn small secondary';
      btn.textContent = '📸 生成练习卡片';
      btn.addEventListener('click', () => genCard(fbEl._cardData));
      bar.appendChild(btn);
      fbEl.appendChild(bar);
    }
  }catch(e){
    fbEl.innerHTML = '<div class="muted">❌ 请求失败：' + esc(e.message) + '<br>请检查网络和 API Key（作答内容还在，不会丢失）。 </div>';
    const btn = document.createElement('button');
    btn.className = 'btn small';
    btn.textContent = '🔄 重试';
    btn.addEventListener('click', () => submitFlow(args));
    fbEl.firstChild.appendChild(btn);
  }
}

/* ================= 上次反馈找回 ================= */
function showLastFeedback(prefix, sel){
  const h = LS.get(KEYS.hist, []);
  const rec = h.find(x => x.module && x.module.startsWith(prefix));
  if(!rec){ alert('该模块还没有练习记录'); return; }
  const el = $(sel);
  if(rec.feedback){
    renderFeedback(el, rec.feedback, '', rec.taskType || '', {collect:false});
    el.insertAdjacentHTML('afterbegin',
      `<div class="muted" style="margin-bottom:10px;">🕘 ${new Date(rec.ts).toLocaleString()} 的反馈 · 题目：${esc(String(rec.question).slice(0,80))}…<br>你的作答：${esc(String(rec.answer).slice(0,120))}</div>`);
  } else {
    el.style.display = 'block';
    el.innerHTML = '<div class="muted">最近一条记录没有保存反馈（可能是解析失败），完整记录在「练习历史」里。</div>';
  }
}
$('#topicLastBtn').addEventListener('click', () => showLastFeedback('主题输出', '#topicFeedback'));
$('#c2eLastBtn').addEventListener('click', () => showLastFeedback('直觉翻译', '#c2eFeedback'));
$('#picLastBtn').addEventListener('click', () => showLastFeedback('即兴开口', '#picFeedback'));

/* ================= 复练队列 ================= */
window.activeReview = null;
function dueReviews(){
  return LS.get(KEYS.review, []).filter(x => !x.done && x.due <= Date.now());
}
function updateReviewBanner(){
  const due = dueReviews();
  const b = $('#reviewBanner');
  if(due.length){ $('#reviewCount').textContent = due.length; b.style.display = 'block'; }
  else b.style.display = 'none';
}
$('#reviewBanner').addEventListener('click', () => {
  const due = dueReviews();
  if(!due.length) return;
  const it = due[0];
  const tabMap = {topic:'topic', c2e:'c2e', pic:'pic'};
  $$('.tab-btn').forEach(x => x.classList.remove('active'));
  $$('.panel').forEach(x => x.classList.remove('active'));
  $$('.tab-btn').find(x => x.dataset.tab === tabMap[it.kind]).classList.add('active');
  $('#panel-' + tabMap[it.kind]).classList.add('active');
  if(it.kind === 'topic'){
    topicCur = it.data;
    $('#topicQBox').innerHTML = `<div class="q-meta"><span class="tag" style="background:#fef3c7;color:#92400e;">🔄 复练</span><span class="tag">${TASK_LABEL[it.data.task]||it.data.task}</span></div>${esc(it.data.q)}`;
    $('#topicAnswer').value = ''; $('#topicFeedback').style.display = 'none';
  } else if(it.kind === 'c2e'){
    c2eCur = it.data;
    $('#c2eQBox').innerHTML = `<div class="q-meta"><span class="tag" style="background:#fef3c7;color:#92400e;">🔄 复练</span><span class="tag">${esc(it.data.lvl||'')}</span></div><div style="font-size:18px;font-weight:600;margin-bottom:6px;">「${esc(it.data.zh)}」</div><div class="muted">场景：${esc(it.data.scene)}</div>`;
    $('#c2eAnswer').value = ''; $('#c2eFeedback').style.display = 'none';
  } else if(it.kind === 'pic'){
    showPic(it.data.url, it.data.desc, '🔄 复练 · ' + (it.data.hint||''));
  }
  window.activeReview = it; /* showPic 会清空，故放最后 */
});

/* ================= 收藏激活：每题随机挑战一个收藏表达 ================= */
function renderChallenge(sel){
  const box = $(sel);
  const fav = LS.get(KEYS.fav, []);
  if(!fav.length){ box.style.display = 'none'; box._expr = null; return; }
  const f = fav[Math.floor(Math.random() * fav.length)];
  box._expr = f.expression;
  box.style.display = 'block';
  box.innerHTML = `💪 本次挑战：试着在作答里用上 <b style="color:#9d174d;">${esc(f.expression)}</b> <span class="muted">（${esc(f.meaning)}）</span>`;
}
function challengeInfo(sel){
  const box = $(sel);
  return box && box._expr ? `\n学习者本次被鼓励在作答中使用收藏的表达「${box._expr}」。如果TA用了，请在反馈中简评用得是否地道；如果没用则完全忽略，不要因此批评。` : '';
}

/* ================= 成长统计 ================= */
function renderStats(){
  const h = LS.get(KEYS.hist, []);
  const box = $('#statsBox');
  if(!h.length){ box.innerHTML = '<div class="muted">还没有练习数据。先去做几道题吧！</div>'; return; }
  let html = '';
  /* 总量 */
  const week = Date.now() - 7*24*3600*1000;
  html += `<div style="font-size:14px;margin-bottom:14px;">累计练习 <b style="font-size:22px;color:var(--blue-dark);">${h.length}</b> 次 · 最近7天 <b style="color:var(--blue-dark);">${h.filter(r => r.ts >= week).length}</b> 次</div>`;
  /* 模块分布 */
  const byMod = {};
  h.forEach(r => { const m = (r.module||'其他').split('·')[0]; byMod[m] = (byMod[m]||0) + 1; });
  html += '<div class="fb-title" style="font-size:14px;">模块分布</div>';
  const maxM = Math.max(...Object.values(byMod));
  Object.entries(byMod).sort((a,b) => b[1]-a[1]).forEach(([m,n]) => {
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:13px;"><span style="width:90px;">${esc(m)}</span><div style="flex:1;background:#f1f5f9;border-radius:4px;height:16px;"><div style="width:${Math.round(n/maxM*100)}%;background:var(--b1-bd);height:16px;border-radius:4px;"></div></div><b>${n}</b></div>`;
  });
  /* 高频错误类型 */
  const byType = {};
  h.forEach(r => (r.feedback && r.feedback.corrections || []).forEach(c => {
    const t = (c.type||'其他').slice(0,6);
    byType[t] = (byType[t]||0) + 1;
  }));
  if(Object.keys(byType).length){
    html += '<div class="fb-title" style="font-size:14px;margin-top:16px;">高频错误类型 <span class="muted" style="font-weight:400;">— 你的系统性弱点在这里</span></div>';
    const maxT = Math.max(...Object.values(byType));
    Object.entries(byType).sort((a,b) => b[1]-a[1]).slice(0,8).forEach(([t,n]) => {
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:13px;"><span style="width:90px;">${esc(t)}</span><div style="flex:1;background:#f1f5f9;border-radius:4px;height:16px;"><div style="width:${Math.round(n/maxT*100)}%;background:#fca5a5;height:16px;border-radius:4px;"></div></div><b>${n}</b></div>`;
    });
  }
  /* 考试分数曲线（雅思band） */
  const scores = h.filter(r => r.feedback && r.feedback.score && typeof r.feedback.score === 'object')
    .map(r => ({ts:r.ts, band:r.feedback.score.band, sc:r.feedback.score.score, mod:r.module})).reverse();
  const bands = scores.filter(s => typeof s.band === 'number');
  if(bands.length >= 2){
    html += '<div class="fb-title" style="font-size:14px;margin-top:16px;">雅思评分趋势 <span class="muted" style="font-weight:400;">（仅供参考）</span></div>';
    const W = 600, H = 120, P = 24;
    const min = 4, max = 9;
    const pts = bands.map((s,i) => {
      const x = P + i * (W - P*2) / Math.max(bands.length - 1, 1);
      const y = H - P - (Math.min(Math.max(s.band, min), max) - min) / (max - min) * (H - P*2);
      return {x, y, band:s.band};
    });
    html += `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:600px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;">`;
    [5,6,7,8].forEach(b => {
      const y = H - P - (b - min) / (max - min) * (H - P*2);
      html += `<line x1="${P}" y1="${y}" x2="${W-P}" y2="${y}" stroke="#e2e8f0" stroke-width="1"/><text x="4" y="${y+4}" font-size="10" fill="#94a3b8">${b}</text>`;
    });
    html += `<polyline points="${pts.map(p => p.x + ',' + p.y).join(' ')}" fill="none" stroke="#2563eb" stroke-width="2"/>`;
    pts.forEach(p => { html += `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#2563eb"/><text x="${p.x-8}" y="${p.y-8}" font-size="10" fill="#1d4ed8">${p.band}</text>`; });
    html += '</svg>';
  }
  if(scores.length){
    html += '<div class="fb-title" style="font-size:14px;margin-top:16px;">全部评分记录</div><div style="font-size:13px;line-height:2;">' +
      scores.map(s => `<span class="tag" style="background:#f1f5f9;border-radius:4px;padding:2px 8px;margin-right:6px;display:inline-block;">${new Date(s.ts).toLocaleDateString()} ${esc(s.mod||'')} · <b>${s.band !== undefined && s.band !== null ? 'Band ' + s.band : (s.sc ?? '?') + '分'}</b></span>`).join('') + '</div>';
  }
  box.innerHTML = html;
}

/* ================= 练习卡片（Canvas PNG） ================= */
function genCard({fb, question, answer, module}){
  const W = 800, PAD = 40, LH = 30;
  const cv = document.createElement('canvas');
  const ctx = cv.getContext('2d');
  function wrap(text, font, maxW){
    ctx.font = font;
    const out = [];
    let line = '';
    for(const ch of String(text)){
      if(ch === '\n'){ out.push(line); line = ''; continue; }
      if(ctx.measureText(line + ch).width > maxW){ out.push(line); line = ch; }
      else line += ch;
    }
    if(line) out.push(line);
    return out;
  }
  /* 预排版计算高度 */
  const blocks = [];
  const F = {h1:'bold 26px system-ui', h2:'bold 17px system-ui', body:'15px system-ui', small:'13px system-ui'};
  blocks.push({t:'English Output Lab · 练习卡片', f:F.h1, c:'#1d4ed8', gap:10});
  blocks.push({t:module + ' · ' + new Date().toLocaleDateString('zh-CN'), f:F.small, c:'#94a3b8', gap:24});
  blocks.push({t:'📌 题目', f:F.h2, c:'#334155', gap:6});
  wrap(question.length > 160 ? question.slice(0,160) + '…' : question, F.body, W - PAD*2).forEach(l => blocks.push({t:l, f:F.body, c:'#475569', gap:4}));
  blocks.push({t:'', f:F.body, c:'#000', gap:14});
  if(fb.gap_analysis && fb.gap_analysis.main_gap){
    blocks.push({t:'🎯 核心差距：' + fb.gap_analysis.main_gap, f:F.h2, c:'#92400e', gap:6});
    wrap(fb.gap_analysis.one_action || '', F.body, W - PAD*2).forEach(l => blocks.push({t:l, f:F.body, c:'#475569', gap:4}));
    blocks.push({t:'', f:F.body, c:'#000', gap:14});
  }
  if(Array.isArray(fb.upgrades) && fb.upgrades.length){
    blocks.push({t:'⬆️ 表达升级', f:F.h2, c:'#1e40af', gap:6});
    fb.upgrades.slice(0,3).forEach(u => {
      wrap('✗ ' + u.yours, F.body, W - PAD*2).forEach(l => blocks.push({t:l, f:F.body, c:'#94a3b8', gap:2}));
      wrap('✓ ' + u.better, F.body, W - PAD*2).forEach(l => blocks.push({t:l, f:'bold 15px system-ui', c:'#1d4ed8', gap:8}));
    });
    blocks.push({t:'', f:F.body, c:'#000', gap:8});
  }
  if(Array.isArray(fb.collect) && fb.collect.length){
    blocks.push({t:'⭐ 本次积累', f:F.h2, c:'#9d174d', gap:6});
    fb.collect.slice(0,5).forEach(c => {
      wrap('· ' + c.expression + ' — ' + (c.meaning||''), F.body, W - PAD*2).forEach(l => blocks.push({t:l, f:F.body, c:'#475569', gap:4}));
    });
  }
  let H = PAD;
  blocks.forEach(b => { H += LH * 0 ; H += (b.t ? LH : 0) + b.gap; });
  H += PAD + 20;
  cv.width = W; cv.height = H;
  /* 绘制 */
  ctx.fillStyle = '#f8fafc'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#fff'; ctx.fillRect(12,12,W-24,H-24);
  ctx.strokeStyle = '#e2e8f0'; ctx.strokeRect(12,12,W-24,H-24);
  ctx.fillStyle = '#2563eb'; ctx.fillRect(12,12,W-24,6);
  let y = PAD + 14;
  blocks.forEach(b => {
    if(b.t){ ctx.font = b.f; ctx.fillStyle = b.c; ctx.fillText(b.t, PAD, y); y += LH; }
    y += b.gap;
  });
  ctx.font = F.small; ctx.fillStyle = '#cbd5e1';
  ctx.fillText('Generated by English Output Lab', PAD, H - 26);
  const a = document.createElement('a');
  a.href = cv.toDataURL('image/png');
  a.download = 'practice-card-' + new Date().toISOString().slice(0,10) + '.png';
  a.click();
}
/* 考试计时：按题型给标准时长，倒计时到0变红提示但不强制收卷 */
const TASK_TIME = {ielts_writing_task2:40*60, ielts_writing_task1:20*60, toefl_writing:30*60, gre_writing_argument:30*60,
  ielts_speaking_p1:60, ielts_speaking_p2:120, ielts_speaking_p3:90, opinion:15*60, narrative:15*60, presentation:180};
let topicTimerHandle = null;
function stopTopicTimer(clear){
  clearInterval(topicTimerHandle); topicTimerHandle = null;
  $('#topicTimerBtn').textContent = '⏱️ 考试计时';
  if(clear) $('#topicTimerDisp').textContent = '';
}
$('#topicTimerBtn').addEventListener('click', () => {
  if(topicTimerHandle){ stopTopicTimer(true); return; }
  if(!topicCur){ alert('请先出一道题'); return; }
  let t = TASK_TIME[topicCur.task] || 15*60;
  const disp = $('#topicTimerDisp');
  disp.style.color = 'var(--blue-dark)';
  $('#topicTimerBtn').textContent = '⏹️ 停止计时';
  const tick = () => {
    const m = Math.floor(Math.abs(t) / 60), s = Math.abs(t) % 60;
    disp.textContent = (t < 0 ? '⏰ 超时 ' : '') + m + ':' + String(s).padStart(2, '0');
    if(t <= 0) disp.style.color = '#dc2626';
    if(t === 0) alert('⏰ 时间到！考场上现在就要收卷了——可以继续写完，但记住这个位置。');
    t--;
  };
  tick();
  topicTimerHandle = setInterval(tick, 1000);
});

$('#topicSubmitBtn').addEventListener('click', () =>
  submitFlow({cur:topicCur, answerEl:$('#topicAnswer'), fbEl:$('#topicFeedback'),
    taskTypeFn:() => topicCur.task, questionFn:() => topicCur.q,
