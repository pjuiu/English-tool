let c2eLvl = 'L2', c2eCur = null;
bindPillGroup('#panel-c2e .pill[data-lvl]', 'lvl', v => { c2eLvl = v; nextC2e(); });
const LVL_DESC = {L1:'语感陷阱 · 拒绝逐字翻译',L2:'语境依赖 · 场景决定说法',L3:'抽象表达 · 母语思维深水区'};

function nextC2e(){
  const pool = C2E_BANK.filter(q => q.lvl === c2eLvl).concat(getAiQuestions('c2e').filter(q => q.lvl === c2eLvl));
  c2eCur = pickQuestion(pool, 'c2e_' + c2eLvl);
  $('#c2eQBox').innerHTML = `<div class="q-meta"><span class="tag">${c2eLvl} ${esc(LVL_DESC[c2eLvl])}</span></div><div style="font-size:18px;font-weight:600;margin-bottom:6px;">「${esc(c2eCur.zh)}」</div><div class="muted">场景：${esc(c2eCur.scene)}</div>`;
  $('#c2eBankInfo').textContent = `本档共 ${pool.length} 题`;
  $('#c2eAnswer').value = '';
  $('#c2eFeedback').style.display = 'none';
  window.activeReview = null;
}
$('#c2eNextBtn').addEventListener('click', nextC2e);

$('#c2eAiBtn').addEventListener('click', async () => {
  const btn = $('#c2eAiBtn'); btn.disabled = true; btn.textContent = '生成中…';
  try{
    const examples = C2E_BANK.filter(q => q.lvl === c2eLvl).slice().sort(() => Math.random() - 0.5).slice(0,5)
      .map(q => `「${q.zh}」（场景：${q.scene}）`).join('\n');
    const doneZh = C2E_BANK.filter(q => q.lvl === c2eLvl).map(q => q.zh)
      .concat(getAiQuestions('c2e').map(q => q.zh)).join('、');
    const raw = await callDeepSeek(
      '你是中译英出题专家，出题风格：中文很自然、但直译成英文必然出错或不地道的句子。核心判断标准：一个英语中级学习者看到这句中文，第一反应的直译一定是错的或生硬的，才算好题。\n' +
      '难度档说明——L1语感陷阱（客套/寒暄/日常虚指承诺类）、L2语境依赖（同一句话在不同场景英文说法完全不同，场景设定必须具体到关系和情绪）、L3抽象表达（观点/情绪/微妙态度/俗语，考点是丢掉字面只译意图）。\n' +
      '严格输出JSON：{"zh":"中文句子","scene":"具体场景设定（包含对象关系和语气）"}。不要与已出过的句子重复或只是换皮。',
      '难度档：' + c2eLvl + '\n风格示例：\n' + examples + '\n已出过的句子（勿重复）：' + doneZh,
      {temperature:1.1, max_tokens:400});
    const q = tolerantParse(raw);
    if(!q || !q.zh) throw new Error('生成格式异常');
    q.id = 'ai_' + Date.now(); q.lvl = c2eLvl;
    saveAiQuestion('c2e', q);
    c2eCur = q;
    $('#c2eQBox').innerHTML = `<div class="q-meta"><span class="tag">✨ AI新题</span><span class="tag">${c2eLvl}</span></div><div style="font-size:18px;font-weight:600;margin-bottom:6px;">「${esc(q.zh)}」</div><div class="muted">场景：${esc(q.scene)}</div>`;
    $('#c2eAnswer').value = ''; $('#c2eFeedback').style.display = 'none';
  }catch(e){ alert('出题失败：' + e.message); }
  btn.disabled = false; btn.textContent = '✨ AI 出新题';
});
$('#c2eSubmitBtn').addEventListener('click', () =>

let picLvl = 'facts', picCur = null, picTimerHandle = null, picSpeakStart = null;
bindPillGroup('#panel-pic .pill[data-piclvl]', 'piclvl', v => { picLvl = v; });
const PIC_LVL_PROMPT = {
  facts:'难度Lv1（描述事实）：学习者的任务是客观描述图片里有什么、人们在做什么。评估重点：①空间/画面组织是否清晰（native 描述图片有从整体到细节的顺序感，如 in the foreground/background, on the left）；②现在进行时的使用是否准确；③名词是否具体（不是笼统的 a person/a thing 而是有细节的表达）。如果学习者只罗列了物体名词而没有组织成完整描述，要指出。',
  story:'难度Lv2（推测故事/情绪）：学习者的任务是推测图中人物的情绪、关系和背后的故事。评估重点：①推测语言的丰富度和准确度（seem/look like/probably/must be/might have just 等，native 会区分确信程度）；②是否真的在"推测"而非仅描述表面（说 she is smiling 是 Lv1，说 she must have just heard some good news 才是 Lv2）；③情绪词汇是否超出 happy/sad 的基础层。学习者停留在纯描述层面时要指出没有完成推测任务。',
  opinion:'难度Lv3（表达观点）：学习者的任务是由图片引申表达个人观点或联系自身经历。评估重点：①是否完成了"从图到观点"的跳跃（还在描述图片=没完成任务）；②观点是否有支撑（理由/例子/个人经历），而不是一句 I think it is good 就结束；③表达立场和态度的语言是否多样（personally / from my experience / what strikes me is / I can relate to this because）。'
};

function showPic(url, desc, hint){
  window.activeReview = null;
  renderChallenge('#picChallenge');
  picCur = {url, desc};
  $('#picArea').innerHTML = `<img id="picImg" src="${url}" onerror="this.outerHTML='<div class=muted>图片加载失败，请换一张或检查网络</div>'">`;
  $('#picHint').textContent = hint ? ('主题提示：' + hint) : '';
  $('#picAnswer').value = ''; updateWC('pic');
  $('#picFeedback').style.display = 'none';
  $('#picSpeakTime').textContent = '';
  startPicTimer();
}
function startPicTimer(){
  clearInterval(picTimerHandle);
  let t = 60;
  const el = $('#picTimer');
  el.style.display = 'inline'; el.classList.remove('warn'); el.textContent = t + 's 准备';
  picSpeakStart = null;
  picTimerHandle = setInterval(() => {
    t--;
    el.textContent = t + 's 准备';
    if(t <= 10) el.classList.add('warn');
    if(t <= 0){
      clearInterval(picTimerHandle);
      el.textContent = '🗣️ 开口说！';
      picSpeakStart = Date.now();
    }
  }, 1000);
}

  if(!picCur){ alert('请先出图'); return; }

      : `看图口语描述（图片内容未知，仅评估语言本身，不要质疑内容与图是否相符）。${PIC_LVL_PROMPT[picLvl]}`,
    moduleName:'即兴开口·' + picLvl,
    extraInfo:'补充信息：' + extra + challengeInfo('#picChallenge'), img:picCur.url,
    reviewData:{kind:'pic', data:{url:picCur.url, desc:picCur.desc, hint:$('#picHint').textContent, lvl:picLvl}}});
});

/* ================= 语音输入（增强项，不可用则隐藏） ================= */
(function initSpeech(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return;
  [['#topicSpeechBtn','#topicAnswer'],['#picSpeechBtn','#picAnswer']].forEach(([btnSel, taSel]) => {
    const btn = $(btnSel), ta = $(taSel);
    btn.style.display = 'inline-block';
    let rec = null, active = false;
    btn.addEventListener('click', () => {
      if(active){ rec.stop(); return; }
      rec = new SR();
      rec.lang = 'en-US'; rec.continuous = true; rec.interimResults = false;
      rec.onresult = e => {
        for(let i = e.resultIndex; i < e.results.length; i++)
          if(e.results[i].isFinal) ta.value += (ta.value ? ' ' : '') + e.results[i][0].transcript;
        ta.dispatchEvent(new Event('input'));
      };
      rec.onerror = ev => {
        active = false; btn.textContent = '🎤 语音输入';
        if(ev.error === 'network') btn.style.display = 'none'; /* 中国网络下Google语音服务不可达，隐藏 */
      };
      rec.onend = () => { active = false; btn.textContent = '🎤 语音输入'; };
      try{ rec.start(); active = true; btn.textContent = '⏹️ 停止录音'; }catch(e){}
    });
  });
})();

/* 存储用量检查（约5MB上限，超过75%提示备份） */
function checkStorage(){
  const used = lsUsage(), limit = 5 * 1024 * 1024;
  if(used > limit * 0.75){
    $('#storagePct').textContent = Math.round(used / limit * 100) + '%（约' + Math.round(used / 1024) + 'KB）';
    $('#storageWarn').style.display = 'block';
  } else {
    $('#storageWarn').style.display = 'none';
  }
}
