<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Output Lab · 英语输出实验室</title>
<style>
  :root{
    --blue:#2563eb;--blue-dark:#1d4ed8;
    --b1-bg:#dbeafe;--b1-fg:#1e40af;--b1-bd:#93c5fd;
    --b2-bg:#d1fae5;--b2-fg:#065f46;--b2-bd:#6ee7b7;
    --c1-bg:#fef3c7;--c1-fg:#92400e;--c1-bd:#fcd34d;
    --c2-bg:#fce7f3;--c2-fg:#9d174d;--c2-bd:#f0abfc;
    --slate:#64748b;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:#f8fafc;color:#1e293b;}
  header{
    position:sticky;top:0;z-index:50;min-height:52px;background:#fff;border-bottom:1px solid #e2e8f0;
    display:flex;align-items:center;justify-content:space-between;padding:8px 16px;gap:8px;flex-wrap:wrap;
  }
  header .logo{font-weight:700;font-size:17px;color:#1e293b;}
  header .logo small{font-weight:500;color:#94a3b8;font-size:12px;margin-left:6px;}
  header .apikey{display:flex;align-items:center;gap:6px;}
  header input[type=password]{border:1px solid #cbd5e1;border-radius:6px;padding:6px 10px;font-size:13px;width:200px;}
  .tabs{display:flex;gap:20px;background:#fff;border-bottom:1px solid #e2e8f0;padding:0 16px;overflow-x:auto;}
  .tab-btn{padding:12px 4px;border:none;background:none;font-size:14px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;font-weight:500;white-space:nowrap;}
  .tab-btn.active{color:var(--blue-dark);border-bottom-color:var(--blue);font-weight:600;}
  .tab-btn:hover{color:var(--blue-dark);}
  main{padding:20px;max-width:980px;margin:0 auto;}
  .panel{display:none;}
  .panel.active{display:block;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:14px;}
  .btn{background:var(--blue);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;}
  .btn:hover{background:var(--blue-dark);}
  .btn.secondary{background:#fff;color:#334155;border:1px solid #cbd5e1;}
  .btn.secondary:hover{background:#f1f5f9;}
  .btn.danger{background:#fff;color:#dc2626;border:1px solid #fecaca;}
  .btn:disabled{opacity:.55;cursor:not-allowed;}
  .btn.small{padding:5px 12px;font-size:12px;}
  textarea{width:100%;min-height:150px;padding:12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;resize:vertical;line-height:1.7;font-family:inherit;}
  textarea:focus, input:focus{outline:2px solid #bfdbfe;border-color:var(--blue);}
  .pill{display:inline-block;padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid transparent;opacity:.55;transition:all .15s;margin:0 6px 6px 0;user-select:none;}
  .pill.active{opacity:1;box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .pill.t-exam{background:var(--b1-bg);color:var(--b1-fg);border-color:var(--b1-bd);}
  .pill.t-opinion{background:var(--b2-bg);color:var(--b2-fg);border-color:var(--b2-bd);}
  .pill.t-narrative{background:var(--c1-bg);color:var(--c1-fg);border-color:var(--c1-bd);}
  .pill.t-presentation{background:var(--c2-bg);color:var(--c2-fg);border-color:var(--c2-bd);}
  .pill.t-lvl{background:#f1f5f9;color:#334155;border-color:#cbd5e1;}
  .q-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin:10px 0;line-height:1.8;font-size:15px;white-space:pre-wrap;}
  .q-meta{font-size:12px;color:#94a3b8;margin-bottom:6px;}
  .q-meta .tag{display:inline-block;background:#f1f5f9;border-radius:4px;padding:1px 8px;margin-right:6px;color:#64748b;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px;}
  .muted{color:#94a3b8;font-size:13px;}
  .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:var(--blue);border-radius:50%;margin:0 auto 12px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-box{text-align:center;color:#64748b;padding:40px 10px;font-size:14px;}

  /* feedback rendering */
  .fb-section{margin-bottom:16px;}
  .fb-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .fb-title .num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;}
  .corr-item{border-left:3px solid #fca5a5;background:#fef2f2;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;font-size:14px;line-height:1.7;}
  .corr-item .orig{color:#b91c1c;text-decoration:line-through;text-decoration-thickness:1px;}
  .corr-item .fixed{color:#065f46;font-weight:600;}
  .corr-item .why{color:#64748b;font-size:13px;margin-top:2px;}
  .native-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;font-size:14.5px;line-height:1.8;}
  .native-box .ver-label{font-size:12px;font-weight:700;color:#065f46;margin:8px 0 2px;}
  .native-box .ver-label:first-child{margin-top:0;}
  .native-box .scene{color:#64748b;font-size:12.5px;}
  .gap-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.8;}
  .gap-box b{color:#92400e;}
  .upg-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .upg-table td{border:1px solid #e2e8f0;padding:8px 10px;line-height:1.6;vertical-align:top;}
  .upg-table td.yours{color:#64748b;width:38%;}
  .upg-table td.better{color:var(--blue-dark);font-weight:600;width:38%;}
  .upg-table td.why{color:#94a3b8;font-size:12.5px;}
  .collect-item{background:var(--c2-bg);border:1px solid var(--c2-bd);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:14px;line-height:1.65;}
  .collect-item .expr{font-weight:700;color:var(--c2-fg);}
  .collect-item .ex{color:#64748b;font-size:13px;font-style:italic;}
  .score-box{background:var(--b1-bg);border:1px solid var(--b1-bd);border-radius:8px;padding:12px 14px;font-size:14px;line-height:1.8;}
  .score-box .band{font-size:26px;font-weight:800;color:var(--b1-fg);}
  .score-box .dims{color:#334155;font-size:13px;}
  .score-note{font-size:12px;color:#94a3b8;margin-top:4px;}
  .raw-fallback{white-space:pre-wrap;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:8px;padding:12px;font-size:13px;color:#475569;max-height:400px;overflow-y:auto;}
  .fav-btn{float:right;border:1px solid #fcd34d;background:#fffbeb;color:#92400e;border-radius:6px;padding:1px 8px;font-size:11px;cursor:pointer;margin-left:8px;}
  .fav-btn:hover{background:#fef3c7;}

  /* picture module */
  #picImg{max-width:100%;max-height:380px;border-radius:10px;display:block;margin:0 auto;border:1px solid #e2e8f0;}
  .timer{font-size:30px;font-weight:800;color:var(--blue-dark);font-variant-numeric:tabular-nums;}
  .timer.warn{color:#dc2626;}

  /* fav tab */
  .fav-item{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:14px;line-height:1.6;}
  .fav-item .expr{font-weight:700;color:var(--blue-dark);}
  .fav-item .ex{color:#94a3b8;font-size:13px;font-style:italic;}
  .hist-item{border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px;background:#fff;}
  .hist-item summary{cursor:pointer;color:#334155;font-weight:600;}
  .hist-item .h-q{color:#64748b;margin:6px 0;}
  .hist-item .h-a{white-space:pre-wrap;background:#f8fafc;border-radius:6px;padding:8px;line-height:1.6;}

  @media (max-width:640px){
    header .apikey label{display:none;}
    header input[type=password]{width:150px;}
    main{padding:12px;}
    .upg-table td.yours,.upg-table td.better{width:auto;}
  }
</style>
</head>
<body>
<header>
  <div class="logo">English Output Lab<small>英语输出实验室</small></div>
  <div class="apikey">
    <label for="apiKeyInput" style="font-size:13px;color:#64748b;">DeepSeek API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="pic">🖼️ 即兴开口</button>
  <button class="tab-btn" data-tab="c2e">🔁 直觉翻译</button>
  <button class="tab-btn" data-tab="topic">📝 主题输出</button>
  <button class="tab-btn" data-tab="fav">⭐ 收藏夹</button>
  <button class="tab-btn" data-tab="hist">🕘 练习历史</button>
  <button class="tab-btn" data-tab="stats">📊 成长</button>
</div>
<div id="reviewBanner" style="display:none;background:#fffbeb;border-bottom:1px solid #fde68a;padding:8px 16px;font-size:13px;color:#92400e;cursor:pointer;">
  🔄 <b id="reviewCount"></b> 道练过且出过错的题到期待复练 — 点击开始，AI 会对比你两次的作答
</div>
<div id="storageWarn" style="display:none;background:#fef2f2;border-bottom:1px solid #fecaca;padding:8px 16px;font-size:13px;color:#b91c1c;">
  ⚠️ 本地存储已使用 <b id="storagePct"></b>，接近浏览器上限。请到「练习历史」页做一次完整备份，必要时清理旧数据。
</div>

<main>
<!-- ================= 模块二：主题输出 ================= -->
<div class="panel" id="panel-topic">
  <div class="card">
    <div style="margin-bottom:4px;">
      <span class="pill t-exam active" data-cat="exam">考试类</span>
      <span class="pill t-opinion" data-cat="opinion">观点表达</span>
      <span class="pill t-narrative" data-cat="narrative">叙事类</span>
      <span class="pill t-presentation" data-cat="presentation">Presentation</span>
    </div>
    <div id="examSubRow" style="margin-bottom:4px;">
      <span class="pill t-lvl active" data-sub="all" style="font-size:12px;padding:3px 10px;">全部</span>
      <span class="pill t-lvl" data-sub="ielts" style="font-size:12px;padding:3px 10px;">雅思</span>
      <span class="pill t-lvl" data-sub="toefl" style="font-size:12px;padding:3px 10px;">托福</span>
      <span class="pill t-lvl" data-sub="gre" style="font-size:12px;padding:3px 10px;">GRE</span>
    </div>
    <div id="topicQBox" class="q-box"><span class="muted">点击「换一题」开始</span></div>
    <div id="topicChallenge" class="q-box" style="display:none;background:#fdf4ff;border-color:#f0abfc;font-size:13.5px;"></div>
    <div class="row">
      <button class="btn secondary" id="topicNextBtn">🎲 换一题</button>
      <button class="btn secondary" id="topicAiBtn">✨ AI 出新题</button>
      <span class="muted" id="topicBankInfo"></span>
    </div>
  </div>
  <div class="card">
    <textarea id="topicAnswer" placeholder="在这里输入你的英文作答（口语题可以先口述、再把说的内容打出来）……"></textarea>
    <div class="row">
      <button class="btn" id="topicSubmitBtn">提交，获取反馈</button>
      <button class="btn secondary" id="topicSpeechBtn" style="display:none;">🎤 语音输入</button>
      <button class="btn small secondary" id="topicLastBtn">🕘 上次反馈</button>
      <button class="btn small secondary" id="topicTimerBtn">⏱️ 考试计时</button>
      <span id="topicTimerDisp" style="font-weight:700;color:var(--blue-dark);font-variant-numeric:tabular-nums;"></span>
      <span class="muted" id="topicWordCount">0 词</span>
    </div>
  </div>
  <div class="card" id="topicFeedback" style="display:none;"></div>
</div>

<!-- ================= 模块三：中译英 ================= -->
<div class="panel" id="panel-c2e">
  <div class="card">
    <div style="margin-bottom:4px;">
      <span class="pill t-lvl" data-lvl="L1">L1 语感陷阱</span>
      <span class="pill t-lvl active" data-lvl="L2">L2 语境依赖</span>
      <span class="pill t-lvl" data-lvl="L3">L3 抽象表达</span>
    </div>
    <div id="c2eQBox" class="q-box"><span class="muted">点击「换一题」开始</span></div>
    <div class="row">
      <button class="btn secondary" id="c2eNextBtn">🎲 换一题</button>
      <button class="btn secondary" id="c2eAiBtn">✨ AI 出新题</button>
      <span class="muted" id="c2eBankInfo"></span>
    </div>
  </div>
  <div class="card">
    <textarea id="c2eAnswer" style="min-height:80px;" placeholder="凭直觉快速写下你的英文——不要在脑子里逐字翻译……"></textarea>
    <div class="row">
      <button class="btn" id="c2eSubmitBtn">提交，获取反馈</button>
      <button class="btn small secondary" id="c2eLastBtn">🕘 上次反馈</button>
    </div>
  </div>
  <div class="card" id="c2eFeedback" style="display:none;"></div>
</div>

<!-- ================= 模块一：看图开口 ================= -->
<div class="panel active" id="panel-pic">
  <div class="card">
    <div style="margin-bottom:4px;">
      <span class="pill t-exam active" data-piclvl="facts">Lv1 描述事实</span>
      <span class="pill t-opinion" data-piclvl="story">Lv2 推测故事/情绪</span>
      <span class="pill t-narrative" data-piclvl="opinion">Lv3 表达观点</span>
    </div>
    <div id="picArea" style="text-align:center;padding:10px 0;">
      <span class="muted">点击「出图」开始。也可以粘贴自己的图片URL。</span>
    </div>
    <div class="row" style="justify-content:center;">
      <span class="timer" id="picTimer" style="display:none;">60</span>
    </div>
    <div class="row">
      <button class="btn secondary" id="picNextBtn">🖼️ 出图（内置图库）</button>
      <button class="btn secondary" id="picRandomBtn">🎲 随机挑战（Picsum）</button>
      <input type="text" id="picUrlInput" placeholder="或粘贴图片URL" style="flex:1;min-width:160px;border:1px solid #cbd5e1;border-radius:6px;padding:8px 10px;font-size:13px;">
      <button class="btn small secondary" id="picUrlBtn">载入</button>
    </div>
    <div class="muted" id="picHint" style="margin-top:8px;"></div>
    <div id="picChallenge" class="q-box" style="display:none;background:#fdf4ff;border-color:#f0abfc;font-size:13.5px;"></div>
  </div>
  <div class="card">
    <textarea id="picAnswer" placeholder="准备时间结束后开口描述，然后把你说的内容打出来（或用语音输入）……"></textarea>
    <div class="row">
      <button class="btn" id="picSubmitBtn">提交，获取反馈</button>
      <button class="btn secondary" id="picSpeechBtn" style="display:none;">🎤 语音输入</button>
      <button class="btn small secondary" id="picLastBtn">🕘 上次反馈</button>
      <span class="muted" id="picWordCount">0 词</span>
      <span class="muted" id="picSpeakTime"></span>
    </div>
  </div>
  <div class="card" id="picFeedback" style="display:none;"></div>
</div>

<!-- ================= 收藏夹 ================= -->
<div class="panel" id="panel-fav">
  <div class="card">
    <div class="fb-title" style="font-size:15px;">⭐ 表达收藏夹 <span class="muted" id="favCount"></span></div>
    <div class="row" style="margin-bottom:10px;">
      <button class="btn small" id="flashBtn">🎴 闪卡复习</button>
      <button class="btn small secondary" id="exportFavBtn">📤 导出收藏（表达清单）</button>
      <button class="btn small danger" id="clearFavBtn">清空收藏</button>
    </div>
    <div id="flashArea" style="display:none;margin-bottom:14px;"></div>
    <div id="favList"></div>
  </div>
</div>

<!-- ================= 练习历史 ================= -->
<div class="panel" id="panel-hist">
  <div class="card">
    <div class="fb-title" style="font-size:15px;">🕘 练习历史（最近50条）</div>
    <div class="row" style="margin-bottom:10px;">
      <button class="btn small secondary" id="exportBtn">💾 完整备份（含历史与反馈）</button>
      <button class="btn small secondary" id="importBtn">📥 导入备份</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
    <div id="histList"></div>
  </div>
</div>

<!-- ================= 成长统计 ================= -->
<div class="panel" id="panel-stats">
  <div class="card">
    <div class="fb-title" style="font-size:15px;">📊 成长统计</div>
    <div id="statsBox"></div>
  </div>
</div>
</main>

<script>
/* ================= helpers & storage ================= */
const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
const LS = {
  get(k, d){ try{ return JSON.parse(localStorage.getItem(k)) ?? d; }catch(e){ return d; } },
  set(k, v){
    try{ localStorage.setItem(k, JSON.stringify(v)); }
    catch(e){
      /* 配额写满：裁掉最老的一半历史记录后重试一次 */
      try{
        const h = JSON.parse(localStorage.getItem('eol_history') || '[]');
        if(h.length > 5){
          localStorage.setItem('eol_history', JSON.stringify(h.slice(0, Math.ceil(h.length / 2))));
          localStorage.setItem(k, JSON.stringify(v));
          alert('⚠️ 本地存储已满：已自动清理最早的一半练习历史。建议尽快到「练习历史」页做一次完整备份。');
          return;
        }
      }catch(e2){}
      alert('⚠️ 本地存储已满且无法自动清理，本次数据未能保存。请立即导出备份并清理收藏/历史。');
    }
  }
};
function lsUsage(){
  let b = 0;
  for(let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    b += (k.length + (localStorage.getItem(k) || '').length) * 2;
  }
  return b;
}
const KEYS = { fav:'eol_favorites', hist:'eol_history', done:'eol_done_ids', aiq:'eol_ai_questions', review:'eol_review', lastgap:'eol_last_gap' };

/* API key: 与 Word Lab 共享 */
const apiKeyInput = $('#apiKeyInput');
apiKeyInput.value = localStorage.getItem('deepseek_api_key') || localStorage.getItem('shadow_deepseek_key') || '';
apiKeyInput.addEventListener('input', () => localStorage.setItem('deepseek_api_key', apiKeyInput.value.trim()));

/* tabs */
$$('.tab-btn').forEach(b => b.addEventListener('click', () => {
  $$('.tab-btn').forEach(x => x.classList.remove('active'));
  $$('.panel').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  $('#panel-' + b.dataset.tab).classList.add('active');
  if(b.dataset.tab === 'fav') renderFav();
  if(b.dataset.tab === 'hist') renderHist();
  if(b.dataset.tab === 'stats') renderStats();
}));

/* single-select pill groups */
function bindPillGroup(selector, attr, onChange){
  $$(selector).forEach(p => p.addEventListener('click', () => {
    $$(selector).forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    if(onChange) onChange(p.dataset[attr]);
  }));
}

const wc = t => (t.trim().match(/[A-Za-z''-]+/g) || []).length;

/* ================= DeepSeek ================= */
async function callDeepSeek(systemPrompt, userMessage, {json=true, temperature=0.6, max_tokens=4096} = {}){
  const key = localStorage.getItem('deepseek_api_key') || localStorage.getItem('shadow_deepseek_key');
  if(!key){ alert('请先在右上角填入 DeepSeek API Key'); throw new Error('no api key'); }
  const body = {
    model:'deepseek-chat',
    messages:[{role:'system',content:systemPrompt},{role:'user',content:userMessage}],
    temperature, max_tokens
  };
  if(json) body.response_format = {type:'json_object'};
  const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body: JSON.stringify(body)
  });
  if(!res.ok){ const t = await res.text(); throw new Error('DeepSeek API error: '+res.status+' '+t); }
  const data = await res.json();
  return data.choices[0].message.content;
}

/* 容错 JSON 解析：剥代码块 → 截取首尾大括号 → 修剪尾逗号 */
function tolerantParse(raw){
  if(!raw) return null;
  let s = raw.trim().replace(/^```(?:json)?/i,'').replace(/```$/,'').trim();
  const a = s.indexOf('{'), b = s.lastIndexOf('}');
  if(a === -1 || b === -1) return null;
  s = s.slice(a, b+1);
  try{ return JSON.parse(s); }catch(e){}
  try{ return JSON.parse(s.replace(/,\s*([}\]])/g,'$1')); }catch(e){}
  return null;
}

/* ================= 统一反馈引擎 ================= */
const FEEDBACK_SYSTEM = `你是一位资深英语教学专家，同时具备雅思前考官经验和英语母语者的语感。你的任务是对学习者的英语输出进行深度反馈，帮助学习者从"中式英语"过渡到"母语者思维"。

你将收到：task_type（练习类型）、question（题目）、user_answer（学习者作答）、user_level（默认intermediate）。

反馈原则：
1. 诚实直接，不空洞夸奖。有错必指，说明"为什么错"和"native为什么不这么说"
2. native_version 不是修改学习者的版本，而是母语者面对同一题目会给出的自然回答，长度与学习者作答相当
3. 口语类任务（picture_description / speaking / presentation）的 native 版本必须口语化（允许缩写、filler words、简单句），写作类必须书面化
4. gap_analysis 只聚焦 1-2 个最关键的问题，不罗列更多
5. 所有解释用中文，所有英文例句保持英文
6. 学习者作答少于20词或明显敷衍时：corrections 为空数组，native_version 正常给出，gap_analysis.main_gap 填"作答过短"，detail 中指出内容量不足并鼓励重新作答，upgrades 和 collect 仍从 native 版本中提取
7. gap_analysis 的分析角度和措辞必须基于本次作答的实际问题，严禁套用固定模板句式；如果用户消息中提示了上次的分析角度，且本次存在其他同等重要的问题，优先换一个新角度
8. 任何任务都先检查作答是否回应了题目：明显跑题时必须在 gap_analysis 首位直接指出（考试类同时反映在分数里，非考试类不评分但照样点破），不要假装跑题不存在而只分析语言
9. 看图描述任务：question 中若包含图片实际内容（ground truth），要核对学习者的描述与图片内容是否相符，凭空编造的内容要指出；若未提供图片内容，则只评估语言本身，不质疑描述真实性
10. presentation 任务：题目中的听众和场合设定是评估重点之一——语域是否匹配听众、结构是否清晰（开场-要点-收尾）、有没有说听众听不懂的内容，这些问题的优先级高于零星语法错误
11. 口语类任务纠错时区分"错误"和"口语特征"：缩写、filler words、简单句、略微松散的衔接是口语的正常特征，不列入 corrections；只纠真正的语法、用词、搭配错误
12. 主动排查中式英语：语法正确但 native 绝不会这么说的句子同样是错误，列入 corrections 并标类型"中式英语"——包括逐字直译痕迹（如 give you a convenience / my English level / play my ability）、词不达意（用词的字面义对但语用义错）、生硬的书面腔套话。explanation 必须说清 native 为什么不这么说、思维差异在哪。判断边界：意思传达已经变形或让 native 觉得怪的进 corrections；意思无碍只是有更漂亮说法的进 upgrades

严格输出以下结构的 JSON（不要输出 JSON 以外的内容，不要用 markdown 代码块包裹）：
{
  "corrections": [{"original":"原句","corrected":"修正句","type":"错误类型标签，从[时态,主谓一致,冠词,介词,搭配,用词,句式,语序,语域,中式英语,拼写,其他]中选一个","explanation":"中文解释为什么错、native为什么不这么说"}],
  "native_version": "母语者的完整自然回答",
  "gap_analysis": {"main_gap":"核心差距（词汇/句式/思维组织/语域，选最突出的一个）","detail":"具体说明，用原文和native版本对比举例","one_action":"本周可针对性练习的一个具体动作"},
  "upgrades": [{"yours":"学习者原表达","better":"更地道说法","why":"地道在哪"}],
  "collect": [{"expression":"值得收藏的表达","meaning":"中文含义","example":"新语境例句"}],
  "score": null
}

评分规则（仅考试类 task_type 时 score 不为 null，其余固定 null）：
- 雅思写作：{"band":数字,"TR":数字,"CC":数字,"LR":数字,"GRA":数字,"comment":"一句话总评"}
- 雅思口语：{"band":数字,"FC":数字,"LR":数字,"GRA":数字,"PR":null,"comment":"一句话总评，注明发音无法通过文字评估"}
- 托福写作：{"score":0到30,"comment":"一句话总评"}
- GRE Argument写作（task_type为gre_writing_argument）：{"score":0到6,"comment":"一句话总评"}。GRE Argument 的核心是评估学习者是否准确识别了论证中的逻辑漏洞（如因果混淆、样本偏差、隐含假设），语言之外要重点反馈逻辑分析质量
评分锚定：雅思6分=能达意但有明显错误和重复用词；7分=错误少、有一定灵活性和衔接；8分=罕有错误、表达自然多样。严格按此标准，宁低勿高，不确定时取低档。
考试类 task_type 必须给出 score，不允许返回 null——即使作答跑题、过短或质量很差：跑题时 TR（或对应维度）给低分（通常≤5）并在 comment 中说明"内容未回应题目"；过短同理。只有非考试类才允许 score 为 null。

corrections 为空数组表示无语法错误，此时 gap_analysis 说明"语法层面干净，差距在表达自然度"。
corrections 最多15条：优先列最影响理解的错误；同类的重复错误（如多处拼写、多处时态）合并为一条，在 explanation 中说明规律并举2-3个例子，不要逐一罗列。
upgrades 固定2-3条，且必须从"语法正确但不够地道"的句子中挑选——不允许重复 corrections 里已经纠正过的内容；如果全文错误太多找不到语法正确的句子，就从学习者的表达意图出发给出native的说法。collect 固定3-5条。

输出示例（仅示意结构，内容勿照抄）：
{"corrections":[{"original":"I very like this photo.","corrected":"I really like this photo.","explanation":"副词误用：very 不能直接修饰动词，native 用 really/truly。"}],"native_version":"This shot really captures ...","gap_analysis":{"main_gap":"句式","detail":"你的句子全是 There is/I think 开头……","one_action":"本周每天挑3句自己的输出，把主语从 I/There 换成具体名词重写一遍。"},"upgrades":[{"yours":"very beautiful","better":"absolutely stunning","why":"程度副词+强形容词是native的强调习惯"}],"collect":[{"expression":"capture the moment","meaning":"定格瞬间","example":"The photographer captured the moment perfectly."}],"score":null}`;

const C2E_EXTRA = `

中译英任务的特殊规则（当前任务是 c2e_translation，以下规则覆盖上面的通用规则）：
- native_version 改为对象，提供3个版本：{"casual":"朋友间口语版 —— 中文说明使用场景","neutral":"通用版 —— 中文说明使用场景","formal":"正式场合版 —— 中文说明使用场景"}（每个值 = 英文译文 + " —— " + 中文场景说明）
- 重点分析学习者是否掉入"逐字翻译"陷阱，如果是，明确指出哪个词/结构是直译痕迹
- 如果学习者的翻译语法正确但 native 绝不会这么说，这一点必须放在 gap_analysis 首位
- 中译英不受"20词以下"规则限制，短句正常反馈`;

const EXAM_TYPES = ['ielts_writing_task1','ielts_writing_task2','ielts_speaking_p1','ielts_speaking_p2','ielts_speaking_p3','toefl_writing'];

async function getFeedback(taskType, question, userAnswer, extraInfo=''){
  let sys = FEEDBACK_SYSTEM;
  if(taskType === 'c2e_translation') sys += C2E_EXTRA;
  let user = `task_type: ${taskType}\nquestion: ${question}\nuser_answer: ${userAnswer}\nuser_level: intermediate${extraInfo ? '\n' + extraInfo : ''}`;
  const lastGap = LS.get(KEYS.lastgap, '');
  if(lastGap) user += `\n提示：上次反馈的差距分析角度是「${lastGap}」，若本次存在其他同等重要的问题，请换一个分析角度，避免重复措辞。`;
  user += '\n\n请按系统要求生成反馈。';
  const raw = await callDeepSeek(sys, user, {temperature:0.5, max_tokens:4096});
  const parsed = tolerantParse(raw);
  if(parsed && parsed.gap_analysis && parsed.gap_analysis.main_gap) LS.set(KEYS.lastgap, parsed.gap_analysis.main_gap);
  return {parsed, raw};
}

/* ================= 反馈渲染（逐块容错） ================= */
function esc(s){ const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; }

function renderFeedback(container, fb, raw, taskType, opts={}){
  const {collect=true, scroll=true} = opts;
  container.style.display = 'block';
  if(!fb){
    container.innerHTML = `<div class="fb-title">⚠️ AI返回格式异常，以下是原始内容</div><div class="raw-fallback">${esc(raw)}</div>`;
    return;
  }
  let html = '';
  /* 1 纠错层 */
  html += `<div class="fb-section"><div class="fb-title"><span class="num">1</span>纠错</div>`;
  if(Array.isArray(fb.corrections) && fb.corrections.length){
    fb.corrections.forEach((c, i) => {
      const typeChip = c.type ? `<span style="display:inline-block;background:#fee2e2;color:#b91c1c;border-radius:4px;padding:0 6px;font-size:11px;margin-right:6px;">${esc(c.type)}</span>` : '';
      html += `<div class="corr-item"><button class="fav-btn" data-kind="corr" data-idx="${i}">☆ 收藏</button>${typeChip}<span class="orig">${esc(c.original)}</span><br>→ <span class="fixed">${esc(c.corrected)}</span><div class="why">${esc(c.explanation)}</div></div>`;
    });
  } else {
    html += `<div class="muted">✅ 未发现语法/用词错误</div>`;
  }
  html += `</div>`;
  /* 2 Native参考层（string 或 三版本对象） */
  html += `<div class="fb-section"><div class="fb-title"><span class="num">2</span>Native 会怎么说</div><div class="native-box">`;
  const nv = fb.native_version;
  if(nv && typeof nv === 'object'){
    const labels = {casual:'😄 Casual · 朋友间', neutral:'🙂 Neutral · 通用', formal:'👔 Formal · 正式场合'};
    ['casual','neutral','formal'].forEach(k => {
      if(!nv[k]) return;
      const parts = String(nv[k]).split(/\s*——\s*|\s*—\s*(?=[一-鿿])/);
      html += `<div class="ver-label"><button class="fav-btn" data-kind="nativek" data-key="${k}">☆ 收藏</button>${labels[k]||k}</div><div>${esc(parts[0])}</div>`;
      if(parts[1]) html += `<div class="scene">${esc(parts[1])}</div>`;
    });
  } else {
    html += `<button class="fav-btn" data-kind="native">☆ 收藏</button>` + esc(nv || '(无)');
  }
  html += `</div></div>`;
  /* 3 差距分析层 */
  const g = fb.gap_analysis;
  if(g && typeof g === 'object'){
    html += `<div class="fb-section"><div class="fb-title"><span class="num">3</span>差距分析</div><div class="gap-box"><b>核心差距：${esc(g.main_gap)}</b><br>${esc(g.detail)}<br>🎯 <b>本周行动：</b>${esc(g.one_action)}</div></div>`;
  }
  /* 4 表达升级层 */
  if(Array.isArray(fb.upgrades) && fb.upgrades.length){
    html += `<div class="fb-section"><div class="fb-title"><span class="num">4</span>表达升级</div><table class="upg-table">`;
    fb.upgrades.forEach((u, i) => {
      html += `<tr><td class="yours">${esc(u.yours)}</td><td class="better"><button class="fav-btn" data-kind="upg" data-idx="${i}">☆ 收藏</button>${esc(u.better)}</td><td class="why">${esc(u.why)}</td></tr>`;
    });
    html += `</table></div>`;
  }
  /* 5 积累层（自动入收藏夹，去重） */
  if(Array.isArray(fb.collect) && fb.collect.length){
    html += `<div class="fb-section"><div class="fb-title"><span class="num">5</span>积累${collect ? ' · 已自动存入收藏夹' : ''}</div>`;
    fb.collect.forEach((c, i) => {
      const btn = collect ? '' : `<button class="fav-btn" data-kind="col" data-idx="${i}">☆ 收藏</button>`;
      html += `<div class="collect-item">${btn}<span class="expr">${esc(c.expression)}</span> — ${esc(c.meaning)}<br><span class="ex">${esc(c.example)}</span></div>`;
    });
    html += `</div>`;
    if(collect) addToFav(fb.collect.map(c => Object.assign({cat:'积累表达'}, c)));
  }
  /* 评分层 */
  if(fb.score && typeof fb.score === 'object'){
    const s = fb.score;
    html += `<div class="fb-section"><div class="fb-title"><span class="num">★</span>评分（仅供参考）</div><div class="score-box">`;
    if(s.band !== undefined){
      html += `<span class="band">Band ${esc(s.band)}</span><div class="dims">` +
        ['TR','CC','LR','GRA','FC','PR'].filter(k => s[k] !== undefined && s[k] !== null).map(k => `${k}: ${esc(s[k])}`).join(' · ') + `</div>`;
    } else if(s.score !== undefined){
      html += `<span class="band">${esc(s.score)} / 30</span>`;
    }
    if(s.comment) html += `<div>${esc(s.comment)}</div>`;
    html += `<div class="score-note">⚠️ AI评分普遍偏乐观且有波动，关注趋势而非绝对值。</div></div></div>`;
  }
  container.innerHTML = html;
  /* 收藏按钮：事件委托，用赋值避免重复绑定 */
  container._fb = fb;
  container.onclick = e => {
    const b = e.target.closest('.fav-btn');
    if(!b || b.dataset.done) return;
    const f = container._fb;
    if(!f) return;
    const k = b.dataset.kind, i = +(b.dataset.idx || 0);
    let item = null;
    if(k === 'corr' && f.corrections[i]){
      const c = f.corrections[i];
      item = {expression:c.corrected, meaning:(c.type ? c.type + '：' : '') + String(c.explanation||'').slice(0,50), example:c.original, cat:'纠错句'};
    } else if(k === 'native'){
      item = {expression:String(f.native_version), meaning:'Native 参考回答', example:'', cat:'Native参考'};
    } else if(k === 'nativek'){
      const parts = String(f.native_version[b.dataset.key] || '').split(/\s*——\s*|\s*—\s*(?=[一-鿿])/);
      item = {expression:parts[0], meaning:b.dataset.key + (parts[1] ? '（' + parts[1] + '）' : ''), example:'', cat:'Native参考'};
    } else if(k === 'upg' && f.upgrades[i]){
      const u = f.upgrades[i];
      item = {expression:u.better, meaning:u.why || '', example:u.yours || '', cat:'表达升级'};
    } else if(k === 'col' && f.collect[i]){
      item = Object.assign({cat:'积累表达'}, f.collect[i]);
    }
    if(item && item.expression){
      addToFav([item]);
      b.textContent = '✓ 已收藏';
      b.dataset.done = '1';
    }
  };
  if(scroll) container.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* ================= 收藏夹 & 历史 ================= */
function addToFav(items){
  const fav = LS.get(KEYS.fav, []);
  const seen = new Set(fav.map(f => f.expression.toLowerCase().trim()));
  items.forEach(it => {
    if(!it || !it.expression) return;
    const k = String(it.expression).toLowerCase().trim();
    if(seen.has(k)) return;
    seen.add(k);
    fav.unshift({expression:it.expression, meaning:it.meaning||'', example:it.example||'', cat:it.cat||'积累表达', ts:Date.now()});
  });
  LS.set(KEYS.fav, fav);
}
function favCat(f){
  if(f.cat) return f.cat;
  const m = f.meaning || '';
  if(m.startsWith('纠错')) return '纠错句';
  if(m.startsWith('Native')) return 'Native参考';
  return '积累表达';
}
function addHistory(rec){
  const h = LS.get(KEYS.hist, []);
  h.unshift(rec);
  LS.set(KEYS.hist, h.slice(0,50));
}
function renderFav(){
  const fav = LS.get(KEYS.fav, []);
  $('#favCount').textContent = `（${fav.length} 条）`;
  if(!fav.length){
    $('#favList').innerHTML = '<div class="muted">还没有收藏。每次提交练习后，AI 推荐的表达会自动收进这里；反馈里的各部分也可以点 ☆ 手动收藏。</div>';
    return;
  }
  /* 按来源分组 */
  const CATS = ['积累表达','表达升级','纠错句','Native参考'];
  const CAT_ICON = {积累表达:'⭐',表达升级:'⬆️',纠错句:'❌→✅','Native参考':'💬'};
  const groups = {};
  fav.forEach((f, i) => {
    const c = favCat(f);
    (groups[c] = groups[c] || []).push([f, i]);
  });
  let html = '';
  CATS.concat(Object.keys(groups).filter(c => !CATS.includes(c))).forEach(c => {
    if(!groups[c]) return;
    html += `<div class="fb-title" style="font-size:14px;margin-top:14px;">${CAT_ICON[c]||'📁'} ${esc(c)} <span class="muted" style="font-weight:400;">（${groups[c].length}）</span></div>`;
    groups[c].forEach(([f, i]) => {
      html += `<div class="fav-item"><div><span class="expr">${esc(f.expression)}</span>${f.meaning?' — '+esc(f.meaning):''}${f.example?`<br><span class="ex">${esc(f.example)}</span>`:''}</div><button class="btn small danger" onclick="delFav(${i})">删</button></div>`;
    });
  });
  $('#favList').innerHTML = html;
}
function renderHist(){

    `<div class="muted" style="margin-bottom:10px;font-size:12px;">本地存储占用约 ${usedKB} KB / 5120 KB</div>`;

  ).join('') : '<div class="muted">暂无练习记录。</div>');
}

      <div class="muted" style="font-size:12px;margin-bottom:8px;">${flashIdx + 1} / ${flashDeck.length} · ${esc(favCat(f))}${flashBack ? ' · 背面' : ' · 正面'}</div>
      ${flashBack
        ? `<div style="font-size:18px;font-weight:700;color:var(--blue-dark);">${esc(f.expression)}</div>${f.example ? `<div class="muted" style="font-style:italic;margin-top:6px;">${esc(f.example)}</div>` : ''}`
        : `<div style="font-size:16px;">${esc(front)}</div><div class="muted" style="font-size:12px;margin-top:8px;">先开口说出英文表达，再翻面对照</div>`}
      <div class="row" style="justify-content:center;margin-top:12px;">
        ${flashBack
          ? `<button class="btn small" onclick="nextFlash()">下一张 →</button>`
          : `<button class="btn small" onclick="flipFlash()">🔄 翻面</button>`}
        <button class="btn small secondary" onclick="endFlash()">结束</button>
      </div>
    </div>`;
}
window.startFlash = () => {
  const fav = LS.get(KEYS.fav, []);
  if(!fav.length){ alert('收藏夹是空的，先练几题积累一些表达吧'); return; }
  flashDeck = fav.slice().sort(() => Math.random() - 0.5).slice(0, 20);
  flashIdx = 0; flashBack = false;
  $('#flashArea').style.display = 'block';
  renderFlash();
};
window.flipFlash = () => { flashBack = true; renderFlash(); };
window.nextFlash = () => { flashIdx++; flashBack = false; renderFlash(); };
window.endFlash = () => { $('#flashArea').style.display = 'none'; };
$('#flashBtn').addEventListener('click', startFlash);

$('#exportFavBtn').addEventListener('click', () => {
  const fav = LS.get(KEYS.fav, []);
  if(!fav.length){ alert('收藏夹还是空的'); return; }
  const CATS = ['积累表达','表达升级','纠错句','Native参考'];
  const groups = {};
  fav.forEach(f => { const c = favCat(f); (groups[c] = groups[c] || []).push(f); });
  let md = '# 我的表达收藏 · English Output Lab\n\n导出时间：' + new Date().toLocaleString() + ' · 共 ' + fav.length + ' 条\n';
  CATS.concat(Object.keys(groups).filter(c => !CATS.includes(c))).forEach(c => {
    if(!groups[c]) return;
    md += '\n## ' + c + '（' + groups[c].length + '）\n\n';
    groups[c].forEach(f => {
      md += '- **' + f.expression + '**';
      if(f.meaning) md += ' — ' + f.meaning;
      md += '\n';
      if(f.example) md += '  - 例：' + f.example + '\n';
    });
  });
  const blob = new Blob([md], {type:'text/markdown;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '表达收藏-' + new Date().toISOString().slice(0,10) + '.md';
  a.click();
});
$('#exportBtn').addEventListener('click', () => {
  const data = {};
  Object.values(KEYS).forEach(k => data[k] = localStorage.getItem(k));
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'output-lab-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
});
$('#importBtn').addEventListener('click', () => $('#importFile').click());
$('#importFile').addEventListener('change', e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      Object.values(KEYS).forEach(k => { if(data[k] != null) localStorage.setItem(k, data[k]); });
      renderFav(); alert('导入成功');
    }catch(err){ alert('导入失败：' + err.message); }
  };
  r.readAsText(f);
});

free", "Some people believe that water should be free for everyone", "Governments should supply water to all homes at no cost", "Private companies should not be allowed to profit from this natural resource", "Money from taxes can be used to pay for water supply systems", "Argument: water should not be free", "If water is free, people take it for granted", "They do not think about how much water they waste", "They leave taps running while washing or brushing their teeth", "If we have to pay for water, we will use it more responsibly"]}];
const IELTS_T2_EXTRA = [{"q": "Some people think that it is more effective for students to study in groups, while others believe that it is better for them to study alone. Discuss both views and give your own opinion.", "diff": "中", "focus": "Simon Discussion 结构", "refs": []}, {"q": "Families who send their children to private schools should not be required to pay taxes that support the state education system. To what extent do you agree or disagree with this statement?", "diff": "难", "focus": "Simon Opinion 题 / 让步论证", "refs": ["Benefits of education"]}, {"q": "The money spent by governments on space programs would be better spent on vital public services such as schools and hospitals. To what extent do you agree or disagree?", "diff": "中", "focus": "Simon 范文题 / 完全同意式写法", "refs": []}, {"q": "Some people think that a sense of competition in children should be encouraged. Others believe that children who are taught to co-operate rather than compete become more useful adults. Discuss both these views and give your own opinion.", "diff": "中", "focus": "Simon Discussion 范文题", "refs": ["Arguments for Competitive sport"]}, {"q": "Some people believe that hobbies need to be difficult to be enjoyable. To what extent do you agree or disagree?", "diff": "易", "focus": "Simon 部分同意式写法", "refs": []}, {"q": "Many people say that we now live in 'consumer societies' where money and possessions are given too much importance. To what extent do you agree or disagree?", "diff": "中", "focus": "Simon 真题", "refs": ["Positives of Consumerism", "Negatives of Consumerism"]}, {"q": "Some people say that advertising encourages us to buy things that we really do not need. Others say that advertisements tell us about new products that may improve our lives. Discuss both these views and give your own opinion.", "diff": "中", "focus": "广告话题", "refs": ["Positives of Advertising", "Negatives of Advertising", "Opinions about Advertising"]}, {"q": "Some people believe that animal testing is necessary for medical progress, while others think it is cruel and unnecessary. Discuss both views and give your own opinion.", "diff": "中", "focus": "动物实验话题", "refs": ["Arguments for Animal testing", "Arguments against Animal Testing"]}, {"q": "Some people choose to eat no meat or fish. They believe that this is not only better for their own health but also benefits the world as a whole. Discuss this view and give your own opinion.", "diff": "中", "focus": "素食话题", "refs": ["Arguments for Vegetarianism", "Arguments against Vegetarianism"]}, {"q": "Some people think that zoos are cruel and should be closed down. Others, however, believe that zoos can be useful in protecting wild animals. Discuss both opinions and give your own opinion.", "diff": "易", "focus": "动物园话题", "refs": ["Positives of Zoos", "Negatives of Zoos"]}, {"q": "In many countries, more and more people are moving away from rural areas and towards urban areas. Why do you think this is happening? Is this a positive or negative development?", "diff": "中", "focus": "城市化话题 / 原因+评价", "refs": ["Reasons for Urbanization", "Negatives of City Life"]}, {"q": "Some people believe that the best way to reduce crime is to give longer prison sentences. Others, however, believe there are better alternative ways of reducing crime. Discuss both views and give your opinion.", "diff": "难", "focus": "犯罪与监狱话题", "refs": ["Negatives of Prisons"]}, {"q": "An increasing number of students choose to study abroad. What are the advantages and disadvantages of studying overseas?", "diff": "易", "focus": "留学话题 / 利弊分析", "refs": ["Benefits of Studying Abroad"]}, {"q": "Some parents decide to educate their children at home instead of sending them to school. Do the advantages of home-schooling outweigh the disadvantages?", "diff": "中", "focus": "家庭教育话题 / outweigh题型", "refs": ["Disadvantages of home-schooling"]}, {"q": "Some people believe that students should be grouped according to their academic ability in school, while others believe that students of different abilities should be taught together. Discuss both views and give your own opinion.", "diff": "中", "focus": "分层教学话题", "refs": ["Advantages of Streaming (grouping children according to ability)", "Disadvantages of Streaming"]}, {"q": "Global warming is one of the most serious issues that the world is facing today. What are the causes of global warming and what measures can governments and individuals take to tackle the issue?", "diff": "难", "focus": "环境话题 / 原因+对策", "refs": ["Effects of Global Warming", "Solutions to environment problems"]}, {"q": "Genetic engineering is an important issue in modern society. Some people think that it will improve people's lives in many ways. Others feel that it may be a threat to life on earth. Discuss both these views and give your own opinion.", "diff": "难", "focus": "基因工程话题", "refs": ["Positives of genetic engineering", "Negatives of genetic engineering"]}, {"q": "Immigration has a major impact on society today. What are the main benefits and drawbacks of immigration for the host country?", "diff": "中", "focus": "移民话题", "refs": ["Positives of Immigration and Multi-cultural Societies", "Negatives of Immigration", "Opinions about Immigration"]}, {"q": "Globalization means that many countries are becoming increasingly similar. Do the advantages of this development outweigh the disadvantages?", "diff": "难", "focus": "全球化话题 / outweigh题型", "refs": ["Positives of Globalization", "Negatives of Globalization"]}, {"q": "Some people think that as English is becoming a global language, it is no longer necessary to learn other foreign languages. To what extent do you agree or disagree?", "diff": "中", "focus": "语言话题", "refs": ["Negative of English as an International Language"]}, {"q": "Some people think that professional and competitive sports have become more about money than about sporting achievement. To what extent do you agree or disagree?", "diff": "中", "focus": "体育话题", "refs": ["Arguments against Professional/competitive sport", "Arguments for Professional sport"]}, {"q": "Some people say that watching television is bad for children in every way. Others say it can help children learn and develop. Discuss both views and give your own opinion.", "diff": "易", "focus": "电视话题", "refs": ["Positives of television", "Negatives of Television", "Opinions about Television"]}, {"q": "The internet has transformed the way we share information. Do the advantages of the internet outweigh the disadvantages?", "diff": "易", "focus": "互联网话题 / outweigh题型", "refs": ["Positives of the Internet", "Negatives of the internet"]}, {"q": "Mobile phones have changed the way people communicate with each other. Do the advantages of this development outweigh the disadvantages?", "diff": "易", "focus": "手机话题 / outweigh题型", "refs": ["Positives of Mobile Phones", "Negatives of Mobile Phones", "Opinion about Mobile Phones"]}, {"q": "International tourism has grown enormously in recent years. Some people worry about its impact on local cultures and the environment. Do the advantages of tourism outweigh the disadvantages?", "diff": "中", "focus": "旅游话题", "refs": ["Positives of Tourism"]}, {"q": "Increasing the price of petrol is the best way to solve growing traffic and pollution problems. To what extent do you agree or disagree? What other measures do you think might be effective?", "diff": "难", "focus": "交通话题 / 双问题型", "refs": ["Positives of Public transport", "Negatives of public transport"]}];

const GRE_ARG_TOPICS = ["A recent study shows that people living on the continent of North America suffer 9 times more chronic fatigue and 31 times more chronic depression than do people living on the continent of Asia. Interestingly, Asians, on average, eat 20 grams of soy per day, whereas North Americans eat virtually none. It turns out that soy contains phytochemicals called isoflavones, which have been found to possess disease–preventing properties. Thus, North Americans should consider eating soy on a regular basis as a way of preventing fatigue and depression.", "The following is taken from the editorial section of the local newspaper in Rockingham.\n\"In order to save a considerable amount of money, Rockingham's century-old town hall should be torn down and replaced by the larger and more energy-efficient building that some citizens have proposed. The old town hall is too small to comfortably accommodate the number of people who are employed by the town. In addition, it is very costly to heat the old hall in winter and cool it in summer. The new, larger building would be more energy efficient, costing less per square foot to heat and cool than the old hall. Furthermore, it would be possible to rent out some of the space in the new building, thereby generating income for the town of Rockingham.\"", "Claitown University needs both affordable housing for its students and a way to fund the building of such housing. The best solution to this problem is to commission a famous architect known for experimental and futuristic buildings. It is common knowledge that tourists are willing to pay money to tour some of the architect's buildings, so it can be expected that tourists will want to visit this new building. The income from the fees charged to tourists will soon cover the building costs. Furthermore, such a building will attract new students as well as donations from alumni. And even though such a building will be much larger than our current need for student housing, part of the building can be used as office space.", "The following appeared in a business magazine.\n\"As a result of numerous consumer complaints of dizziness and nausea, Promofoods requested that eight million cans of tuna be returned for testing last year. Promofoods concluded that the cans did not, after all, contain chemicals that posed a health risk. This conclusion is based on the fact that the chemists from Promofoods tested samples of the recalled cans and found that, of the eight chemicals most commonly blamed for causing symptoms of dizziness and nausea, five were not found in any of the tested cans. The chemists did find that the three remaining suspected chemicals are naturally found in all other kinds of canned foods.\"", "The following appeared in a local newspaper.\n\"People should not be misled by the advertising competition between Coldex and Cold-Away, both popular over-the-counter cold medications that anyone can purchase without a doctor's prescription. Each brand is accusing the other of causing some well-known, unwanted side effect: Coldex is known to contribute to existing high blood pressure and Cold-Away is known to cause drowsiness. But the choice should be clear for most health-conscious people: Cold-Away has been on the market for much longer and is used by more hospitals than is Coldex. Clearly, Cold-Away is more effective.\"", "A folk remedy* for insomnia, the scent in lavender flowers, has now been proved effective. In a recent study, 30 volunteers with chronic insomnia slept each night for three weeks on lavender-scented pillows in a controlled room where their sleep was monitored. During the first week, volunteers continued to take their usual sleeping medication. They slept soundly but wakened feeling tired. During the second week, the volunteers discontinued their medication. As a result, they slept less soundly than the previous week and felt even more tired. During the third week, the volunteers slept longer and more soundly than in the previous two weeks. This shows that over a short period of time lavender cures insomnia.\n*A folk remedy is usually a plant-based form of treatment common to traditional forms of medicine, ones that developed before the advent of modern medical services and technology.", "Typically, as people age, their bone mass decreases, making them more vulnerable to bone fractures. A recent study concludes that the most effective way to reduce the risk of fractures in later life is to take twice the recommended dose of vitamin D and calcium daily. The three-year study followed a group of French women in their eighties who were nursing-home residents. The women were given daily supplements of twice the recommended dose of vitamin D and calcium. In addition, the women participated in a light weightlifting program. After three years, these women showed a much lower rate of hip fractures than is average for their age.", "The following appeared in a letter from a department chairperson to the president of Pierce University.\n\"Some studies conducted by Bronston College, which is also located in a small town, reveal that both male and female professors are happier living in small towns when their spouses are also employed in the same geographic area. Therefore, in the interest of attracting the most gifted teachers and researchers to our faculty and improving the morale of our entire staff, we at Pierce University should offer employment to the spouse of each new faculty member we hire. Although we cannot expect all offers to be accepted or to be viewed as an ideal job offer, the money invested in this effort will clearly be well spent because, if their spouses have a chance of employment, new professors will be more likely to accept our offers.\"", "For the past five years, consumers in California have been willing to pay twice as much for oysters from the northeastern Atlantic Coast as for Gulf Coast oysters. This trend began shortly after harmful bacteria were found in a few raw Gulf Coast oysters. But scientists have now devised a process for killing the bacteria. Once consumers are made aware of the increased safety of Gulf Coast oysters, they are likely to be willing to pay as much for Gulf Coast as for northeastern Atlantic Coast oysters, and greater profits for Gulf Coast oyster producers will follow.", "The following appeared in a memo from the marketing director of Bargain Brand Cereals.\n\"One year ago we introduced our first product, 'Bargain Brand' breakfast cereal. Our very low prices quickly drew many customers away from the top-selling cereal companies. Although the companies producing the top brands have since tried to compete with us by lowering their prices, and although several plan to introduce their own budget brands, not once have we needed to raise our prices to continue making a profit. Given our success selling cereal, Bargain Brand should now expand its business and begin marketing other low-priced food products as quickly as possible.\"", "The Mozart School of Music should obviously be the first choice of any music student aware of its reputation. First of all, the Mozart School stresses intensive practice and training, so that students typically begin their training at a very young age. Second, the school has ample facilities and up-to-date professional equipment, and its faculty includes some of the most distinguished music teachers in the world. Finally, many Mozart graduates have gone on to be the best known and most highly paid musicians in the nation.", "The following is a memorandum issued by the publisher of a newsmagazine, Newsbeat, in the country of Dinn.\n\"Our poorest-selling magazine issues over the past three years were those that featured international news stories on their front covers. Over the same period, competing news-magazines have significantly decreased the number of cover stories that they devote to international news. Moreover, the cost of maintaining our foreign bureaus to report on international news is increasing. Therefore, we should decrease our emphasis on international news and refrain from displaying such stories on our magazine covers.\"", "The following recommendation was made by the president and administrative staff of Grove College, a private institution, to the college's governing committee.\n\"We recommend that Grove College preserve its century-old tradition of all-female education rather than admit men into its programs. It is true that a majority of faculty members voted in favor of coeducation, arguing that it would encourage more students to apply to Grove. But eighty percent of the students responding to a survey conducted by the student government wanted the school to remain all female, and over half of the alumni who answered a separate survey also opposed coeducation. Keeping the college all-female, therefore, will improve morale among students and convince alumni to keep supporting the college financially.\"", "The following appeared in a letter to the school board in the town of Centerville.\n\"All students should be required to take the driver's education course at Centerville High School. In the past two years several accidents in and around Centerville have involved teenage drivers. Since a number of parents in Centerville have complained that they are too busy to teach their teenagers to drive, some other instruction is necessary to ensure that these teenagers are safe drivers. Although there are two driving schools in Centerville, parents on a tight budget cannot afford to pay for driving instruction. Therefore an effective and mandatory program sponsored by the high school is the only solution to this serious problem.\"", "The following is a memorandum from the sales director to the president of the Healthy-and-Good food company.\n\"A recent study indicates that Venadial, a new margarine currently produced only in the country of Alta, actually reduces cholesterol levels. Derived from the resin of pine trees, Venadial works by activating a metabolic response that is not yet well understood. However, cholesterol levels fell ten to fifteen percent among participants in the study who consumed Venadial daily, and the risk of heart attack by one-third. In addition, the new margarine is so popular that stores in Alta are unable to keep it on their shelves. Therefore, if our company obtains the exclusive right to sell Venadial internationally, our profits are sure to increase substantially within a very short time.\"", "The following is a letter that recently appeared in the Oak City Gazette, a local newspaper.\n\"Membership in Oak City's Civic Club — a club whose primary objective is to discuss local issues — should continue to be restricted to people who live in Oak City. People who work in Oak City but who live elsewhere cannot truly understand the business and politics of the city. It is important to restrict membership to city residents because only residents pay city taxes and therefore only residents understand how the money could best be used to improve the city. At any rate, restricting membership in this way is unlikely to disappoint many of the nonresidents employed in Oak City, since neighboring Elm City's Civic Club has always had an open membership policy, and only twenty-five nonresidents have joined Elm City's Club in the last ten years.\"", "The following appeared in the annual report from the president of the National Brush Company.\n\"In order to save money, we at the National Brush Company have decided to pay our employees for each brush they produce instead of for the time they spend producing brushes. We believe that this policy will lead to the production of more and better brushes, will allow us to reduce our staff size, and will enable the company factories to operate for fewer hours — resulting in savings on electricity and security costs. These changes will ensure that the best workers keep their jobs and that the company will earn a profit in the coming year.\"", "The following is a memorandum written by the director of personnel to the president of the Cedar Corporation.\n\"It would be a mistake to rehire the Good-Taste Company to supply the food in our employee cafeteria next year. It is the second most expensive caterer in the city. In addition, its prices have risen in each of the last three years, and it refuses to provide meals for people on special diets. Just last month three employees complained to me that they no longer eat in the cafeteria because they find the experience 'unbearable.' Our company should instead hire Discount Foods. Discount is a family-owned local company and it offers a varied menu of fish and poultry. I recently tasted a sample lunch at one of the many companies that Discount serves and it was delicious — an indication that hiring Discount will lead to improved employee satisfaction.\"", "The following is a recommendation from the personnel director to the president of Acme Publishing Company.\n\"Many other companies have recently stated that having their employees take the Easy Read Speed-Reading Course has greatly improved productivity. One graduate of the course was able to read a five-hundred-page report in only two hours; another graduate rose from an assistant manager to vice president of the company in under a year. Obviously, the faster you can read, the more information you can absorb in a single workday. Moreover, Easy Read costs only $500 per employee — a small price to pay when you consider the benefits to Acme. Included in this fee is a three-week seminar in Spruce City and a lifelong subscription to the Easy Read newsletter. Clearly, Acme would benefit greatly by requiring all of our employees to take the Easy Read course.\"", "From a letter to the editor of a city newspaper.\n\"One recent research study has indicated that many adolescents need more sleep than they are getting, and another study has shown that many high school students in our city are actually dissatisfied with their own academic performance. As a way of combating these problems, the high schools in our city should begin classes at 8:30 A.M. instead of 7:30 A.M., and end the school day an hour later. This arrangement will give students an extra hour of sleep in the morning, thereby making them more alert and more productive. Consequently, the students will perform better on tests and other assignments, and their academic skills will improve significantly.\"", "Butter has now been replaced by margarine in Happy Pancake House restaurants throughout the southwestern United States. Only about 2 percent of customers have complained, indicating that 98 people out of 100 are happy with the change. Furthermore, many servers have reported that a number of customers who still ask for butter do not complain when they are given margarine instead. Clearly, either these customers cannot distinguish margarine from butter, or they use the term 'butter' to refer to either butter or margarine. Thus, to avoid the expense of purchasing butter, the Happy Pancake House should extend this cost-saving change to its restaurants in the southeast and northeast as well.", "Many employees of major United States corporations are fearful that they will lose their jobs in the near future, but this fear is largely unfounded. According to a recent study, a majority of companies expected to make new hires in the coming year, while fewer companies expected to lay off employees. In addition, although it is very disturbing to be laid off, the proliferation of programs and of workshops designed to improve job-finding skills has made being laid off far less painful than it once was.", "In the Bayhead Public Library, books that are rarely borrowed continue to take up shelf space year after year, while people who want to read a recent novel frequently find that the library's only copy is checked out. Clearly, the library's plan to replace books that are borrowed no more than once a year with sufficient copies of more recent books will solve this problem. The protest we have heard since this plan was made public has come from a small, and thus unrepresentative, group of some thirty people and so should therefore be ignored.", "The following appeared in a letter from the owner of the Sunnyside Towers apartment building to its manager.\n\"One month ago, all the showerheads on the first five floors of SunnysideT owers were modified to restrict the water flow to approximately 1/3 of its original force. Although actual readings of water usage before and after the adjustment are not yet available, the change will obviously result in a considerable savings for Sunnyside Corporation, since the corporation must pay for water each month. Except for a few complaints about low water pressure, no problems with showers have been reported since the adjustment. Clearly, restricting water flow throughout all the 20 floors of Sunnyside Towers will increase our profits further.\"", "The following is a recommendation from the director of personnel to the president of Professional Printing Company.\n\"In a recent telephone survey of automobile factory workers, older employees were less likely to report that having a supervisor present increases their productivity. Among workers aged 18 to 29, 27 percent said that they are more productive in the presence of their immediate supervisor, compared to 12 percent for those aged 30 or over, and only 8 percent for those aged 50 or over. Clearly, if our printing company hires mainly older employees, we will increase productivity and save money because of the reduced need for supervisors. \"", "The following appeared as part of an article in a health magazine.\n\"A new discovery warrants a drastic change in the diets of people living in the United States. Two scientists have recently suggested that omega -3 fatty acids (found in some fish and fish oils) play a key role in mental health. Our ancestors, who ate less saturated fat and more polyunsaturated fat, including omega -3 fatty acids, were much less likely to suffer from depression than we are today. Moreover, modern societies — such as those in Japan and Taiwan — that consume large quantities of fish report depression rates lower than that in the United States. Given this link between omega -3 fatty acids and depression, it is important for all people in the United States to increase their consumption of fish in order to prevent depression.\"", "A new report suggests that men and women experience pain very differently from one another, and that doctors should consider these differences when prescribing pain medications. When researchers administered the same dosage of kappa opioids — a painkiller — to 28 men and 20 women who were having their wisdom teeth extracted, the women reported feeling much less pain than the men, and the easing of pain lasted considerably longer in women. This research suggests that kappa opioids should be prescribed for women whenever pain medication is required, whereas men should be given other kinds of pain medication. In addition, researchers should reevaluate the effects of all medications on men versus women.", "The following is a recommendation from the dean at Foley College, a small liberal arts college, to the president of the college.\n\"Since college-bound students are increasingly concerned about job prospects after graduation, Foley College should attempt to increase enrollment by promising to find its students jobs after they graduate. Many administrators feel that this strategy is a way for Foley to compete against larger and more prestigious schools and to encourage students to begin preparing for careers as soon as they enter college. Furthermore, a student who must choose a career path within his or her first year of college and who is guaranteed a job after graduation is more likely to successfully complete the coursework that will prepare him or her for the future.\"", "The following is a letter to the editor of the Glenville Gazette, a local newspaper.\n\"Over the past few years, the number of people who have purchased advance tickets for the Glenville Summer Concert series has declined, indicating lack of community support. Although the weather has been unpredictable in the past few years, this cannot be the reason for the decline in advance ticket purchases, because many people attended the concerts even in bad weather. Clearly, then, the reason for the decline is the choice of music, so the organizers of the concert should feature more modern music in the future and should be sure to include music composed by Richerts, whose recordings Glenville residents purchase more often than any other contemporary recordings. This strategy will undoubtedly increase advance ticket purchases and will increase attendance at the concerts.\"", "The following is a letter from a professor at Xanadu College to the college's president.\n\"The development of an extensive computer-based long-distance learning program will enhance the reputation of Xanadu College. This program would allow more students to enroll in our courses, thereby increasing our income from student tuition. Traditional courses could easily be adapted for distance learners, as was shown by the adaptation of two traditional courses for our distance learning trial project last year. Also, by using computer programs and taped lectures, faculty will have fewer classroom obligations and more time to engage in extensive research, thereby enhancing the reputation of Xanadu.\"", "The following is a letter to the editor of the Roseville Gazette.\n\"Despite opposition from some residents of West Roseville, the arguments in favor of merging the townships of Roseville and West Roseville are overwhelming. First, residents in both townships are confused about which authority to contact when they need a service; for example, the police department in Roseville receives many calls from residents of West Roseville. This sort of confusion would be eliminated with the merger. Second, the savings in administrative costs would be enormous, since services would no longer be duplicated: we would have only one fire chief, one tax department, one mayor, and so on. And no jobs in city government would be lost — employees could simply be reassigned. Most importantly, the merger will undoubtedly attract business investments as it did when the townships of Hamden and North Hamden merged ten years ago.\"", "The Department of Education in the state of Attra recommends that high school students be assigned homework every day. Yet a recent statewide survey of high school math and science teachers calls the usefulness of daily homework into question. In the district of Sanlee, 86 percent of the teachers reported assigning homework three to five times a week, whereas in the district of Marlee, less than 25 percent of the teachers reported assigning homework three to five times a week. Yet the students in Marlee earn better grades overall and are less likely to be required to repeat a year of school than are the students in Sanlee. Therefore, all teachers in our high schools should assign homework no more than twice a week, if at all.", "A recent study suggests that people who are left-handed are more likely to succeed in business than are right-handed people. Researchers studied photographs of 1,000 prominent business executives and found that 21 percent of these executives wrote with their left hand. So the percentage of prominent business executives who are left-handed (21 percent) is almost twice the percentage of people in the general population who are left-handed (11 percent). Thus, people who are left-handed would be well advised to pursue a career in business, whereas people who are right-handed would be well advised to imitate the business practices exhibited by left-handers.", "The following is a letter from an editor at Liber Publishing Company to the company's president.\n\"In recent years, Liber has unfortunately moved away from its original mission: to publish the works of regional small-town authors instead of those of big-city authors. Just last year, 90 percent of the novels we published were written by authors who maintain a residence in a big city. Although this change must have been intended to increase profits, it has obviously backfired, because Liber is now in serious financial trouble. The only way to address this problem is to return to our original mission. If we return to publishing only the works of regional small-town authors, our financial troubles will soon be resolved.\"", "Sadly, widespread negative images of businesspeople have been created in large part by television. Consider the fact that, although they make up a mere 10 percent of the characters in dramatic roles on television, businesspeople are responsible for about one-fifth of all the crime on television shows. In fact, in a recent survey of television producers, only 35 percent of the television roles for businesspeople were viewed as positive ones.", "The following appeared as part of a recommendation made by a faculty member to the president of a large university.\n\"Never once in our 150-year history as a university have we clarified our objectives. How, then, can we hope to adapt as an institution to the new challenges facing higher education. As a first step in this evolutionary process, therefore, we should send out questionnaires asking faculty members why they teach, asking students what they want from this university, and asking former students what they gained from their own education here. When the replies come in, we can tabulate them and formulate an official statement of our educational mission. This will surely result in improved programs at our university.\"", "There is a general idea that a translation always fails to preserve some of the qualities that distinguish the original work — i.e., that 'something always gets lost in translation.' Writers, critics, and the general reading public unthinkingly accept this clichè. But this belief is unwarranted: translators are sometimes distinguished authors themselves, and some authors may even translate their own works. As the translator pointed out in the preface to an English version of Dante's works, the violin and the piano make different sounds, but they can play what is recognizably the same piece of music.", "There is a general idea that waiters and waitresses are more likely to receive larger gratuities from large groups of people. A recent research study suggests this is not true. The researchers examined the relationship between the size of tips in restaurants and the number of meals charged on the bill. They found that, while most tips were around 15 percent, the minimum percentage considered appropriate, people dining alone tipped consistently more (19 percent) and those dining in groups of four or more tipped considerably less (13 percent) than this 15 percent standard. These results strongly suggest that people dining in a group are less likely to feel personally responsible for leaving an adequate or generous tip.", "Statistics collected from dentists indicate that three times more men than women faint while visiting the dentist. This evidence suggests that men are more likely to be distressed about having dental work done than women are. Thus, dentists who advertise to attract patients should target the male consumer and emphasize both the effectiveness of their anesthetic techniques and the sensitivity of their staff to nervous or suffering patients.", "The citizens of Forsythe have adopted healthier lifestyles. Their responses to a recent survey show that in their eating habits they conform more closely to government nutritional recommendations than they did ten years ago. Furthermore, there has been a fourfold increase in sales of food products containing kiran, a substance that a scientific study has shown reduces cholesterol. This trend is also evident in reduced sales of sulia, a food that few of the healthiest citizens regularly eat.", "Humans arrived in the Kaliko Islands about 7,000 years ago, and within 3,000 years most of the large mammal species that had lived in the forests of the Kaliko Islands had become extinct. Yet humans cannot have been a factor in the species' extinctions, because there is no evidence that the humans had any significant contact with the mammals. Further, archaeologists have discovered numerous sites where the bones of fish had been discarded, but they found no such areas containing the bones of large mammals, so the humans cannot have hunted the mammals. Therefore, some climate change or other environmental factor must have caused the species' extinctions.", "The following appeared in a newspaper feature story.\n\"At the small, nonprofit hospital in the town of Saluda, the average length of a patient's stay is two days; at the large, for-profit hospital in the nearby city of Megaville, the average patient stay is six days. Also, the cure rate among patients in the Saluda hospital is about twice that of the Megaville hospital. The Saluda hospital has more employees per patient than the hospital in Megaville, and there are few complaints about service at the local hospital. Such data indicate that treatment in smaller, nonprofit hospitals is more economical and of better quality than treatment in larger, for-profit hospitals.\"\n——————————————-\nThe following appeared as a letter to the editor of a farming publication.\n\"With continuing publicity about the need for healthful diets, and with new research about the harmful effects of eating too much sugar, nationwide demand for sugar will no doubt decline. Therefore, farmers in our state should use the land on which they currently grow sugar cane to grow peanuts, a food that is rich in protein and low in sugar. Farmers in the neighboring country of Palin greatly increased their production of peanuts last year, and their total revenues from that crop were quite high.\"", "The following appeared in a recommendation from the president of Amburg's Chamber of Commerce.\n\"Last October the city of Belleville installed high intensity lighting in its central business district, and vandalism there declined almost immediately. The city of Amburg has recently begun police patrols on bicycles in its business district but the rate of vandalism there remains constant. Since high intensity lighting is apparently the most effective way to combat crime, we should install such lighting throughout Amburg. By reducing crime in this way, we can revitalize the declining neighborhoods in our city.\"", "The following appeared in a letter to the editor of the Parkville Daily Newspaper.\n\"Throughout the country last year, as more and more children below the age of nine participated in youth-league softball and soccer, over 80,000 of these young players suffered injuries. When interviewed for a recent study, youth-league softball players in several major cities also reported psychological pressure from coaches and parents to win games. Furthermore, education experts say that long practice sessions for these sports take away time that could be used for academic activities. Since the disadvantages apparently outweigh any advantages, we in Parkville should discontinue organized athletic competition for children under nine.\"", "It is known that in recent years, industrial pollution has caused the Earth's ozone layer to thin, allowing an increase in the amount of ultraviolet radiation that reaches the Earth's surface. At the same time, scientists have discovered, the population of a species of salamander that lays its eggs in mountain lakes has declined. Since ultraviolet radiation is known to be damaging to delicate tissues and since salamander eggs have no protective shells, it must be the case that the increase in ultraviolet radiation has damaged many salamander eggs and prevented them from hatching. This process will no doubt cause population declines in other species, just as it has in the salamander species.", "The following appeared in a memorandum from the planning department of an electric power company.\n\"Several recent surveys indicate that homeowners are increasingly eager to conserve energy and manufacturers are now marketing many home appliances, such as refrigerators and air conditioners, that are almost twice as energy-efficient as those sold a decade ago. Also, new technologies for better home insulation and passive solar heating are readily available to reduce the energy needed for home heating. Therefore, we anticipate that the total demand for electricity in our area will not increase, and may decline slightly. Since our three electric generating plants in operation for the past 20 years have always met our needs, construction of new generating plants should not be necessary.\"", "The following recommendation was made by the Human Resources Manager to the board of directors of the Fancy Toy Company.\n\"In the last three quarters of this year, under the leadership of our president, Pat Salvo, our profits have fallen considerably. Thus, we should ask for her resignation in return for a generous severance package. In Pat's place, we should appoint Rosa Winnings. Rosa is currently president of Starlight Jewelry, a company whose profits have increased dramatically over the past several years. Although we will have to pay Rosa twice the salary that Pat has been receiving, it will be well worth it because we can soon expect our profits to increase considerably.\"", "The following is a letter to the editor of a news magazine.\n\"Clearly, the successful use of robots on missions to explore outer space in the past 20 years demonstrates that robots could be increasingly used to perform factory work more effectively, efficiently, and profitably than human factory workers. The use of robots in factories would offer several advantages. First, robots never get sick, so absenteeism would be reduced. Second, robots do not make mistakes, so factories would increase their output. Finally, the use of robots would also improve the morale of factory workers, since factory work can be so boring that many workers would be glad to shift to more interesting kinds of tasks.\"", "The following appeared in a memorandum to faculty from the academic vice president of Waymarsh University.\n\"So that we can better accomplish Waymarsh University's academic goals, we should adopt the job-opportunity (job-op) program offered at Plateau Technical College and strongly encourage all students at Waymarsh to participate in it. The success of the job-op program at Plateau is evident: Over the past two years, more than 75% of the freshmen at Plateau have enrolled in the optional job-op program. Moreover, at Plateau, the grades of job-op students are consistently higher than those of other students, 90% of the job-op students receive job offers within a month after their graduation, and most former job-op students report much success in their careers.\"", "The following appeared in a memorandum from the new president of the Patriot car manufacturing company.\n\"In the past, the body styles of Patriot cars have been old-fashioned, and our cars have not sold as well as have our competitors' cars. But now, since many regions in this country report rapid increases in the numbers of newly licensed drivers, we should be able to increase our share of the market by selling cars to this growing population. Thus, we should discontinue our oldest models and concentrate instead on manufacturing sporty cars. We can also improve the success of our marketing campaigns by switching our advertising to the Youth Advertising agency, which has successfully promoted the country's leading soft drink.\"", "The following appeared in a memorandum from the owner of Armchair Video, a chain of video rental stores.\n\"Because of declining profits, we must reduce operating expenses at Armchair Video's ten
