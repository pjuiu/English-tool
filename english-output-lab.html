 video rental stores. Raising prices is not a good option, since we are famous for our special bargains. Instead, we should reduce our operating hours. Last month our store in downtown Marston reduced its hours by closing at 6:00 P.M. rather than 9:00 P.M. and reduced its overall inventory by no longer stocking any film released more than two years ago. Since we have received very few customer complaints about these new policies, we should now adopt them at all other Armchair Video stores as our best strategies for improving profits.\"", "In each city in the region of Treehaven, the majority of the money spent on government-run public school education comes from taxes that each city government collects. The region's cities differ, however, in the value they place on public education. For example, Parson City typically budgets twice as much money per year as Blue City does for its public schools — even though both cities have about the same number of residents. It seems clear, therefore, that Parson City residents care more about public school education than do Blue City residents.", "The following appeared in a letter to the Grandview City Council from a local business leader.\n\"During last year's severe drought, when the water supply in the Grandview city reservoir fell to an extremely low level, the city council imposed much more rigid water-rationing rules. But just after these rules were imposed, industrial growth in the area declined. This clearly shows that the new rationing rules have hurt industry in Grandview. Therefore, to promote the health of the local economy, the city council should now stop water rationing.\"", "The following appeared in a magazine article about planning for retirement.\n\"Because of its spectacular natural beauty and consistent climate, Clearview should be a top choice for anyone seeking a place to retire. As a bonus, housing costs in Clearview have fallen significantly during the past year, and real estate taxes remain lower than those in neighboring towns. Nevertheless, Clearview's mayor promises many new programs to improve schools, streets, and public services. Retirees in Clearview can also expect excellent health care as they grow older, since the number of physicians in the area is far greater than the national average.\"", "The following appeared in a brochure promoting the purchase of local franchises for a national chain of gyms.\n\"Now is the time to invest in a Power-Lift Gym franchise so that you can profit from opening one of our gyms in your town. Consider the current trends: Power-Lift Gyms are already popular among customers in 500 locations, and national surveys indicate increasing concern with weight loss and physical fitness. Furthermore, last year's sales of books and magazines on personal health totaled more than $50 million, and purchases of home exercise equipment almost doubled. Investing now in a Power-Lift Gym franchise will guarantee a quick profit.\"", "The following appeared in a memorandum from the president of Hyper-Go Toy Company.\n\"Last year, sales of our Fierce Fighter toy airplane declined sharply, even though the toy had been a top seller for three years. Our customer surveys show that parents are now more worried about youthful violence and are concerned about better education for their children. Therefore, to maintain profits we should discontinue all our action toys and focus exclusively on a new line of educational toys. Several other toy companies have already begun marketing educational toys and report sales increases last year of 200 percent. And since the average family income is growing, sales of new Hyper-Go toys should also increase.\"", "The following appeared in a memorandum from a vice president of the Megamart department store chain.\n\"For the third year in a row, the average household income in our country has risen significantly. That prosperity means that families are likely to be spending more time and money on leisure activities. Megamart stores should therefore concentrate on enlarging and promoting its line of products typically used in leisure activities: athletic and outdoor equipment, televisions, gourmet cooking equipment, and luggage and travel accessories.\"", "The following appeared in an article in a magazine for writers.\n\"A recent study showed that in describing a typical day's conversation, people make an average of 23 references to watching television and only 1 reference to reading fiction. This result suggests that, compared with the television industry, the publishing and bookselling industries are likely to decline in profitability. Therefore, people who wish to have careers as writers should acquire training and experience in writing for television rather than for print media.\"", "The following appeared in the editorial section of a student newspaper.\n\"In a recent survey, most students who were studying beginning Russian gave higher course-evaluation ratings to classes taught by non-native Russian speakers than to classes taught by native Russian speakers. The reason that the non-native speakers were better teachers of Russian is easy to see: the non-native speakers learned Russian later in life themselves, and so they have a better understanding of how the language can be taught effectively. Therefore, in order to improve instruction for all languages and also save money, our university should hire non-native speakers as language instructors instead of trying to find and recruit native speakers.\"", "The following article appeared in a recent issue of a college newspaper.\n\"Among all students who graduated from Hooper University over the past five years, more physical science majors than social science majors found permanent jobs within a year of graduation. In a survey of recent Hooper University graduates, most physical science majors said they believed that the prestige of Hooper University's physical science programs helped them significantly in finding a job. In contrast, social science majors who found permanent employment attributed their success to their own personal initiative. Therefore, to ensure that social science majors find permanent jobs, Hooper University should offer additional social science courses and hire several new faculty members who already have national reputations in the social sciences.\"", "The following appeared as an editorial in one of Coleville's city newspapers.\n\"Even though a high percentage of Coleville City's businesses failed last year, we who live in Coleville City should keep in mind the fact that the Coleville region has attracted a great many new businesses over the last three years. It is well known that new businesses are, on average, much more likely to fail than are long-established ones, so the business failures should not be considered a sign of poor economic health. Indeed, many analysts regard the presence of a significant number of new companies among a region's businesses as a sign of economic health. Thus Coleville City appears to be in good, not poor, economic shape.\"", "The following appeared in a corporate planning memo at ABC Cereal Company, the makers of Better Bran cereal.\n\"Sales of Better Bran have declined in recent years, for reasons that management has now identified. First, Better Bran is a cereal with high sugar content, and recent research studies have found that most consumers say they are concerned about the amount of sugar added to their breakfast cereal. Second, the price of Better Bran has increased by 5 percent in each of the last three years. Therefore, to increase our company's profits we need to reduce the amount of sugar in Better Bran and lower Better Bran's price.\"", "The following appeared as part of a letter to the editor of a local newspaper.\n\"During her three years in office, Governor Riedeburg has shown herself to be a worthy leader. Since she took office, crime has decreased, the number of jobs created per year has doubled, and the number of people choosing to live in our state has increased. These trends are likely to continue if she is reelected. In addition, Ms. Riedeburg has promised to take steps to keep big companies here, thereby providing jobs for any new residents. Anyone who looks at Ms. Riedeburg's record can tell that she is the best-qualified candidate for governor.\"", "The following appeared as part of a memo from the manager of an automobile manufacturing company.\n\"Because the demand for our automobiles is expected to increase dramatically, we need to open a new manufacturing plant as soon as possible in order to continue to thrive. Our marketing projections indicate that 80 million people will want to buy our automobiles, yet our existing plant can only produce 40 million automobiles. The new plant can be opened on a part-time basis, with workers from our existing site rotating responsibilities, until an operational staff can be trained. A major airplane manufacturer was extremely successful using this part-time rotating strategy when it opened its new plant five years ago.\"", "The following appeared as an editorial in a local newspaper.\n\"In order to attract visitors to Central Plaza downtown and to return the plaza to its former glory, the city should prohibit skateboarding there and instead allow skateboarders to use an area in Monroe Park. At Central Plaza, skateboard users are about the only people one sees now, and litter and defaced property have made the plaza unattractive. In a recent survey of downtown merchants, the majority supported a prohibition on skateboarding in the plaza. Clearly, banning skateboarding in Central Plaza will make the area a place where people can congregate for fun or for relaxation.\"", "The following appeared in a newsletter from a political organization.\n\"In order to promote economic growth in the city, city residents should vote 'yes' on the state government's proposal to build a new expressway linking the outlying suburbs directly to the city center. A direct link to the city center will enable downtown businesses to receive deliveries more frequently, so that downtown retailers will no longer run out of stock and city manufacturers will not be affected by shortages of materials. Booming businesses will attract qualified workers from all over the state, workers who will be able to take advantage of the new expressway to commute to work in our city. In addition to these advantages, hundreds of workers will be employed to build the expressway, further stimulating the local economy!\"", "The following appeared as part of a memo from the manager of a hazardous-waste disposal company.\n\"Our new plan will help us better protect our staff against exposure to toxic chemicals: We are fitting each new safety suit with an alarm that will sound in the main control booth when the suit is punctured. The control booth will notify the managers on duty, who will then take the necessary steps to ensure employees' safety. In addition to the obvious safety-related benefits, the fast reaction time will ensure minimal work stoppage and thus result in increased worker productivity and company profitability.\"", "The following appeared in a recommendation from the planning department of the city of Transopolis.\n\"Ten years ago, as part of a comprehensive urban renewal program, the city of Transopolis adapted for industrial use a large area of severely substandard housing near the freeway. Subsequently, several factories were constructed there, crime rates in the area declined, and property tax revenues for the entire city increased. To further revitalize the city, we should now take similar action in a declining residential area on the opposite side of the city. Since some houses and apartments in existing nearby neighborhoods are currently unoccupied, alternate housing for those displaced by this action will be readily available.\"", "The following appeared in a letter to the editor of a local newspaper.\n\"The members of the town school board should not be reelected because they are not concerned about promoting high-quality education in the arts in our local schools. For example, student participation in the high school drama club has been declining steadily, and this year the school board refused to renew the contract of the drama director, even though he had received many awards for his original plays. Meanwhile, over $300,000 of the high school budget goes to athletic programs, and the head football coach is now the highest-paid member of the teaching staff.\"", "The following appeared in a memo from the sales manager of Eco-Power, a company that manufactures tools and home appliances.\n\"Many popular radio and television commercials use memorable tunes and song lyrics to call attention to the products being advertised. Indeed, a recent study of high school students showed that 85 percent could easily recognize the tunes used to advertise leading soft drinks and fast-food restaurants. Despite our company's extensive advertising in magazines during the past year, sales of our home appliances declined. Therefore, to boost company profits, we should now switch to advertisements featuring a distinctive song.\"", "The following appeared in a memo from the vice president of a company that builds shopping malls throughout the country.\n\"The surface of a section of Route 101, paved two years ago by McAdam Road Builders, is now badly cracked and marred by dangerous potholes. In another part of the state, a section of Route 66, paved by Appian Roadways more than four years ago, is still in good condition. Appian Roadways has recently purchased state-of-the-art paving machinery, and it has hired a new quality-control manager. Because of its superior work and commitment to quality, we should contract with Appian Roadways rather than McAdam Road Builders to construct the access roads for all our new shopping malls.\"", "The following appeared in a newspaper feature story.\n\"There is now evidence that the relaxed manner of living in small towns promotes better health and greater longevity than does the hectic pace of life in big cities. Businesses in the small town of Leeville report fewer days of sick leave taken by individual workers than do businesses in the nearby large city of Mason City. Furthermore, Leeville has only one physician for its one thousand residents, but in Mason City the proportion of physicians to residents is five times as high. And the average age of Leeville residents is significantly higher than that of Mason City residents. These findings suggest that people seeking longer and healthier lives should consider moving to small communities.\"", "The following appeared in a memorandum from the general manager of KNOW radio station.\n\"Several factors indicate that radio station KNOW should shift its programming from rock-and-roll music to a continuous news format. Consider, for example, the number of older people in our listening area has increased dramatically, while the total number of our listeners has recently declined. Also, music stores in our area report decreased sales of recorded music. Finally, continuous news stations in neighboring cities have been very successful, and a survey taken just before the recent election shows that local citizens are interested in becoming better informed about politics.\"", "The following appeared as a letter to the editor of a local Solano newspaper.\n\"The Solano school district should do away with its music education programs. After all, music programs are not especially popular in our schools: Only 20 percent of our high school students participated in music programs last year. Furthermore, very few of the Solano district's college-bound students are interested in majoring in music at the university level. Also, when the school district of our neighboring town of Rutherford eliminated its music programs two years ago, the overall grade point average in the high school increased by 10 percent the next year. Surely the money spent on Solano music programs could be better used to improve the quality of traditional academic courses.\"", "The following appeared as part of an article in a local Beauville newspaper.\n\"According to a government report, last year the city of Dillton reduced its corporate tax rate by 15 percent; at the same time, it began offering relocation grants and favorable rates on city utilities to any company that would relocate to Dillton. Within 18 months, two manufacturing companies moved to Dillton, where they employ a total of 300 people. Therefore, the fastest way for Beauville to stimulate economic development and hence reduce unemployment is to provide tax incentives and other financial inducements that encourage private companies to relocate here.\"", "The following appeared in a memorandum from the president of Mira Vista College to the college's board of trustees.\n\"At nearby Green Mountain College, which has more business courses and more job counselors than does Mira Vista College, 90 percent of last year's graduating seniors had job offers from prospective employers. But at Mira Vista College last year, only 70 percent of the seniors who informed the placement office that they would be seeking employment had found full-time jobs within three months after graduation, and only half of these graduates were employed in their major field of study. To help Mira Vista's graduates find employment, we must offer more courses in business and computer technology and hire additional job counselors to help students with their resumès and interviewing skills.\"", "The following appeared as an editorial in the local newspaper of Dalton.\n\"When the neighboring town of Williamsville adopted a curfew four months ago that made it illegal for persons under the age of 18 to loiter or idle in public places after 10 p.m., youth crime in Williamsville dropped by 27 percent during curfew hours. In Williamsville's town square, the area where its citizens were once most outraged at the high crime rate, not a single crime has been reported since the curfew was introduced. Therefore, to help reduce its own rising crime rate, the town of Dalton should adopt the same kind of curfew. A curfew that keeps young people at home late at night will surely control juvenile delinquency and protect minors from becoming victims of crime.\"", "The following appeared in a memo written by a dean at Buckingham College.\n\"To serve the housing needs of our students, Buckingham College should build a new dormitory. Buckingham's enrollment is growing and, based on current trends, should double over the next fifty years, thus making existing dormitories inadequate. Moreover, the average rent for an apartment in our town has increased in recent years. Consequently, students will find it increasingly difficult to afford off-campus housing. Finally, an attractive new dormitory would make prospective students more likely to enroll at Buckingham.\"", "The following appeared in a memo at the XYZ company.\n\"When XYZ lays off employees, it pays Delany Personnel Firm to offer those employees assistance in creating resumès and developing interviewing skills, if they so desire. Laid-off employees have benefited greatly from Delany's services: last year those who used Delany found jobs much more quickly than did those who did not. Recently, it has been proposed that we use the less-expensive Walsh Personnel Firm in place of Delany. This would be a mistake because eight years ago, when XYZ was using Walsh, only half of the workers we laid off at that time found jobs within a year. Moreover, Delany is clearly superior, as evidenced by its bigger staff and larger number of branch offices. After all, last year Delany's clients took an average of six months to find jobs, whereas Walsh's clients took nine.\"", "The following appeared as an editorial in the student newspaper of Groveton College.\n\"To combat the recently reported dramatic rise in cheating among college and university students, these institutions should adopt honor codes similar to Groveton's, which calls for students to agree not to cheat in their academic endeavors and to notify a faculty member if they suspect that others have cheated. Groveton's honor code replaced an old-fashioned system in which students were closely monitored by teachers and an average of thirty cases of cheating per year were reported. The honor code has proven far more successful: in the first year it was in place, students reported twenty-one cases of cheating; five years later, this figure had dropped to fourteen. Moreover, in a recent survey conducted by the Groveton honor council, a majority of students said that they would be less likely to cheat with an honor code in place than without.\"", "The following appeared in a memorandum written by the vice president of Nature's Way, a chain of stores selling health food and other health-related products.\n\"Previous experience has shown that our stores are most profitable in areas where residents are highly concerned with leading healthy lives. We should therefore build our next new store in Plainsville, which has many such residents. Plainsville merchants report that sales of running shoes and exercise clothing are at all-time highs. The local health club, which nearly closed five years ago due to lack of business, has more members than ever, and the weight training and aerobics classes are always full. We can even anticipate a new generation of customers: Plainsville's schoolchildren are required to participate in a 'fitness for life' program, which emphasizes the benefits of regular exercise at an early age.\"", "The following appeared in a letter sent by a committee of homeowners from the Deerhaven Acres to all homeowners in Deerhaven Acres.\n\"Seven years ago, homeowners in nearby Brookville community adopted a set of restrictions on how the community's yards should be landscaped and what colors the exteriors of homes should be painted. Since then, average property values have tripled in Brookville. In order to raise property values in Deerhaven Acres, we should adopt our own set of restrictions on landscaping and housepainting.\"", "The following appeared in a newspaper article about law firms in the city of Megalopolis.\n\"In Megalopolis, the number of law school graduates who went to work for large, corporate firms declined by 15 percent over the last three years, whereas an increasing number of graduates took jobs at small, general practice firms. Even though large firms usually offer much higher salaries, law school graduates are choosing to work for the smaller firms most likely because they experience greater job satisfaction at smaller firms. In a survey of first-year students at a leading law school, most agreed with the statement that earning a high salary was less important to them than job satisfaction. This finding suggests that the large, corporate firms of Megalopolis will need to offer graduates more benefits and incentives and reduce the number of hours they must work.\"", "The following was posted on an Internet real estate discussion site.\n\"Of the two leading real estate firms in our town — Adams Realty and Fitch Realty — Adams is clearly superior. Adams has 40 real estate agents. In contrast, Fitch has 25, many of whom work only part-time. Moreover, Adams' revenue last year was twice as high as that of Fitch, and included home sales that averaged $168,000, compared to Fitch's $144,000. Homes listed with Adams sell faster as well: Ten years ago, I listed my home with Fitch and it took more than four months to sell; last year, when I sold another home, I listed it with Adams, and it took only one month. Thus, if you want to sell your home quickly and at a good price, you should use Adams.\"", "The following appeared in the business section of a newspaper.\n\"Given that the number of people in our country with some form of arthritis is expected to rise from 40 million to 60 million over the next twenty years, pharmaceutical companies that produce drugs for the treatment of arthritis should be very profitable. Many analysts believe that in ten years Becton Pharmaceuticals, which makes Xenon, the best-selling drug treatment for arthritis, will be the most profitable pharmaceutical company. But the patent on Xenon expires in three years, and other companies will then be able to produce a cheaper version of the drug. Thus, it is more likely that in ten years the most profitable pharmaceutical company will be Perkins Pharmaceuticals, maker of a new drug called Xylan, which clinical studies show is preferred over Xenon by seven out of ten patients suffering from the most extreme cases of arthritis.\"", "The following was written as a part of an application for a small business loan by a group of developers in the city of Monroe.\n\"A jazz music club in Monroe would be a tremendously profitable enterprise. Currently, the nearest jazz club is 65 miles away; thus, our proposed club, the C Note, would have the local market all to itself. Plus, jazz is extremely popular in Monroe: over 100,000 people attended Monroe's jazz festival last summer, several well-known jazz musicians live in Monroe, and the highest-rated radio program in Monroe is 'Jazz Nightly,' which airs every weeknight. Finally, a nationwide study indicates that the typical jazz fan spends close to $1,000 per year on jazz entertainment. It is clear that the C Note cannot help but make money.\"", "The following appeared in a letter to the editor of the Clearview newspaper.\n\"In the next mayoral election, residents of Clearview should vote for Ann Green, who is a member of the Good Earth Coalition, rather than for Frank Braun, a member of the Clearview town council, because the current members are not protecting our environment. For example, during the past year the number of factories in Clearview has doubled, air pollution levels have increased, and the local hospital has treated 25 percent more patients with respiratory illnesses. If we elect Ann Green, the environmental problems in Clearview will certainly be solved.\"", "The following appeared in a memorandum issued by the strategic planning department at Omni Inc.\n\"Mesa Foods, a manufacturer of snack foods that currently markets its products within a relatively small region of the country, has strong growth potential. Mesa enjoyed a 20 percent increase in profits last year, and its best-selling product, Diabolique Salsa, has had increased sales over each of the past three years. Since Omni Inc. is interested in reaching 14-to-25 year olds, the age group that consumes the most snack food, we should buy Mesa Foods, and concentrate in particular on marketing Diabolique Salsa throughout the country.\"", "The following appeared in a memorandum from a dean at Omega University.\n\"Fifteen years ago, Omega University implemented a new procedure that encouraged students to evaluate the teaching effectiveness of all their professors. Since that time, Omega professors have begun to assign higher grades in their classes, and overall student grade averages at Omega have risen by thirty percent. Potential employers apparently believe the grades at Omega are inflated; this would explain why Omega graduates have not been as successful at getting jobs as have graduates from nearby Alpha University. To enable its graduates to secure better jobs, Omega University should now terminate student evaluation of professors.\"", "The following appeared in a letter to the editor of a Batavia newspaper.\n\"The department of agriculture in Batavia reports that the number of dairy farms throughout the country is now 25 percent greater than it was 10 years ago. During this same time period, however, the price of milk at the local Excello Food Market has increased from $1.50 to over $3.00 per gallon. To prevent farmers from continuing to receive excessive profits on an apparently increased supply of milk, the Batavia government should begin to regulate retail milk prices. Such regulation is necessary to ensure both lower prices and an adequate supply of milk for consumers.\"", "The following appeared in a memo from the mayor of the town of West Egg.\n\"Two years ago, our consultants predicted that West Egg's landfill, which is used for garbage disposal, would be completely filled within five years. During the past two years, however, town residents have been recycling twice as much aluminum and paper as they did in previous years. Next month the amount of material recycled should further increase, since charges for garbage pickup will double. Furthermore, over ninety percent of the respondents to a recent survey said that they would do more recycling in the future. Because of our residents' strong commitment to recycling, the available space in our landfill should last for considerably longer than predicted.\"", "The following appeared in a memo from a vice president of Alta Manufacturing.\n\"During the past year, Alta Manufacturing had thirty percent more on-the-job accidents than nearby Panoply Industries, where the work shifts are one hour shorter than ours. Experts believe that a significant contributing factor in many on-the-job accidents is fatigue and sleep deprivation among workers. Therefore, to reduce the number of on-the-job accidents at Alta and thereby increase productivity, we should shorten each of our three work shifts by one hour so that our employees will get adequate amounts of sleep.\"", "The following appeared in a memo from the chief executive of a video game company.\n\"We have recently been offered the opportunity to buy the rights to produce a video game based on the soon-to-be-published children's book 'Squirrel Power,' by Peter Wood. While the cost of the rights is substantial and will place economic constraints on our company in the short-term, there are two reasons that the purchase of these rights will undoubtedly be a wise investment. First, Wood's last three books have been best sellers and the movie based on his first book was highly profitable. Second, the popular characters and story line in 'Squirrel Power' will save us time in developing our video game, thereby reducing our costs.\"", "The following appeared in a memo from the owner of Green Thumb Gardening Center, a small business serving a suburban town.\n\"There is evidence that consumers are becoming more and more interested in growing their own vegetables. A national survey conducted last month indicated that many consumers were dissatisfied with the quality of fresh vegetables available in supermarkets. And locally, the gardening magazine GreatGardens has sold out at the Village News stand three months in a row. Thus, we at Green Thumb Gardening Center can increase our profits by greatly expanding the variety of vegetable seeds we stock for gardeners this coming spring.\"", "The following appeared in a newsletter offering advice to investors.\n\"Over 80 percent of the respondents to a recent survey indicated a desire to reduce their intake of foods containing fats and cholesterol, and today low-fat products abound in many food stores. Since many of the food products currently marketed by Old Dairy Industries are high in fat and cholesterol, the company's sales are likely to diminish greatly and their profits will no doubt decrease. We therefore advise Old Dairy stockholders to sell their shares and other investors not to purchase stock in this company.\"", "The following appeared in a letter to the editor of a local newspaper from a citizen of the state of Impecunia.\n\"Two years ago our neighboring state, Lucria, began a state lottery to supplement tax revenues for education and public health. Today, Lucria spends more per pupil than we do, and Lucria's public health program treats far more people than our state's program does. If we were to establish a state lottery like the one in Lucria, the profits could be used to improve our educational system and public health program. The new lottery would doubtless be successful, because a survey conducted in our capital city concludes that citizens of Impecunia already spend an average of $50 per person per year on gambling.\"", "The following appeared in a letter to the editor of the Walnut Grove town newspaper.\n\"Walnut Grove's town council has advocated switching from EZ Disposal (which has had the contract for trash collection services in Walnut Grove for the past ten years) to ABC Waste, because EZ recently raised its monthly fee from $2,000 to $2,500 a month, whereas ABC's fee is still $2,000. But the town council is mistaken; we should continue using EZ. EZ collects trash twice a week, while ABC collects only once. Moreover, EZ — which, like ABC, currently has a fleet of 20 trucks — has ordered additional trucks. Finally, EZ provides exceptional service: 80 percent of respondents to last year's town survey agreed that they were 'satisfied' with EZ's performance.\"", "The following appeared in an editorial in a Prunty County newspaper.\n\"In an attempt to improve highway safety, Prunty County recently lowered its speed limit from 55 miles per hour to 45 on all major county roads. But the 55 mph limit should be restored, because this safety effort has failed. Most drivers are exceeding the new speed limit and the accident rate throughout Prunty County has decreased only slightly. If we want to improve the safety of our roads, we should instead undertake the same kind of road improvement project that Butler County completed five years ago: increasing lane widths and resurfacing rough roads. Today, major Butler County roads still have a 55 mph speed limit, yet there were 25 percent fewer reported accidents in Butler County this past year than there were five years ago.\"", "The following appeared in a letter from the manager of a rock band named Double Rice.\n\"One year ago, tickets for Double Rice's concerts in stadiums around the country took, on average, at least 24 hours to sell out, if they sold out at all. But the band has been enjoying a surge in nationwide popularity among 14 to 25 year olds, and the 30,000 tickets for a recent concert in Megalopolis sold out in 12 minutes. Clearly the ticket sales in Megalopolis are a result both of the band's increased popularity and of the advertising campaign run in Megalopolis by the Ad Lib advertising agency. Thus, in order to ensure that the band's success in Megalopolis is repeated across the country, the band should hire Ad Lib to duplicate the Megalopolis ad campaign on a nationwide scale.\"", "The following appeared in a letter to the editor of the Balmer Island Gazette.\n\"The population of Balmer Island increases to 100,000 duing the summer months. To reduce the number of accidents involving mopeds and pedestrians, the town council of Balmer Island should limit the number of mopeds rented by each of the island's six moped and bicycle rental companies from 50 per day to 30 per day during the summer season. By limiting the number of rentals, the town council is sure to attain the 50 percent reduction in moped accidents that was achieved last year in the neighboring island of Torseau, when Torseau's town council enforced similar limits on moped rentals.\"", "The following appeared in a memo from the new vice president of Sartorian, a company that manufactures men's clothing.\n\"Five years ago, at a time when we had difficulties in obtaining reliable supplies of high-quality wool fabric, we discontinued production of our deluxe alpaca overcoats. Now that we have a new fabric supplier, we should resume production. This coat should sell very well: since we have not offered an alpaca overcoat for five years and since our major competitor no longer makes an alpaca overcoat, there will be pent-up customer demand. Also, since the price of most types of clothing has risen in each of the past five years, customers should be willing to pay significantly higher prices for alpaca overcoats than they did five years ago, and our company profits will increase.\"", "The following appeared in a memo from the president of a company that builds and sells new homes in Steel City.\n\"Over the past five years, the population of Steel City has increased by more than 20 percent, and family incomes in Steel City have risen much faster than the national average. Nationwide, sales of houses priced above $150,000 have increased more than have sales of lower-priced houses. Such data indicate that we should make changes in our business to increase company profits. First, we should build fewer low-priced houses than we did last year and focus instead on building houses designed to sell at above $150,000. Second, we should hire additional workers so that we can build a larger total number of houses than we did last year.\"", "A recent sales study indicated that consumption of seafood dishes in Bay City restaurants has increased by 30 percent over the past five years. Yet there are no currently operating city restaurants that specialize in seafood. Moreover, the majority of families in Bay City are two-income families, and a nationwide study has shown that such families eat significantly fewer home-cooked meals than they did a decade ago but at the same time express more concern about eating healthily. Therefore, a new Bay City restaurant specializing in seafood will be quite popular and profitable.", "The following appeared in a memo from the president of Viva-Tech, a manufacturer of high-tech medical equipment.\n\"In order to reduce costs, we should close some of our existing small assembly plants and build a large central plant. Grandview would be an ideal location for this new plant. First, of the locations that we have considered, Grandview has the largest adult population, so that we will be able to staff our plant quickly and easily. Second, since the average wage earned by workers in Grandview is less than that in the other locations, we should be able to keep production costs low. Last, as an inducement for us to build there, Grandview's town council has offered to allow us to operate for the first three years without paying city taxes.\"", "The following appeared in a memo from the mayor of the town of Hopewell.\n\"Two years ago, the town of Ocean View built a new municipal golf course and resort hotel. During the past two years, tourism in Ocean View has increased, new businesses have opened there, and Ocean View's tax revenues have risen by 30 percent. The best way to improve Hopewell's economy, and generate additional tax revenues, is to build a golf course and resort hotel similar to those in Ocean View.\"", "The following appeared in a memo from the chairperson of the school board in the town of Saluda.\n\"For the past five years, Mr. Charles Schade has been the music director at Steel City High School, and during that time the school band from Steel City High has won three regional band competitions. In addition, the quality of the music rehearsal facilities and musical instruments at Steel City High has improved markedly over the past five years. Because of such successes at Steel City High, the Saluda school board should hire Mr. Schade to plan and direct the general music education programs for the entire Saluda school system.\"", "The following appeared as part of a memo from the president of Automate, a company that manufactures automobiles.\n\"It has come to my attention that Sparks, Inc., the manufacturing company that just moved into our state, is advertising job openings at salaries that are twice as high as those paid to our experienced assembly-line workers. Some of our employees have already left to work for Sparks. In order to keep our best staff, we must pay them salaries equal to those Sparks pays its employees. Otherwise we will continue to lose employees in the future, because Sparks must staff the additional new plants that it plans to build in the state.\"", "The following is a memo from the superintendent of the Mylar school district.\n\"A recent six-month study, in which breakfast was made available at school for 100 schoolchildren ages five to twelve, found that children on the breakfast plan were less likely than other children to be absent from or late for school. Clearly, eating breakfast before school plays a role in reducing student absenteeism and tardiness. It is also well known that children who regularly eat a healthful breakfast tend to perform better in school. Therefore, in order to reduce absenteeism and tardiness and to improve academic performance in all of Mylar's elementary and secondary schools, we should provide breakfasts for all students before each school day.\"", "When Ida McAllister ran for mayor of Lake City four years ago, she failed to win even 30 percent of the vote. But since then, McAllister has made public her commitment to environmental causes. She would be wise, therefore, to announce her intention to close all Lake City parks to automobile traffic, thus following the example of the former mayor of Plainsville, Alecia Yu . On the recommendation of a small group of concerned citizens, Mayor Yu prohibited automobile traffic in all Plainsville parks, and therefore was credited with solving the pollution problem and improving the quality of life in Plainsville. This action would have great appeal to the citizens of Lake City, most of whom participate in the community's recycling program, and would guarantee McAllister's success in her current quest to be Lake City's new mayor.", "According to information recently reported in the Eliottown Gazette, the number of people who travel to Eliottown has increased significantly over the past several years. So far this year over 100,000 people have arrived on flights to Eliottown's airport, compared with only 80,000 last year and 40,000 the year before. Eliottown's train station has received more than 50,000 passengers this year, compared with less than 40,000 last year and 20,000 the year before. Clearly tourism in Eliottown has been increasing, thanks to the new Central Park and Museum of Modern Art that opened last year. Therefore, the funding for the park and museum should be increased significantly.", "The following appeared in the editorial section of a newsmagazine.\n\"Some states are creating new laws that restrict the use of handheld cell phones by drivers of automobiles. Such legislation, however, is sheer folly. Although some people with cell phones undoubtedly cause problems on the road, including serious accidents, the majority do not. Besides, problems are also caused by drivers who are distracted by any number of other activities, from listening to the radio to disciplining children. Since there is no need to pass legislation restricting these and other such activities, it follows that there is no need to restrict people's freedom to use a device that they find convenient — or helpful in emergencies.\"", "Until recently, people in Hiparia did most of their shopping by driving to shopping malls. They are beginning, however, to do more of their shopping by ordering merchandise from mail-order catalogs and the Internet. These purchases are delivered to them by mail or by a delivery service. For many purchases, Hiparians no longer need to drive to and from shopping malls; there will therefore be a resulting reduction in the consumption of vehicle fuel in Hiparia.", "The following report appeared in an archaeology journal.\n\"The discovery of distinctively shaped ceramic pots at various prehistoric sites scattered over a wide area has led archaeologists to ask how the pots were spread. Some believe the pot makers migrated to the various sites and carried the pots along with them; others believe the pots were spread by trade and their makers remained in one place. Now, analysis of the bones of prehistoric human skeletons can settle the debate: high levels of a certain metallic element contained in various foods are strongly associated with people who migrated to a new place after childhood. Many of the bones found near the pots at a few sites showed high levels of the metallic element. Therefore, it must be that the pots were spread by migration, not trade.\"", "Milk and dairy products are rich in vitamin D and calcium, substances essential for building and maintaining bones. Many people therefore believe that a diet rich in dairy products can help prevent osteoporosis, a disease in which the bones weaken significantly with age and that is linked to both environmental and genetic factors. But a long-term study of a large number of people has found that those who have consistently consumed dairy products throughout the years of the study have a higher rate of bone fractures than any other participants in the study. Since bone fractures are a symptom of osteoporosis, this study result shows that a diet rich in dairy products may actually increase, rather than decrease, the risk of osteoporosis.", "The following appeared in the summary of a study on headaches suffered by the residents of Mentia.\n\"Salicylates are members of the same chemical family as aspirin, a medicine used to treat headaches. Although many foods are naturally rich in salicylates, for the past several decades food-processing companies have also been adding salicylates to foods as preservatives. This rise in the commercial use of salicylates has been found to correlate with a steady decline in the average number of headaches reported by participants in our twenty-year study. Recently, food-processing companies have found that salicylates can also be used as flavor additives for foods. With this new use for salicylates, we can expect a continued steady decline in the number of headaches suffered by the average citizen of Mentia.\"", "The following appeared in an article written by Dr. Karp, an anthropologist.\n\"Twenty years ago Dr. Field, a noted anthropologist, visited the island of Tertia and concluded from his observations that children in Tertia were reared by an entire village rather than by their own biological parents. However, my recent interviews with children living in the group of islands that includes Tertia show that these children spend much more time talking about their biological parents than about other adults in the village. This research proves that Dr. Field's conclusion about Tertian village culture is false, and thus that the observation-centered approach to studying cultures is invalid. Because they are using the interview-centered method, my team of graduate students working in Tertia will establish a much more accurate understanding of child-rearing traditions there and in other island cultures.\"", "Woven baskets characterized by a particular distinctive pattern have previously been found only in the immediate vicinity of the prehistoric village of Palea and therefore were believed to have been unique to the Palean people. Recently, however, archaeologists discovered such a 'Palean' basket in Lithos, an ancient village across the BrimRiver from Palea. The BrimRiver is very deep and broad, and so the ancient Paleans could only have crossed it by boat, but there is no evidence that the Paleans had boats. And boats capable of carrying groups of people and cargo were not developed until thousands of years after the Palean people disappeared. Moreover, Paleans would have had no need to cross the river — the woods around Palea are full of nuts, berries, and small game. It follows that the so-called Palean baskets were not unique to Palea.", "The following memo appeared in the newsletter of the West Meria Public Health Council.\n\"An innovative treatment has come to our attention that promises to significantly reduce absenteeism in our schools and workplaces. A study reports that in nearby East Meria, where fish consumption is very high, people visit the doctor only once or twice per year for the treatment of colds. Clearly, eating a substantial amount of fish can prevent colds. Since colds are the reason most frequently given for absences from school and work, we recommend the daily use of Ichthaid, a nutritional supplement derived from fish oil, as a good way to prevent colds and lower absenteeism.\"", "The following appeared in a memorandum from the president of Humana College.\n\"Last year the number of students who enrolled in long-distance degree programs at OmniU niversity increased by 50%. During the same year, Omni showed a significant decrease from prior years in expenditures for dormitory and classroom space, most likely because instruction in the long-distance programs takes place via interactive video computer connections. In contrast, over the past three years, enrollment at Humana College has diminished and costs of maintaining buildings have risen. Thus, to increase enrollment and solve the problem of budget deficits at Humana College, we should initiate and actively promote long-distance degree programs like those at Omni.\"", "The following appeared in a memorandum from the president of Excello Food Markets.\n\"In 90 towns where Excello has food markets, natural-food stores specializing in organic food products — products containing no chemical preservatives and made with foods grown without pesticides — have opened nearby as competitors. Surveys of our own customers reveal a growing concern about foods grown using pesticides or preserved with chemicals. Recently our market in Sun City participated in a local food tasting fair, and 75 percent of the fair goers who visited the Excello booth requested free samples of organic fruit. Such evidence indicates that to increase our profits, we should begin to stock a full line of organic food products in all our markets.\"", "The following appeared in a memo from the vice president of a food-distribution company with food-storage warehouses in several cities.\n\"Recently we signed a contract with The Fly-Away Pest-Control Company to provide pest-control services at our fast-food warehouse in Palm City, but last month we discovered that over $20,000 worth of food there had been destroyed by pest damage. Meanwhile, the Buzzoff Pest-Control Company, which we have used for many years, continued to service our warehouse in Wintervale, and last month only $10,000 worth of the food stored there had been destroyed by pest damage. Even though the price charged by Fly-Away is considerably lower, our best means of saving money is to return to Buzzoff Company for all our pest-control services.\"", "The following appeared in a proposal from the economic minister of the country of Paraterra.\n\"In order to strengthen its lagging economy, last year the government of the nearby country of Bellegea began an advertising campaign to promote ecologically sound tourism (ecotourism). This year, the number of foreign visitors arriving at Bellegea's main airport doubled, and per capita income in Bellegea increased by ten percent. To provide more income for the population of Paraterra and also preserve the natural environment of our tiny country, we too should begin to promote ecotourism. To ensure that our advertising campaign is successful, we should hire the current director of Bellegea's National Tourism Office as a consultant for the campaign.\"", "The following appeared as part of a business plan developed by the manager of the Rialto Theater.\n\"Despite its downtown location, the Rialto Movie Theater, a local institution for five decades, must make big changes or close its doors forever. It should follow the example of the new Apex Theater in the mall outside of town. When the Apex opened last year, it featured a video arcade, plush carpeting and seats, and a state-of-the-art sound system. Furthermore, in a recent survey, over 85 percent of respondents reported that the high price of newly released movies prevents them from going to the movies more than five times per year. Thus, if the Rialto intends to hold on to its share of a decreasing pool of moviegoers, it must offer the same features as Apex.\"", "The following is a recommendation from the business manager of Monarch Books.\n\"Monarch Books should open a cafè in its store to attract more customers and better compete with Regal Books, which recently opened a cafè. Monarch, which has been in business at the same location for more than twenty years, has a large customer following because it is known for its wide selection of books on all subjects. Opening the cafè would clearly attract more customers. The cafè would require relatively little space. Space could be made for the cafè by discontinuing the children's book section, which will likely become less popular given that the last national census indicated a significant decline in the percent of the population who are under age ten.\"", "The following appeared as an editorial in a wildlife journal.\n\"Arctic deer live on islands in Canada's arctic region. They search for food by moving over ice from island to island during the course of a year. Their habitat is limited to areas warm enough to sustain the plants on which they feed, and cold enough, at least some of the year, for the ice to cover the sea separating the islands, allowing the deer to travel over it. Unfortunately, according to reports from local hunters, the deer populations are declining. Since these reports coincide with recent global warming trends that have caused the sea ice to melt, we can conclude that the decline in arctic deer populations is the result of deer being unable to follow their age-old migration patterns across the frozen sea.\"", "Although black bears are common in the eastern Canadian province of Labrador, grizzly bears — often similar in color, but much larger — were believed to exist only in the western provinces. Despite a nineteenth-century explorer's account of having startled and narrowly escaped from a grizzly bear deep in the woods in Labrador, modern scientists find no physical evidence that grizzly bears have ever lived in Labrador. But recent research into the language and legends of the Innu, a people who have lived in Labrador for thousands of years, reveals that their language has words for two different kinds of bears, and their ancient legends attribute different characteristics to the two kinds of bears. Therefore, there probably were grizzly bears in Labrador, and the explorer's account probably accurately identified the bear.", "Scientists studying historical weather patterns have discovered that in the mid-sixth century, Earth suddenly became significantly cooler. Although few historical records survive from that time, some accounts found both in Asia and Europe mention a dimming of the sun and extremely cold temperatures. Either a huge volcanic eruption or a large meteorite colliding with Earth could have created a large dust cloud throughout Earth's atmosphere that would have been capable of blocking enough sunlight to lower global temperatures significantly. A large meteorite collision, however, would probably create a sudden bright flash of light, and no extant historical records of the time mention such a flash. Some surviving Asian historical records of the time, however, mention a loud boom that would be consistent with a volcanic eruption. Therefore, the cooling was probably caused by a volcanic eruption.", "The following appeared in a newspaper article published in the country of Corpora.\n\"Twenty years ago, one half of all citizens in Corpora met the standards for adequate physical fitness as then defined by the national advisory board on physical fitness. Today, the board says that only one quarter of all citizens are adequately fit and suggests that spending too much time using computers may be the reason. But since overall fitness levels are highest in regions of Corpora where levels of computer ownership are also highest, it is clear that using computers has not made citizens less physically fit. Instead, as shown by this year's unusually low expenditures on fitness-related products and services, the recent decline in the economy is most likely the cause, and fitness levels will improve when the economy does.\"", "The following appeared in a letter to the editor of a newsletter on health issues.\n\"For the past decade, most health experts have advised teenagers to avoid eating greasy foods in order to prevent acne and related skin conditions, but the number of teenagers who sought medical help for these skin problems has actually risen over the same period. In a recent study, teenagers who avoided greasy foods for a month reported approximately as many outbreaks of acne and related skin conditions as did those who ate an average of two servings of greasy food per day. Such data indicate that eating greasy foods is unlikely to be a cause of acne and related skin conditions. Therefore, health experts should no longer recommend that people avoid such foods.\"", "From a draft textbook manuscript submitted to a publisher.\n\"As Earth was being formed out of the collision of space rocks, the heat from those collisions and from the increasing gravitational energy of the planet made the entire planet molten, even the surface. Any water present would have evaporated and gone off into space. As the planet approached its current size, however, its gravitation became strong enough to hold gases and water vapor around it as an atmosphere. Because comets are largely ice made up of frozen water and gases, a comet striking Earth then would have vaporized. The resulting water vapor would have been retained in the atmosphere, eventually falling as rain on the cooled and solidified surface of Earth. Therefore, the water in Earth's oceans must have originated from comets.\"", "The following appeared in a medical newsletter.\n\"Doctors have long suspected that secondary infections may keep some patients from healing quickly after severe muscle strain. This hypothesis has now been proved by preliminary results of a study of two groups of patients. The first group of patients, all being treated for muscle injuries by Dr. Newland, a doctor who specializes in sports medicine, took antibiotics regularly throughout their treatment. Their recuperation time was, on average, 40 percent quicker than typically expected. Patients in the second group, all being treated by Dr. Alton, a general physician, were given sugar pills, although the patients believed they were taking antibiotics. Their average recuperation time was not significantly reduced. Therefore, all patients who are diagnosed with muscle strain would be well advised to take antibiotics as part of their treatment. \"", "The following appeared in a memo to the human resources manager at Baobob Inc., a large architectural firm.\n\"Several well-known, retired architects were interviewed in Architecture Today about changes in the field. Only one had earned a college degree in architecture. All others had come into the field at an early age by serving apprenticeships that required them to work under the direct supervision of an experienced architect. Several of the colleges that we recruit from report that many promising architecture students leave school early in their undergraduate career. Therefore, because finding talented architecture graduates is becoming more difficult, Baobob Inc. should start an aggressive apprenticeship program and hire students who express an interest in architecture directly out of high school rather than wait for them to get out of college.\"", "Thirteen years ago, researchers studied a group of 25 infants who showed signs of mild distress when exposed to unfamiliar stimuli such as an unusual odor or a tape recording of an unknown voice. They discovered that these infants were more likely than other infants to have been conceived in early autumn, a time when their mothers' production of melatonin — a hormone known to affect some brain functions — would naturally increase in response to decreased daylight. In a follow-up study conducted earlier this year, more than half of these children — now teenagers — who had shown signs of distress identified themselves as shy. Clearly, increased levels of melatonin before birth cause shyness during infancy and this shyness continues into later life.", "The following appeared in a newsletter on dental health.\n\"A recent research study reported the experience of dentists whose patients had, over a period of five years, regularly used Flux Dental Floss as part of their dental hygiene routine. The report indicates that these dentists had 50 percent fewer cases of gum disease than did dentists whose patients did not use Flux regularly. In addition, most of the Flux users who were surveyed by their dentists agreed that Flux's mint flavor would encourage people to floss more often. Thus, even though Flux may cost more than other brands of floss, it is clearly a worthwhile investment for those who want to be assured of healthy teeth and gums.\"", "The following appeared in a Letter to the Editor of the Shady Village newspaper.\n\"Commuters are complaining that the rush hour traffic on Blue Highway between Shady Village and Bright City has doubled their commuting time. Some commuters have asked that an additional traffic lane be built, but the recent creation of such a lane on nearby Green Highway apparently attracted more commuters, judging from the fact that rush-hour traffic jams actually increased there this past winter. To reduce rush-hour traffic on Blue Highway, a bicycle lane should be added instead of a traffic lane. This approach will succeed because many citizens of Shady Village are avid bicyclists; 75 percent of respondents to a recent questionnaire distributed there said they would like to bicycle more hours per week than they currently do.\"", "Collectors prize the ancient life-size clay statues of human figures made on Kali Island but have long wondered how the Kalinese artists were able to depict bodies with such realistic precision. Since archeologists have recently discovered molds of human heads and hands on Kali, we can now conclude that the ancient Kalinese artists used molds of actual bodies, not sculpting tools and techniques, to create these statues. This discovery explains why Kalinese miniature statues were abstract and entirely different in style: molds could only be used for life-size sculptures. It also explains why few ancient Kalinese sculpting tools have been found. In light of this development, collectors should expect the life-size sculptures to decrease in value and the miniatures to increase in value.", "The following appeared in a newsletter on nutrition and health.\n\"Although the multimineral Zorba pill was designed as a simple dietary supplement, a study of first-time ulcer patients who took Zorba suggests that Zorba actually helps prevent ulcers. The study showed that only 25 percent of those ulcer patients who took Zorba under a doctor's direction developed new ulcers, compared to a 75 percent recurrence rate among ulcer patients who did not take Zorba. Clearly, then, Zorba will be highly effective in preventing recurrent ulcers and if health experts inform the general public of this fact, many first-time ulcers can be prevented as well.\"", "The following appeared in an article from a popular newsmagazine.\n\"In 1888 a stone was unearthed in northern Wisconsin with an inscription in an old Scandinavian alphabet and bearing the date 1362. Scandinavians were not, however, exploring or emigrating to northern Wisconsin in the fourteenth century. Recent analysis proves, in fact, that the stone had been buried in the spot where it was found for no more than 100 years. Moreover, the community near the discovery site was home to a group of people who had formed a club to study medieval Scandinavian culture — a period that includes the fourteenth century. The stone, therefore, is not a genuine artifact of medieval Scandinavian culture inscribed in the fourteenth century but most likely a hoax perpetrated by the group.\"", "The following appeared in an article in the health section of a newspaper.\n\"According to the available medical records, the six worst worldwide flu epidemics during the past 300 years occurred in 1729, 1830, 1918, 1957, 1968, and 1977. These were all years with heavy sunspot activity — that is, years when the Earth received significantly more solar energy than in normal years. People at particular risk for the flu should therefore avoid prolonged exposure to the Sun.\"", "The following appeared in the health section of Glenntown's local newspaper.\n\"Several national medical studies suggest that older people who have pets tend to enjoy better health than those who do not have pets: those who have pets have lower rates of high blood pressure and arthritis. It seems clear that having to care for an animal promotes good health for the older person. Therefore, Glenntown should establish a program to give a small pet such as a dog or cat to all of its citizens who are over the age of 65. This will help to insure that our senior citizens enjoy good health and have fewer medical bills.\"\n——————————————-\nThe following appeared in a report by the School District of Eyleria.\n\"Nationally, the average ratio of computers to students in kindergarten through grade 12 (K-12) is 1:5. Educators indicate that this is very good ratio. This means that across the country, all students have access to and can use computers daily in their classrooms. In Eyleria's K-12 schools, the ratio of computers to students is 1:7. This number is sufficient to ensure that all of Eyleria's students, by the time they graduate from high school, will be fully proficient in the use of computer technology. Thus, there is no reason to spend any of the schools' budget on computers or other technology in the next few years.\"\n——————————————-\nThe Treasury has once again introduced a dollar coin, the Pine Tree dollar. Neither the Presidential dollar coin, introduced 11 years ago, nor the Eagle dollar coin, introduced 3 years ago, remained in circulation long: people simply preferred spending paper dollars. However, a survey conducted soon after its release indicates that the Pine Tree dollar is far more appealing than other dollar coins: 76 percent of respondents own the coin; 62 percent of those owning multiple coins consider it so attractive that they are still saving rather than spending the most recent coin to come into their possession. Since the Pine Tree coin promises to become the dollar currency of choice, the Treasury is correct to begin saving money by dramatically reducing the costly printing of paper dollars.", "When Stanley Park first opened, it was the largest, most heavily used park in town. It is still the largest park, but it is no longer heavily used. Video cameras mounted in the park's parking lots last month revealed the park's drop in popularity: the recordings showed an average of only 50 cars per day. In contrast, tiny Carlton Park in the heart of the business district is visited by more than 150 people on a typical weekday. An obvious difference is that Carlton Park, unlike Stanley Park, provides ample seating. Thus, if Stanley Park is ever to be as popular with our citizens as is Carlton Park, the town will obviously need to provide more benches, thereby converting some of the unused open areas into spaces suitable for socializing.", "The following appeared in a memo from the Dean of the College of Education at Omni State University.\n\"Only seven of our state's high schools offer even one course in Latin, but over 80 percent of the graduates who study Latin at those seven schools enroll in college. Furthermore, a recent study shows that students who have mastered Latin perform much better in logic and critical thinking. Thus, in order to increase the percentage of our high school students who graduate from college as well as to ensure that they receive a better education in critical thinking, Omni State University should begin an intensive program to prepare our future teachers to teach high school Latin.\"", "The following appeared in a memo from the president of a chain of cheese stores located throughout the United States.\n\"For many years all the stores in our chain have stocked a wide variety of both domestic and imported cheeses. Last year, however, the five best-selling cheeses at our newest store were all domestic cheddar cheeses from Wisconsin. Furthermore, a recent survey by Cheeses of the World magazine indicates an increasing preference for domestic cheeses among its subscribers. Since our company can reduce expenses by limiting inventory, the best way to improve profits in all of our stores is to discontinue stocking many of our varieties of imported cheese and concentrate primarily on domestic cheeses.\"", "The following appeared in a letter from a firm providing investment advice to a client.\n\"Homes in the northeastern United States, where winters are typically cold, have traditionally used oil as their major fuel for heating. Last year that region experienced 90 days with below-average temperatures, and climate forecasters at Waymarsh University predict that this weather pattern will continue for several more years. Furthermore, many new homes have been built in this region during the past year. Because of these developments, we predict an increased demand for heating oil and recommend investment in Consolidated Industries, one of whose major business operations is the retail sale of home heating oil.\"", "The following appeared in a letter to the editor of a newspaper serving the villages of Castorville and Polluxton.\n\"Both the villages of Castorville and Polluxton have experienced sharp declines in the numbers of residents who pay property taxes. To save money and improve service, the two villages recently merged their once separate garbage collection departments into a single department located in Castorville, and the new department has reported few complaints about its service. Last year the library in Polluxton had 20 percent fewer users than during the previous year. It follows that we should now further economize and improve service, as we did with garbage collection, by closing the library in Polluxton and using the library in Castorville to serve both villages.\"", "The following appeared in a memo from a budget planner for the City of Grandview.\n\"To avoid a budget deficit next year, the City of Grandview must eliminate its funding for the Grandview Symphony. Our citizens are well aware of the fact that while the Grandview Symphony Orchestra was struggling to succeed, our city government promised annual funding to help support its programs. Last year, however, private contributions to the Symphony increased by 200 percent, and attendance at the Symphony's concerts-in-the-park series doubled. The Symphony has also announced an increase in ticket prices for next year. Such developments indicate that the Symphony can now succeed without funding from city government and we can eliminate that expense from next year's budget. This action will surely prevent a budget deficit.\"", "Yellow-legged frogs were once common in high-altitude lakes in the Sierra Nevada mountains, but they have become increasingly rare. Trout feed on tadpoles and young frogs. Few lakes in the Sierra Nevada had any trout in them until a hundred years ago. At that time, many lakes were stocked with trout for recreational fishing, and now trout are common in virtually all bodies of water in the Sierra Nevada. Researchers removed the trout from one lake, and the frog population soon quadrupled. Since frogs are capable of moving several miles over land, removing trout from just a few lakes is clearly the way to restore the frog population to its former levels.", "Studies show that in 70 percent of traffic accidents, at least one driver involved is less than 10 miles from home when the accident occurs. This statistic indicates that drivers have a tendency to drive incautiously when they are close to home, probably because familiar surroundings give them a false sense of security. Thus, the places where people feel safest are the places where they are in fact at greatest risk of serious injury.", "Copper occurs in nature mixed with other minerals and valuable metals in ore, and the proportion of copper in the ore can vary considerably. Until fairly recently, the only way to extract pure copper from ore was by using a process that requires large amounts of electric energy, especially if the proportion of copper in the ore is low. New copper-extracting technologies can use up to 40 percent less electricity than the older method to process the same amount of raw ore, especially when the proportion of copper in the ore is high. Therefore, we can expect the amount of electricity used by the copper-extraction industry to decline significantly.", "In measuring electrical activity in different parts of the brain, researchers found that people who describe themselves as generally happy have more activity in the left prefrontal lobe of their brains than do other people. Therefore, a medication for stimulating the left prefrontal lobe of the brain would be an effective treatment for clinical depression.", "The following appeared in a memo from a manager of a car dealership.\n\"Ten years ago, long-term car leasing became available in our country of Mohilia as an alternative to outright car ownership, and leasing has steadily risen in popularity. For each of the last five years, the number of people leasing new cars has surpassed the number buying new cars. The average age of cars driven in Mohilia is six years; hence, if new car leases again outnumber purchases this year, it is likely that the majority of drivers will be driving leased, not individually owned, cars. Therefore, we should change the focus of our business from selling cars to leasing them.\"", "The following appeared in a newsletter about education policy.\n'The average annual earnings of high school dropouts are significantly less than the average annual earnings of high school graduates. To address this problem, the state governor has proposed that the state should establish free vocational training programs for high school dropouts. But the availability of such programs would probably encourage some students who would otherwise have graduated to drop out in order to pursue vocational training. Hence the proposed programs would lower, not raise, the average earning potential of young people. Therefore, the state should not establish the vocational training programs but should instead focus on improving academic programs in our high schools.'", "The following appeared in a newsletter about health.\n\"The proportion of children in the United States who are overweight is greater now than ever before. Obesity rates among children have been increasing since the 1970's and, during that same time period, the proportion of children living in suburbs has increased. Whereas children in rural areas tend to have outdoor active chores and children in cities often walk to school or other places they need to go, children in suburbs are typically driven everywhere. Thus the increase in childhood obesity is probably due mainly to the suburbanization of America and the associated decrease in the opportunities children have for exercise.\"", "The following appeared as part of an article in a health and beauty magazine.\n\"A group of volunteers participated in a study of consumer responses to the new Luxess face cream. Every morning for a month, they washed their faces with mild soap and then applied Luxess. At the end of that month, most volunteers reported a marked improvement in the way their skin looked and felt. Thus it appears that Luxess is truly effective in improving the condition of facial skin.\"", "The cities of East Sacunda and West Sacunda are in an earthquake-prone area. Since 1985 both cities have had stringent building codes requiring all new buildings to have specific features designed to prevent damage in an earthquake. Buildings built before 1985 are exempt from the codes, but many building owners have modified their buildings to make them conform to the 1985 codes. Last year a major earthquake hit the area, and many people lost their homes. The number of people who were left homeless was much higher in East Sacunda than in West Sacunda, however, so we can conclude that building owners in East Sacunda were less likely to modify their buildings so as to bring them up to the 1985 code standards.", "The following appeared in a letter to the editor of an archaeological magazine.\n\"Archaeologists excavated a cave that had been inhabited by prehistoric people for thousands of years. These people hunted wild animals, many of whose bones were found at levels corresponding to different times of habitation. Most of the bones at the oldest levels, over 40,000 years old, were from a deer species whose modern-day descendants are known to prefer woodland habitats, whereas most of the bones at more recent levels, dating from 30,000 to 10,000 years ago, were from a gazelle species whose modern-day descendants are known to prefer grasslands. We can thus conclude that the climate of the area changed dramatically between 40,000 and 30,000 years ago, causing the terrain to change from woodland to grassland.\"", "The following appeared in a magazine for the trucking industry.\n\"The Longhaul trucking company was concerned that its annual accident rate (the number of accidents per mile driven) was too high. It granted a significant pay increase to its drivers and increased its training standards. It also put strict limits on the number of hours per week each driver could drive. The following year, its trucks were involved in half the number of accidents as before the changes were implemented. A survey of other trucking companies found that the highest-paid drivers were the least likely to have had an accident. Therefore, trucking companies wishing to reduce their accident rate can do so simply by raising their drivers' pay and limiting the overall number of hours they drive.\"", "The following appeared as an editorial in a health magazine.\n\"Clormium 5 is an odorless, tasteless, and generally harmless industrial by-product that can enter the water supply. A preliminary study has linked cooking with water containing clormium 5 to an increased incidence of allergies and skin rashes. Tests of the drinking water in several areas have revealed the presence of clormium 5. Although it is possible to remove clormium 5 from water, the costs of routine testing and purification are higher than many communities can afford. Therefore, in order to prevent allergies and skin rashes, communities that cannot afford to rid their drinking water of clormium 5 should replace drinking fountains in public buildings, such as schools and libraries, with bottled-water coolers.\"", "Allergies are an overreaction of the immune system to certain stimuli. One view is that allergies can develop as the result of childhood exposure to certain irritants, such as dust or animal dander, while the immune system is not yet mature. Another view is that exposure to particular bacteria early in childhood actually triggers the proper development of the immune system, and that limiting exposure to these bacteria through excessive hygiene can cause children's immune systems to overreact to certain irritants later on. A new study supports the second view: children who are washed especially frequently and whose parents clean their homes especially frequently are more likely to develop allergies than are other children. So in order to reduce the incidence of allergies in children and adults, parents should not limit children's exposure to irritants or bacteria.", "The following appeared in a letter to an editor.\n\"In many countries, wood is the
